<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Calculateur BD30/G30 — Indemnisation retards SNCF selon PRR 2021"/>
  <meta name="theme-color" content="#A1006B"/>
  <title>Calculateur BD30 / G30 · v3.5.2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ══════════════════════════════════════════════════════════════
       BD30/G30 CALCULATOR — Design System v3.5.2
       Charte SNCF × Precision UI × Refined Glass
       Auteur : PDSA · Refonte UX/UI : 2026 · Optimisation perf React
    ══════════════════════════════════════════════════════════════ */

    /* ── Tokens light ── */
    :root {
      /* SNCF Brand */
      --prune:#A1006B; --prune-dk:#7A0052; --prune-lt:#F7EBF2; --prune-glow:rgba(161,0,107,.12);
      --blue:#0088CE; --blue-lt:#E8F4FB; --blue-mid:rgba(0,136,206,.16);
      --green:#3D9900; --green-lt:#EBF5DF;
      --amber:#D95A00; --amber-lt:#FDF0E6; --amber-mid:rgba(217,90,0,.18);
      --purple:#6E1E78; --purple-lt:#F2EAF5;
      --teal:#007A84; --teal-lt:#E0F3F5;
      /* Surfaces */
      --bg:#F0EBE4; --surface:#FFFFFF; --surface2:#F6F2EE; --surface3:#EDE8E2;
      --glass:rgba(255,255,255,.82); --glass2:rgba(246,242,238,.9);
      /* Borders */
      --border:#E4DDD6; --border-mid:#D0C8C0;
      /* Text */
      --tx:#1A120E; --tx-mid:#5A4E48; --tx-muted:#8C7E78;
      /* Shadows */
      --sh:0 1px 2px rgba(28,10,4,.04),0 3px 12px rgba(28,10,4,.06);
      --sh-md:0 2px 6px rgba(28,10,4,.05),0 8px 28px rgba(28,10,4,.08);
      --sh-lg:0 4px 12px rgba(28,10,4,.06),0 16px 48px rgba(28,10,4,.10);
      --sh-prune:0 4px 20px rgba(161,0,107,.24);
      /* Radii */
      --r-sm:7px; --r-md:11px; --r-lg:16px; --r-xl:20px; --r-full:9999px;
      /* Font */
      --font:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
      --mono:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
      /* Tab height */
      --header-h:56px; --tabs-h:46px;
    }

    /* ── Tokens dark ── */
    [data-theme="dark"] {
      --prune:#D4688E; --prune-dk:#B04E72; --prune-lt:#200D17; --prune-glow:rgba(212,104,142,.16);
      --blue:#5BA8E0; --blue-lt:#0A1826; --blue-mid:rgba(91,168,224,.18);
      --green:#5BBF80; --green-lt:#071C0F;
      --amber:#E8B84A; --amber-lt:#1C1200; --amber-mid:rgba(232,184,74,.18);
      --purple:#9A78CC; --purple-lt:#120C1E;
      --teal:#40C8D4; --teal-lt:#061A1C;
      --bg:#14141A; --surface:#1C1C24; --surface2:#24242E; --surface3:#2C2C38;
      --glass:rgba(28,28,36,.86); --glass2:rgba(36,36,46,.92);
      --border:#2C2C3A; --border-mid:#3A3A4C;
      --tx:#EAE6E0; --tx-mid:#9E9A96; --tx-muted:#64606A;
      --sh:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.22);
      --sh-md:0 2px 8px rgba(0,0,0,.28),0 8px 28px rgba(0,0,0,.22);
      --sh-lg:0 4px 12px rgba(0,0,0,.32),0 16px 48px rgba(0,0,0,.28);
      --sh-prune:0 4px 20px rgba(212,104,142,.16);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      font-family:var(--font);
      background:var(--bg);
      color:var(--tx);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      min-height:100dvh;
    }

    /* Ambient background */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 1000px 650px at 10% -5%, var(--prune-glow) 0%, transparent 62%),
        radial-gradient(ellipse 500px 400px at 90% 100%, rgba(0,136,206,.04) 0%, transparent 60%);
    }
    #root { position:relative; z-index:1; }

    /* ── Targeted transitions (remplace la règle * globale) ── */
    .tab-btn, .icon-btn, .pill-btn, .tarif-pill, .delay-btn,
    .sp-pill, .rbar-btn, .btn {
      transition-property:background-color,border-color,color,box-shadow,transform,opacity;
      transition-duration:0.16s; transition-timing-function:ease;
    }
    input.calc-input, select.calc-input {
      transition-property:border-color,box-shadow;
      transition-duration:0.16s; transition-timing-function:ease;
    }
    /* Theme transitions uniquement sur les surfaces */
    body, .app-header, .tabs-nav, .card, .card-inset, .seg-card,
    .result-bar, .history-panel, .mode-banner {
      transition-property:background-color,border-color,color;
      transition-duration:0.2s; transition-timing-function:ease;
    }

    /* ── Typography ── */
    .t-xs  { font-size:11px; }
    .t-sm  { font-size:12.5px; }
    .t-base{ font-size:14px; }
    .t-md  { font-size:15.5px; }
    .t-lg  { font-size:18px; }
    .t-xl  { font-size:22px; }
    .t-2xl { font-size:28px; }
    .t-3xl { font-size:36px; }
    .fw-400{font-weight:400}.fw-500{font-weight:500}.fw-600{font-weight:600}
    .fw-700{font-weight:700}.fw-800{font-weight:800}.fw-900{font-weight:900}
    .tx-muted{color:var(--tx-muted)}.tx-mid{color:var(--tx-mid)}
    .tx-prune{color:var(--prune)}.tx-blue{color:var(--blue)}
    .tx-green{color:var(--green)}.tx-amber{color:var(--amber)}
    .tx-purple{color:var(--purple)}.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
    .label {
      display:block; font-size:11px; font-weight:700; letter-spacing:0.7px;
      text-transform:uppercase; color:var(--tx-muted); margin-bottom:6px;
    }

    /* ── Header ── */
    .app-header {
      background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:0 20px;
      position:sticky; top:0; z-index:102;
      height:var(--header-h); display:flex; align-items:center;
      box-shadow:0 1px 0 var(--border),0 2px 16px rgba(0,0,0,.05);
    }
    .header-inner {
      max-width:860px; margin:0 auto; width:100%;
      display:flex; align-items:center; gap:12px;
    }
    .header-brand {
      display:flex; align-items:center; gap:9px; flex-shrink:0;
    }
    .header-logo-badge {
      background:var(--prune); color:white;
      font-size:11px; font-weight:800; letter-spacing:0.4px;
      padding:3px 9px; border-radius:6px; white-space:nowrap;
    }
    .header-title {
      font-size:15.5px; font-weight:700; color:var(--tx);
      letter-spacing:-0.3px; line-height:1;
    }
    .header-sub {
      font-size:11px; color:var(--tx-muted); font-weight:400; white-space:nowrap; margin-top:2px;
    }
    .header-divider {
      width:1px; height:22px; background:var(--border); flex-shrink:0; margin:0 2px;
    }
    .header-right { display:flex; align-items:center; gap:7px; margin-left:auto; flex-shrink:0; }

    /* ── Mode badge (G30/BD30) — redesign v3.5.2 ── */
    .mode-badge {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 12px; border-radius:var(--r-full);
      font-size:12px; font-weight:800; letter-spacing:0.6px;
      border:1.5px solid;
    }
    .mode-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ── Icon / Pill buttons ── */
    .icon-btn {
      width:34px; height:34px; border-radius:var(--r-md);
      border:1.5px solid var(--border); background:var(--surface);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:15px; color:var(--tx-mid);
      outline:none; font-family:var(--font);
    }
    .icon-btn:hover { border-color:var(--prune); background:var(--prune-lt); color:var(--prune); }
    .icon-btn:focus-visible { outline:2px solid var(--prune); outline-offset:2px; }
    .pill-btn {
      display:flex; align-items:center; gap:5px;
      padding:6px 11px; border-radius:var(--r-md);
      border:1.5px solid var(--border); background:var(--surface);
      font-family:var(--font); font-size:11.5px; font-weight:700;
      color:var(--tx-mid); cursor:pointer; white-space:nowrap;
    }
    .pill-btn:hover { border-color:var(--prune); color:var(--prune); background:var(--prune-lt); }

    /* ── TABS ── v3.5.1: pill style ── */
    .tabs-nav {
      background:var(--glass2); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:0 20px; overflow-x:auto; scrollbar-width:none;
      position:sticky; top:var(--header-h); z-index:100;
      height:var(--tabs-h);
    }
    .tabs-nav::-webkit-scrollbar { display:none; }
    .tabs-inner {
      max-width:860px; margin:0 auto; display:flex; align-items:center;
      height:100%; gap:4px; padding:6px 0;
    }
    .tab-btn {
      display:flex; align-items:center; gap:7px;
      padding:0 14px; height:32px;
      font-family:var(--font); font-size:12.5px; font-weight:500;
      color:var(--tx-muted); background:transparent;
      border:none; border-radius:var(--r-md);
      cursor:pointer; white-space:nowrap; outline:none;
      transition:color .16s, background .16s, box-shadow .16s;
    }
    .tab-btn:hover:not(.active) { background:var(--surface2); color:var(--tx-mid); }
    .tab-btn:focus-visible { outline:2px solid var(--prune); outline-offset:1px; }
    .tab-btn.active {
      background:var(--tab-active-bg, var(--prune-lt));
      color:var(--tab-active-color, var(--prune));
      font-weight:700;
      box-shadow:0 0 0 1.5px var(--tab-active-color, var(--prune)) inset;
    }
    .tab-icon-wrap {
      width:22px; height:22px; border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      background:var(--border); color:var(--tx-muted); flex-shrink:0;
      font-size:11px; transition:background .16s, color .16s;
    }
    .tab-btn.active .tab-icon-wrap {
      background:var(--tab-active-color, var(--prune));
      color:white;
    }
    .tab-sep { width:1px; height:18px; background:var(--border); flex-shrink:0; margin:0 4px; }

    /* ── Main ── */
    .main { max-width:860px; margin:0 auto; padding:18px 20px 120px; }

    /* ── Cards ── */
    .card {
      background:var(--surface); border-radius:var(--r-lg);
      border:1px solid var(--border); box-shadow:var(--sh);
      padding:20px 22px; margin-bottom:14px;
      animation:slideUp .22s cubic-bezier(.22,.68,0,1.2) both;
    }
    .card-inset {
      background:var(--surface2); border-radius:var(--r-md);
      padding:14px 16px; border:1px solid var(--border);
    }
    .card-glass {
      background:var(--glass); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    }

    /* ── Animations ── */
    @keyframes slideUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateX(-6px); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes popIn {
      0%   { transform:scale(.88); opacity:0; }
      60%  { transform:scale(1.04); }
      100% { transform:scale(1); opacity:1; }
    }
    @keyframes pulseGlow {
      0%   { box-shadow:0 0 0 0 rgba(161,0,107,.5); }
      60%  { box-shadow:0 0 0 8px rgba(161,0,107,0); }
      100% { box-shadow:0 0 0 0 rgba(161,0,107,0); }
    }
    @keyframes pulse {
      0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)}
    }
    @keyframes fadeSlideIn {
      from { transform:translateX(40px); opacity:0; }
      to   { transform:translateX(0); opacity:1; }
    }
    @keyframes fadeSlideUp {
      from { transform:translateY(6px); opacity:0; }
      to   { transform:translateY(0); opacity:1; }
    }

    /* ── Segment card ── */
    .seg-card {
      border-radius:var(--r-md); padding:16px 18px;
      margin-bottom:10px; border:1px solid var(--border);
      background:var(--surface2);
      animation:fadeIn .2s cubic-bezier(.22,.68,0,1.2) both;
    }
    .seg-num {
      width:28px; height:28px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:800;
    }

    /* ── Mode banner (redesign v3.5.1) ── */
    .mode-banner {
      border-radius:var(--r-lg); padding:14px 18px; margin-bottom:16px;
      display:flex; align-items:flex-start; gap:14px;
      border:1.5px solid; animation:slideUp .22s both;
    }
    .mode-banner-icon {
      width:38px; height:38px; border-radius:var(--r-md); flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:18px;
    }
    .mode-banner-title { font-size:14.5px; font-weight:800; margin-bottom:4px; letter-spacing:-.2px; }
    .mode-banner-desc  { font-size:12.5px; line-height:1.65; opacity:.85; }
    .mode-banner-note  {
      font-size:11.5px; line-height:1.6; margin-top:10px; padding-top:10px;
      border-top:1px solid; opacity:.7;
    }

    /* ── Form inputs ── */
    .calc-input, select.calc-input {
      width:100%; padding:9px 12px;
      border-radius:var(--r-md); border:1.5px solid var(--border);
      font-size:14px; font-family:var(--font);
      outline:none; background:var(--surface); color:var(--tx);
      transition:border-color .16s, box-shadow .16s;
    }
    .calc-input:focus { border-color:var(--prune); box-shadow:0 0 0 3px var(--prune-glow); }
    .calc-input:focus-visible { outline:none; }

    /* ── Tarif pills ── */
    .tarif-pill {
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:var(--r-full);
      border:1.5px solid var(--border); background:var(--surface);
      font-family:var(--font); font-size:12.5px; font-weight:400;
      color:var(--tx-mid); cursor:pointer; white-space:nowrap;
      transition:all .14s;
    }
    .tarif-pill.active { font-weight:700; }
    .tarif-pill:hover { opacity:.88; }

    /* ── Delay buttons ── */
    .delay-btn {
      padding:8px 12px; border-radius:var(--r-md);
      border:1.5px solid var(--border); background:var(--surface);
      font-family:var(--font); font-size:12px; color:var(--tx-mid);
      cursor:pointer; text-align:left; outline:none;
      transition:all .16s cubic-bezier(.22,.68,0,1.2) !important;
    }
    .delay-btn:hover { border-color:var(--prune); background:var(--prune-lt); color:var(--prune); }
    .delay-btn.active {
      border-color:var(--prune); background:var(--prune); color:white;
      box-shadow:var(--sh-prune); transform:scale(1.04);
      animation:pulseGlow .55s ease-out;
    }
    .delay-btn-label { font-weight:700; font-size:12px; line-height:1.2; }
    .delay-btn-sub   { font-size:10.5px; margin-top:2px; opacity:.72; }

    /* ── Badges ── */
    .badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:2px 9px; border-radius:var(--r-full);
      font-size:11px; font-weight:700; letter-spacing:.2px; white-space:nowrap;
    }
    .badge-prune  { background:var(--prune-lt);  color:var(--prune); }
    .badge-blue   { background:var(--blue-lt);   color:var(--blue); }
    .badge-green  { background:var(--green-lt);  color:var(--green); }
    .badge-amber  { background:var(--amber-lt);  color:var(--amber); }
    .badge-purple { background:var(--purple-lt); color:var(--purple); }
    .badge-teal   { background:var(--teal-lt);   color:var(--teal); }
    .badge-neutral{ background:var(--surface2);  color:var(--tx-mid); border:1px solid var(--border); }

    /* ── Alerts ── */
    .alert {
      padding:12px 16px; border-radius:var(--r-md);
      font-size:13px; line-height:1.65;
    }
    .alert-blue   { background:var(--blue-lt);   border:1px solid rgba(0,136,206,.2);  color:var(--blue); }
    .alert-prune  { background:var(--prune-lt);  border:1px solid rgba(161,0,107,.16); color:var(--prune); }
    .alert-green  { background:var(--green-lt);  border:1px solid rgba(61,153,0,.2);   color:var(--green); }
    .alert-amber  { background:var(--amber-lt);  border:1px solid rgba(217,90,0,.2);   color:var(--amber); }
    .alert-purple { background:var(--purple-lt); border:1px solid rgba(110,30,120,.16); color:var(--purple); }

    /* ── Section sep ── */
    .section-sep {
      display:flex; align-items:center; gap:10px; margin:14px 0;
    }
    .section-sep::before, .section-sep::after { content:''; flex:1; height:1px; background:var(--border); }
    .section-sep span {
      font-size:11px; font-weight:700; color:var(--tx-muted);
      letter-spacing:.8px; text-transform:uppercase; white-space:nowrap;
    }

    /* ── Result rows ── */
    .result-row {
      display:grid; grid-template-columns:26px 1fr 88px 76px;
      align-items:center; gap:10px; padding:12px 8px;
    }
    .result-row + .result-row { border-top:1px solid var(--border); }
    .amount-display {
      font-family:var(--mono); font-variant-numeric:tabular-nums;
      font-weight:800; letter-spacing:-0.5px;
    }

    /* ── Sticky result bar (refined v3.5.1) ── */
    .result-bar {
      position:fixed; bottom:0; left:0; right:0; z-index:200;
      background:linear-gradient(135deg, var(--prune-dk) 0%, var(--prune) 55%, #C4006A 100%);
      border-top:1px solid rgba(255,255,255,.08);
      box-shadow:0 -4px 32px rgba(161,0,107,.3),0 -1px 0 rgba(255,255,255,.06);
      padding:10px 20px;
    }
    .result-bar-inner {
      max-width:860px; margin:0 auto;
      display:flex; align-items:center; gap:10px;
    }
    .rbar-sep { width:1px; height:28px; background:rgba(255,255,255,.15); flex-shrink:0; }
    .rbar-btn {
      display:flex; align-items:center; gap:5px;
      background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22);
      color:white; border-radius:var(--r-md); padding:7px 12px;
      font-family:var(--font); font-size:11.5px; font-weight:700;
      cursor:pointer; white-space:nowrap; transition:background .14s, transform .1s;
    }
    .rbar-btn:hover  { background:rgba(255,255,255,.24); }
    .rbar-btn:active { transform:scale(.97); }
    .rbar-tag {
      background:rgba(255,255,255,.2); border-radius:5px;
      padding:2px 8px; font-size:10.5px; font-weight:800;
      color:white; letter-spacing:.5px; white-space:nowrap;
    }

    /* ── Barème table ── */
    .bareme-table { width:100%; border-collapse:collapse; font-size:12.5px; }
    .bareme-table th {
      padding:10px 13px; text-align:left; font-weight:700;
      font-size:11px; text-transform:uppercase; letter-spacing:.7px;
      color:var(--tx-muted); background:var(--surface2);
      border-bottom:1.5px solid var(--border);
    }
    .bareme-table td { padding:10px 13px; border-bottom:1px solid var(--border); color:var(--tx); }
    .bareme-table tr:last-child td { border-bottom:none; }
    .bareme-table tbody tr:hover td { background:var(--surface2); }

    /* ── Range input ── */
    input[type=range] {
      -webkit-appearance:none; appearance:none;
      height:5px; border-radius:var(--r-full); background:var(--border);
      outline:none; cursor:pointer; width:100%;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
      background:var(--prune); cursor:pointer;
      box-shadow:0 1px 6px var(--prune-glow); border:2.5px solid white;
      transition:transform .15s;
    }
    input[type=range]:hover::-webkit-slider-thumb { transform:scale(1.18); }
    input[type=range]::-moz-range-thumb {
      width:20px; height:20px; border-radius:50%;
      background:var(--prune); cursor:pointer; border:2.5px solid white;
    }

    /* ── Buttons ── */
    .btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 14px; border-radius:var(--r-md);
      font-family:var(--font); font-size:13px; font-weight:700;
      cursor:pointer; border:1.5px solid transparent; outline:none;
      transition:background .14s, border-color .14s, color .14s, transform .1s;
    }
    .btn-primary { background:var(--prune); color:white; }
    .btn-primary:hover { background:var(--prune-dk); }
    .btn-outline { background:transparent; border-color:var(--border); color:var(--tx-mid); }
    .btn-outline:hover { border-color:var(--prune); color:var(--prune); background:var(--prune-lt); }
    .btn-ghost  { background:transparent; border-color:transparent; color:var(--tx-muted); }
    .btn-ghost:hover  { background:var(--surface2); color:var(--tx); }
    .btn-danger { background:transparent; border-color:rgba(211,32,30,.3); color:#c62828; }
    .btn-danger:hover { background:#FFEBEE; }
    .btn-sm { padding:5px 10px; font-size:12px; }
    .btn-xs { padding:2px 7px; font-size:10.5px; }
    button:active { transform:scale(.97); }
    button:focus-visible { outline:2px solid var(--prune); outline-offset:2px; }

    /* ── Section title ── */
    .section-title {
      font-size:15px; font-weight:800; color:var(--tx);
      display:flex; align-items:center; gap:9px; margin-bottom:16px;
      letter-spacing:-.2px;
    }
    .title-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    /* ── Responsive ── */
    @media (max-width:640px) {
      .header-sub, .header-divider { display:none; }
      .two-col { grid-template-columns:1fr !important; }
      .three-col { grid-template-columns:1fr 1fr !important; }
      .result-row { grid-template-columns:22px 1fr 72px 60px !important; gap:8px !important; }
      .main { padding:14px 14px 120px; }
    }
    @media (max-width:420px) {
      .three-col { grid-template-columns:1fr !important; }
    }

    /* ── Date card ── */
    .date-card {
      padding:13px 16px; border-radius:var(--r-md);
      border:1px solid var(--border); background:var(--surface2);
    }
    .date-main { font-size:14.5px; font-weight:700; color:var(--tx); }
    .date-sub  { font-size:12px; color:var(--tx-muted); margin-top:3px; line-height:1.55; }

    /* ── Scrollbar ── */
    * { scrollbar-width:thin; scrollbar-color:var(--border-mid) transparent; }
    *::-webkit-scrollbar { width:5px; height:5px; }
    *::-webkit-scrollbar-track { background:transparent; }
    *::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:3px; }

    /* ── Footer ── */
    .app-footer {
      text-align:center; padding:14px 20px; font-size:11.5px;
      color:var(--tx-muted); border-top:1px solid var(--border);
      background:var(--glass); backdrop-filter:blur(8px);
    }

    /* ── Print ── */
    @media print {
      .result-bar, .app-header, .tabs-nav { display:none !important; }
      .main { padding-bottom:0 !important; }
      .card { box-shadow:none !important; }
      body::before { display:none; }
    }

    /* ── History drawer ── */
    .history-panel {
      position:fixed; top:0; right:0; bottom:0; z-index:300;
      width:min(400px,100vw);
      background:var(--surface); border-left:1.5px solid var(--border);
      box-shadow:-8px 0 32px rgba(0,0,0,.18);
      display:flex; flex-direction:column;
      animation:fadeSlideIn .22s cubic-bezier(.22,.68,0,1.2);
    }

    /* ── Accordion ── */
    .acc-chevron { transition:transform .2s; display:inline-flex; align-items:center; }
    .acc-chevron.open { transform:rotate(180deg); }
    .acc-body { animation:slideUp .2s ease both; }

    /* ── Multi-pass row ── */
    .pass-row {
      display:flex; align-items:center; gap:8px;
      padding:8px 10px; border-radius:var(--r-sm);
      border:1px solid var(--border); background:var(--surface);
      margin-bottom:6px;
    }

    /* ── SP pills ── */
    .sp-pill {
      padding:6px 14px; border-radius:var(--r-full);
      border:1.5px solid var(--border); background:var(--surface);
      font-family:var(--font); font-size:12px; font-weight:500;
      color:var(--tx-mid); cursor:pointer; white-space:nowrap;
    }
    .sp-pill.active {
      background:var(--amber); border-color:var(--amber); color:white; font-weight:700;
    }
    .sp-pill:hover:not(.active) { border-color:var(--amber); color:var(--amber); }

    /* ── Amount pill ── */
    .amount-pill {
      font-family:var(--mono); text-align:center;
      font-weight:800; border-radius:8px;
      font-variant-numeric:tabular-nums; line-height:1.2;
    }
  </style>
