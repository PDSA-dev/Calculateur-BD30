function getRateInfo(carrierId,tarif,delayMin){
  // Tarif obligatoire — pas de calcul silencieux par défaut
  if(!tarif)return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
  if(tarif==="groupe")tarif="standard";
  if(delayMin<30) return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
  if(tarif==="max_loisirs"){
    const table=carrierId==="ouigo"?RATES_MAX_LOISIRS.ouigo:RATES_MAX_LOISIRS.default;
    for(const[mn,mx,amt,type]of table)if(delayMin>=mn&&delayMin<=mx)return{rate:0,fixedAmount:amt,points:null,dual:null,type};
    return{rate:0,fixedAmount:null,points:null,type:null};
  }
  if(tarif==="prime_titulaire"){
    for(const[mn,mx,pts,type]of RATES_PRIME_TITULAIRE)if(delayMin>=mn&&delayMin<=mx)return{rate:0,fixedAmount:null,points:pts,dual:null,type};
    return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
  }
  if(tarif==="prime_fid_tiers"){
    const pts=getPrimePts(delayMin);const bad=getPrimeBadAmount(delayMin);
    if(pts>0||bad>0)return{rate:0,fixedAmount:bad,points:pts,dual:"fid_tiers",type:"BAD tiers + Pts FID"};
    return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
  }
  if(tarif==="prime_gvt_tiers"){
    const bad=getPrimeBadAmount(delayMin);
    if(bad>0)return{rate:0,fixedAmount:bad,fixedAmount2:bad,points:null,dual:"gvt_tiers",type:"BAD GVT + BAD tiers"};
    return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
  }
  const table=RATES_STANDARD[carrierId];
  if(!table)return{rate:0,fixedAmount:null,points:null,type:null};
  for(const[mn,mx,rate,type]of table)if(delayMin>=mn&&delayMin<=mx)return{rate,fixedAmount:null,points:null,dual:null,type};
  return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
}

function computeSegmentAmount(price,tarif,rateInfo){
  if(tarif==="max_loisirs"||tarif==="prime_fid_tiers")return rateInfo.fixedAmount||0;
  // GVT = 2 demandes BAD distinctes (GVT + tiers) → montant × 2
  if(tarif==="prime_gvt_tiers")return (rateInfo.fixedAmount||0)*2;
  if(tarif==="prime_titulaire")return 0;
  if(rateInfo.rate===0)return 0;
  const pct=(parseFloat(price)||0)*rateInfo.rate/100;
  // Carte Liberté billet : taux standard avec plancher 5 € si retard ≥ 30 min
  if(tarif==="carte_liberte_billet")return Math.max(5,pct);
  return pct;
}

function computeDelayMinutes(theo,reel){
  if(!theo||!reel)return null;
  const[th,tm]=theo.split(":").map(Number);
  const[rh,rm]=reel.split(":").map(Number);
  let diff=(rh*60+rm)-(th*60+tm);
  if(diff<0)diff+=24*60;
  return diff;
}

  if(min<180) return`${min} min (120–179 min)`;
  if(min<240) return`${min} min (180–239 min)`;
  return`${min} min (≥ 4h)`;
}

function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function addMonths(date,n){const d=new Date(date);d.setMonth(d.getMonth()+n);return d;}
function lastDayOfMonth(date){return new Date(date.getFullYear(),date.getMonth()+1,0);}
function fmtDate(d){if(!d)return"—";return d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function diffDays(a,b){return Math.round((b-a)/(1000*60*60*24));}

// ─── Jours fériés France ─────────────────────────────────────────
function getEaster(year){
  // Algorithme de Butcher
  const a=year%19,b=Math.floor(year/100),c=year%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=((h+l-7*m+114)%31)+1;
  return new Date(year,month-1,day);
}
function getJoursFeries(year){
  const e=getEaster(year);
  const fmtKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const fixed=[
    new Date(year,0,1),  // Nouvel An
    new Date(year,4,1),  // Fête du Travail
    new Date(year,4,8),  // Victoire 1945
    new Date(year,6,14), // Fête Nationale
    new Date(year,7,15), // Assomption
    new Date(year,10,1), // Toussaint
    new Date(year,10,11),// Armistice
    new Date(year,11,25),// Noël
  ];
  const mobile=[
    addDays(e,1),  // Lundi de Pâques
    addDays(e,39), // Ascension
    addDays(e,50), // Lundi de Pentecôte
  ];
  return new Set([...fixed,...mobile].map(fmtKey));
}
function isJourFerie(date){
  const y=date.getFullYear();
  const feries=getJoursFeries(y);
  const key=`${y}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
  return feries.has(key);
}
function isDimanche(date){return date.getDay()===0;}
function isSamedi(date){return date.getDay()===6;}
function isJourNonOuvrable(date){return isDimanche(date)||isJourFerie(date);}
function prochaineJourOuvrable(date){
  let d=new Date(date);
  d.setDate(d.getDate()+1);
  while(isJourNonOuvrable(d)){d=addDays(d,1);}
  return d;
}
function labelJourFerie(date){
  // Retourne le nom du jour férié si applicable
  const year=date.getFullYear();
  const e=getEaster(year);
  const same=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
  const checks=[
    [new Date(year,0,1),"Jour de l'An"],
    [addDays(e,1),"Lundi de Pâques"],
    [new Date(year,4,1),"Fête du Travail"],
    [new Date(year,4,8),"Victoire 1945"],
    [addDays(e,39),"Ascension"],
    [addDays(e,50),"Lundi de Pentecôte"],
    [new Date(year,6,14),"Fête Nationale"],
    [new Date(year,7,15),"Assomption"],
    [new Date(year,10,1),"Toussaint"],
    [new Date(year,10,11),"Armistice"],
    [new Date(year,11,25),"Noël"],
  ];
  for(const[d,name]of checks)if(same(d,date))return name;
  return null;
}

function computeRetractation(dateAchat){
  if(!dateAchat)return null;
  const achat=new Date(dateAchat);
  const limiteCalendaire=addDays(achat,14);
  const today=new Date();today.setHours(0,0,0,0);
  const limiteNonOuvrable=isJourNonOuvrable(limiteCalendaire);
  const limiteReportee=limiteNonOuvrable?prochaineJourOuvrable(limiteCalendaire):limiteCalendaire;
  const ferieLabel=isJourFerie(limiteCalendaire)?labelJourFerie(limiteCalendaire):null;
  const expired=today>limiteReportee;
  const remaining=diffDays(today,limiteReportee);
  return{achat,limiteCalendaire,limiteNonOuvrable,limiteReportee,ferieLabel,expired,remaining};
}

// Règle spécifique Cartes Avantages :
//  - délai de 14 jours démarre au 1er JOUR OUVRÉ après l'achat
//  - la date limite est le 1er JOUR OUVRÉ après la fin du délai de 14 jours
function computeRetractationCarte(dateAchat){
  if(!dateAchat)return null;
  const achat=new Date(dateAchat);
  const today=new Date();today.setHours(0,0,0,0);
  // 1er jour ouvré après l'achat (le jour d'achat ne compte pas)
  const premierJourOuvre=prochaineJourOuvrable(achat);
  // J+14 à partir de ce 1er jour ouvré
  const limiteCalendaire=addDays(premierJourOuvre,14);
  // La date limite effective = 1er jour ouvré après cette date
  const limiteNonOuvrable=isJourNonOuvrable(limiteCalendaire);
  const limiteReportee=limiteNonOuvrable?prochaineJourOuvrable(limiteCalendaire):limiteCalendaire;
  const ferieLabel=isJourFerie(limiteCalendaire)?labelJourFerie(limiteCalendaire):null;
  const ferieStartLabel=isJourFerie(premierJourOuvre)?labelJourFerie(premierJourOuvre):null;
  const expired=today>limiteReportee;
  const remaining=diffDays(today,limiteReportee);
  return{achat,premierJourOuvre,ferieStartLabel,limiteCalendaire,limiteNonOuvrable,limiteReportee,ferieLabel,expired,remaining};
}

function computeResiliation(dateActivation,dateDemande,mensualite,aboData){
  if(!dateActivation||!dateDemande)return null;
  const activationSaisie=new Date(dateActivation);
  const demande=new Date(dateDemande);
  const aboType=aboData.type;

  // Carte Liberté = valable 1 an, pas d'abonnement mensuel
  if(aboType==="annuel"){
    const finValidite=addMonths(activationSaisie,12);
    demande.setHours(0,0,0,0);finValidite.setHours(0,0,0,0);activationSaisie.setHours(0,0,0,0);
    return{type:"annuel",activation:activationSaisie,finValidite,demande,
      prixSansContratPro:aboData.prixSansContratPro,prixAvecContratPro:aboData.prixAvecContratPro};
  }

  // ── Max Actif/Actif+ : activation toujours le 1er du mois ─────
  let activation=activationSaisie;
  let activationCorrigee=false;
  if(aboData.debutPremierDuMois&&activationSaisie.getDate()!==1){
    activation=new Date(activationSaisie.getFullYear(),activationSaisie.getMonth(),1);
    activationCorrigee=true;
  }

  const finEngagementInitial=addMonths(activation,12);
  demande.setHours(0,0,0,0);finEngagementInitial.setHours(0,0,0,0);activation.setHours(0,0,0,0);
  const enEngagementInitial=demande<finEngagementInitial;
  const joursRestants=enEngagementInitial?diffDays(demande,finEngagementInitial):0;

  // ── Blocage 3 premiers mois (Max Jeune / Max Senior) ──────────
  const finBlocage3mois=aboData.blocage3mois?addMonths(activation,3):null;
  if(finBlocage3mois)finBlocage3mois.setHours(0,0,0,0);
  const enBlocage=!!finBlocage3mois&&demande<finBlocage3mois;
  const joursBlocageRestants=enBlocage?diffDays(demande,finBlocage3mois):0;

  // Frais selon type
  let frais=0;
  let fraisLabel="";
  if(enEngagementInitial){
    if(aboData.fraisResil==="forfait15"){frais=15;fraisLabel="15 € (forfait CGV)";}
    else if(aboData.fraisResil==="mensualite"){frais=mensualite||0;fraisLabel=mensualite?`${mensualite} € (1 mensualité)`:"1 mensualité (renseigner le tarif)";}
  }

  // ── Deadline et date d'effet ───────────────────────────────────
  // Pour mois glissants (Jeune/Senior) : la facturation tombe le même jour que
  // l'activation chaque mois. La deadline = date de facturation du mois - 5 jours.
  // Pour mois fixes (Actif/Actif+) : date de facturation = 1er du mois suivant.
  const datePourCalcul=enBlocage?finBlocage3mois:demande;
  let deadline, effetDate;

  if(aboData.glissant){
    const jourFacturation=activation.getDate();
    if(enBlocage){
      // La fin du blocage (M+3) tombe exactement sur la date anniversaire :
      // c'est la 1ère date d'effet possible. Deadline = finBlocage3mois - 5 jours.
      effetDate=new Date(finBlocage3mois);
      deadline=addDays(finBlocage3mois,-6);
    }else{
      // Hors blocage : prochaine date anniversaire mensuelle
      const dernierJourMoisCourant=lastDayOfMonth(datePourCalcul).getDate();
      const jourEffectif=Math.min(jourFacturation,dernierJourMoisCourant);
      const facturationCeMois=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth(),jourEffectif);
      facturationCeMois.setHours(0,0,0,0);
      const deadlineCeMois=addDays(facturationCeMois,-6);
      if(datePourCalcul<=deadlineCeMois){
        deadline=deadlineCeMois;
        effetDate=facturationCeMois;
      }else{
        const moisSuivant=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth()+1,1);
        const dernierJourMoisSuivant=lastDayOfMonth(moisSuivant).getDate();
        const jourEffectifSuivant=Math.min(jourFacturation,dernierJourMoisSuivant);
        effetDate=new Date(moisSuivant.getFullYear(),moisSuivant.getMonth(),jourEffectifSuivant);
        effetDate.setHours(0,0,0,0);
        deadline=addDays(effetDate,-6);
      }
    }
  }else{
    // Mois fixes : 1er du mois (Actif/Actif+), deadline = dernier jour du mois - 5
    const dernierJour=lastDayOfMonth(datePourCalcul);
    deadline=new Date(dernierJour);
    deadline.setDate(dernierJour.getDate()-6);
    if(datePourCalcul<=deadline){
      effetDate=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth()+1,1);
    }else{
      effetDate=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth()+2,1);
    }
  }
  return{type:aboType,activation,activationSaisie,activationCorrigee,
    finEngagementInitial,demande,enEngagement:enEngagementInitial,
    joursRestants,frais,fraisLabel,deadline,effetDate,reconduction:!!aboData.reconduction,
    enBlocage,finBlocage3mois,joursBlocageRestants,glissant:!!aboData.glissant,
    debutPremierDuMois:!!aboData.debutPremierDuMois};
}

// ── Compteur animé (count-up) ────────────────────────────────────────
function useAnimatedNumber(target, duration=520){
  const [display, setDisplay] = React.useState(target);
  const rafRef = React.useRef(null);
  const prevRef = React.useRef(target);
  React.useEffect(()=>{
    const from = prevRef.current;
    const to   = target;
    if(from === to){ setDisplay(to); return; }
    const startTime = performance.now();
    const tick = (now)=>{
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      // ease-out-cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      setDisplay(from + (to - from) * eased);
      if(progress < 1){ rafRef.current = requestAnimationFrame(tick); }
      else{ setDisplay(to); prevRef.current = to; }
    };
    rafRef.current = requestAnimationFrame(tick);
    return ()=>{ if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  },[target, duration]);
  return display;
}

function AnimatedNumber({value, decimals=2, style={}, className=""}){
  const animated = useAnimatedNumber(value);
  return(
    <span className={className} style={style}>
      {animated.toFixed(decimals)}
    </span>
  );
}

function App(){
  // ── Helpers localStorage ──────────────────────────────────────────
  const LS_KEY="bd30_state_v30";
  const lsLoad=(k,def)=>{try{const v=JSON.parse(localStorage.getItem(LS_KEY)||"{}");return v[k]!==undefined?v[k]:def;}catch{return def;}};
  const lsSave=(partial)=>{try{const cur=JSON.parse(localStorage.getItem(LS_KEY)||"{}");localStorage.setItem(LS_KEY,JSON.stringify({...cur,...partial}));}catch{}};

  // ── Dark mode ─────────────────────────────────────────────────────
  const[darkMode,setDarkMode]=useState(()=>lsLoad("darkMode",false));
  // ── Palette active selon dark mode ──────────────────────────────
  const P = darkMode ? DARK : LIGHT;

      document.head.appendChild(link);
    }
    document.title="Calculateur BD30/G30 — SNCF Voyageurs";
  },[darkMode]);

  const toggleDark=()=>{
    setDarkMode(d=>{
      lsSave({darkMode:!d});
      return !d;
    });
  };

  const[tab,setTab]=useState(()=>lsLoad("tab","retard"));
  const[isMobile,setIsMobile]=useState(()=>typeof window!=="undefined"&&window.innerWidth<640);
  useEffect(()=>{
    const h=()=>setIsMobile(window.innerWidth<640);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);

  // ── Raccourcis clavier Alt+1/2/3/4 + Alt+D (dark mode) ───────────
  const TAB_IDS=["retard","frais","bareme","dates"];
  useEffect(()=>{
    const handler=(e)=>{
      if(!e.altKey)return;
      const n=parseInt(e.key);
      if(n>=1&&n<=4){e.preventDefault();setTab(TAB_IDS[n-1]);}
      if(e.key==="d"||e.key==="D"){e.preventDefault();toggleDark();}
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  // ── Historique des 5 derniers calculs ─────────────────────────────
  const[history,setHistory]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("bd30_history_v30")||"[]");}catch{return[];}
  });
  const[showHistory,setShowHistory]=useState(false);
  const pushHistory=(entry)=>{
    setHistory(prev=>{
      const next=[entry,...prev].slice(0,5);
      try{localStorage.setItem("bd30_history_v30",JSON.stringify(next));}catch{}
      return next;
    });
  };

  const[segments,setSegments]=useState(()=>{
    const saved=lsLoad("segments",null);
    if(saved&&Array.isArray(saved)&&saved.length>0)return saved;
    return[emptySegment()];
  });
  const isG30=segments.length===1;

  const[heureTheo,setHeureTheo]=useState(()=>lsLoad("heureTheo",""));
  const[heureReel,setHeureReel]=useState(()=>lsLoad("heureReel",""));
  const[sliderDelay,setSliderDelay]=useState(()=>lsLoad("sliderDelay",0));
  const timeDelay=computeDelayMinutes(heureTheo,heureReel);
  const finalDelay=timeDelay!==null?timeDelay:sliderDelay;

  const[rupture,setRupture]=useState(false);
  const[computed,setComputed]=useState(null);
  const[exceptLevel,setExceptLevel]=useState("none");
  const[exceptSegmentId,setExceptSegmentId]=useState(null);
  const[fraisList,setFraisList]=useState([]);
  const[fraisComputed,setFraisComputed]=useState(null);

  useEffect(()=>{if(timeDelay!==null)setSliderDelay(Math.min(360,timeDelay));},[timeDelay]);

  const addSegment   =()=>setSegments(s=>[...s,{...emptySegment(),nbPass:s[0]?.nbPass||1}]);
  const removeSegment=id=>setSegments(s=>{
    const next=s.filter(x=>x.id!==id);
    if(next.length===1&&!G30_CARRIER_IDS.includes(next[0].carrier))return[{...next[0],carrier:"tgv_dom"}];
    return next;
  });
  const updateSegment=(id,f,v)=>setSegments(s=>s.map(x=>x.id===id?{...x,[f]:v}:x));
  // nbPass est GLOBAL : changer un segment change tous les segments
  const setGlobalNbPass=(n)=>setSegments(s=>s.map(x=>({...x,nbPass:n})));
  const changeCarrier=(segId,carrierId)=>setSegments(s=>s.map(x=>{
    if(x.id!==segId)return x;
    const avail=getTarifsForCarrier(carrierId).map(t=>t.id);
    return{...x,carrier:carrierId,
      tarif:avail.includes(x.tarif)?x.tarif:"",
      passengers:(x.passengers||[]).map(p=>({...p,tarif:avail.includes(p.tarif)?p.tarif:""})),
    };
  }));
  const toggleMultiPass=(segId)=>setSegments(s=>s.map(x=>{
    if(x.id!==segId)return x;
    const next=!x.multiPassMode;
    if(!next)return{...x,multiPassMode:false};
    const n=x.nbPass||1;
    const existing=x.passengers&&x.passengers.length>0?x.passengers:[];
    // Tarif par défaut pour pass.2+ : auto-"standard" si c'est la seule option (OUIGO/TER)
    const availIds=getTarifsForCarrier(x.carrier).filter(t=>t.id!=="groupe").map(t=>t.id);
    const defaultTarif=availIds.length===1?availIds[0]:"";
    // Passager 1 : garde le tarif+prix déjà saisis
    const p1={...(existing[0]||emptyPassenger()),tarif:x.tarif||"",price:x.price||""};
    // Passagers 2+ : tarif auto (si unique dispo) + prix vide
    const rest=Array.from({length:Math.max(0,n-1)},(_,i)=>
      existing[i+1]||{...emptyPassenger(),tarif:defaultTarif,price:""}
    );
    return{...x,multiPassMode:true,passengers:[p1,...rest]};
  }));
  const addPassenger=(segId)=>setSegments(s=>s.map(x=>x.id===segId?{...x,passengers:[...(x.passengers||[]),emptyPassenger()]}:x));
  const removePassenger=(segId,passId)=>setSegments(s=>s.map(x=>x.id===segId?{...x,passengers:x.passengers.filter(p=>p.id!==passId)}:x));
  const updatePassenger=(segId,passId,f,v)=>setSegments(s=>s.map(x=>x.id===segId?{...x,passengers:x.passengers.map(p=>p.id===passId?{...p,[f]:v}:p)}:x));

  // ── Calcul automatique retard ──────────────────────────────────
  useEffect(()=>{
    const results=segments.map(seg=>{
      const c=CARRIERS.find(c=>c.id===seg.carrier);
      const isEligible=c&&c.group==="eligible";
      let rateInfo={rate:0,fixedAmount:null,type:null};
      let amount=0;
      let passengersResult=[];
      if(isEligible){
        if(seg.multiPassMode&&seg.passengers&&seg.passengers.length>0){
          passengersResult=seg.passengers.map(p=>{
            const ri=getRateInfo(seg.carrier,p.tarif,finalDelay);
            const amt=computeSegmentAmount(p.price,p.tarif,ri);
            return{...p,rateInfo:ri,amount:amt,price:parseFloat(p.price)||0};
          });
          amount=passengersResult.reduce((s,p)=>s+p.amount,0);
          rateInfo=passengersResult[0]?.rateInfo||{rate:0,fixedAmount:null,type:"Multi-tarifs"};
        }else{
          rateInfo=getRateInfo(seg.carrier,seg.tarif,finalDelay);
          const baseAmt=computeSegmentAmount(seg.price,seg.tarif,rateInfo);
          const n=seg.tarif==="groupe"?1:(seg.nbPass||1);
          amount=baseAmt*n;
        }
      }else{rateInfo.type="Non éligible BD30";}
      return{...seg,carrier:c,price:parseFloat(seg.price)||0,rateInfo,amount,eligible:isEligible,passengersResult};
    });
    let baseTotal=results.reduce((a,r)=>a+r.amount,0);
    const excLvl=EXCEPT_LEVELS.find(e=>e.id===exceptLevel);
    let exceptBonus=0,exceptOnSegId=null;
    if(excLvl&&excLvl.multiplier!==null&&exceptSegmentId){
      const target=results.find(r=>r.id===exceptSegmentId&&r.eligible);
      if(target){
        exceptOnSegId=target.id;
        const _n=target.tarif==="groupe"?1:(target.nbPass||1);
        const exceptionalTotal=target.multiPassMode&&target.passengersResult?.length>0
          ?target.passengersResult.reduce((s,p)=>s+(parseFloat(p.price)||0),0)*excLvl.multiplier
          :target.tarif==="max_loisirs"?(excLvl.fixedMax||0)*_n
          :target.price*_n*excLvl.multiplier;
        exceptBonus=Math.max(0,exceptionalTotal-target.amount);
      }
    }
    const total=baseTotal+exceptBonus;
    // Éligible si montant ≥ 4€ OU si au moins un segment a des points FID prime à verser
    const hasPrimePoints=results.some(r=>r.eligible&&(r.rateInfo?.points>0||(r.passengersResult||[]).some(p=>p.rateInfo?.points>0)));
    // Détecte les segments éligibles sans tarif sélectionné
    const missingTarif=segments.some(seg=>{
      const c=CARRIERS.find(c=>c.id===seg.carrier);
      if(!c||c.group!=="eligible")return false;
      if(seg.multiPassMode)return(seg.passengers||[]).some(p=>!p.tarif);
      return!seg.tarif;
    });
    const newComputed={results,baseTotal,total,exceptBonus,finalDelay,eligible:total>=4||hasPrimePoints,hasNonEligible:results.some(r=>!r.eligible),excLvl,exceptOnSegId,missingTarif};
    setComputed(newComputed);
  },[segments,finalDelay,exceptLevel,exceptSegmentId]);

  const addFrais   =()=>setFraisList(f=>[...f,emptyFrais()]);
  const removeFrais=id=>setFraisList(f=>f.filter(x=>x.id!==id));
  const updateFrais=(id,f,v)=>setFraisList(l=>l.map(x=>x.id===id?{...x,[f]:v}:x));

  // ── Calcul automatique frais ───────────────────────────────────
  useEffect(()=>{
    if(fraisList.length===0){setFraisComputed(null);return;}
    const results=fraisList.map(f=>{
      const def=FRAIS_TYPES.find(t=>t.id===f.type);
      const montant=parseFloat(f.montant)||0;
      const qty=f.type==="taxi_nuit"||f.type==="taxi_optimum"?1:(parseInt(f.qty)||1);
      const plafond=def.max!=null?def.max*qty:null;
      return{...f,def,montant,qty,plafond,rembourse:plafond!=null?Math.min(montant,plafond):montant};
    });
    setFraisComputed({results,total:results.reduce((a,r)=>a+r.rembourse,0)});
  },[fraisList]);

  const[resetConfirm,setResetConfirm]=useState(false);

  // ─── État onglet Dates ───────────────────────────────────────────
  const[dateAchat,setDateAchat]=useState(()=>lsLoad("dateAchat",""));
  const[dateActivation,setDateActivation]=useState(()=>lsLoad("dateActivation",""));
  const[dateDemande,setDateDemande]=useState(()=>{
    const saved=lsLoad("dateDemande",null);
    if(saved)return saved;
    const t=new Date();
    return t.toISOString().split("T")[0];
  });
  const[aboTypeId,setAboTypeId]=useState(()=>lsLoad("aboTypeId","max_actif"));
  const[aboMensualiteCustom,setAboMensualiteCustom]=useState(()=>lsLoad("aboMensualiteCustom",""));
  const[aboMensualiteVariable,setAboMensualiteVariable]=useState(()=>lsLoad("aboMensualiteVariable",""));
  const[contratPro,setContratPro]=useState(false);
  const[jourOuvrableMode,setJourOuvrableMode]=useState(false);
  const[retractType,setRetractType]=useState("abo"); // "abo" | "carte"
  const[datesSection,setDatesSection]=useState(null);
  const[baremeFilter,setBaremeFilter]=useState("all");
  const[openBareme,setOpenBareme]=useState(new Set(["standard"]));

  // ── Situation perturbée ────────────────────────────────────────
  const[spAvis,setSpAvis]=useState(""); // "j2","j1h00","apresH00","inopinee","bypass"
  const[spCos,setSpCos]=useState("");   // "oui","non"
  const[spVoyage,setSpVoyage]=useState(""); // "suppression","retard60"
  const[spRenoncement,setSpRenoncement]=useState(""); // "oui","non"
  const[openFraisCards,setOpenFraisCards]=useState(new Set(["sp","frais"]));

  // ── Persistance localStorage ──────────────────────────────────────
  useEffect(()=>{
    lsSave({tab,heureTheo,heureReel,sliderDelay,segments,
      dateAchat,dateActivation,dateDemande,aboTypeId,aboMensualiteCustom,aboMensualiteVariable});
  },[tab,heureTheo,heureReel,sliderDelay,segments,dateAchat,dateActivation,dateDemande,aboTypeId,aboMensualiteCustom,aboMensualiteVariable]);

  const aboType=ABONNEMENTS_MAX.find(a=>a.id===aboTypeId)||ABONNEMENTS_MAX[2];
  const mensualiteEffective=
    aboTypeId==="custom"?(parseFloat(aboMensualiteCustom)||0):
    aboType.type==="mensuel_variable"?(parseFloat(aboMensualiteVariable)||0):
    (aboType.mensualite||0);

  const retractResult=dateAchat?computeRetractation(dateAchat):null;
  const carteRetractResult=dateAchat?computeRetractationCarte(dateAchat):null;
  const resiliResult=(dateActivation&&dateDemande)?computeResiliation(dateActivation,dateDemande,mensualiteEffective,aboType):null;

  const resetAll=()=>{
    if(!resetConfirm){setResetConfirm(true);setTimeout(()=>setResetConfirm(false),2500);return;}
    setSegments([emptySegment()]);setHeureTheo("");setHeureReel("");setSliderDelay(0);
    setRupture(false);setComputed(null);setExceptLevel("none");setExceptSegmentId(null);
    setFraisList([]);setFraisComputed(null);
    setDateAchat("");setDateActivation("");
    setDateDemande(new Date().toISOString().split("T")[0]);
    setAboTypeId("max_actif");setAboMensualiteCustom("");setAboMensualiteVariable("");setContratPro(false);setJourOuvrableMode(false);setRetractType("abo");setDatesSection(null);
    setSpAvis("");setSpCos("");setSpVoyage("");setSpRenoncement("");
    setResetConfirm(false);
    try{localStorage.removeItem(LS_KEY);}catch{}
  };

  const MODE_COLOR=isG30?P.red:P.blue;
  const tabColors={"retard":P.red,"frais":P.blue,"bareme":"#009AA6","dates":"#6E1E78"};

  // ── Copier résultat ───────────────────────────────────────────────
  const[copied,setCopied]=useState(null); // null | "retard" | "frais"
  // ── Helper formatage taux pour copie ─────────────────────────────
  const fmtRate=(r)=>{
    if(!r.eligible)return"Non éligible BD30";
    const ri=r.rateInfo;
    if(!ri||ri.type===null)return"Aucune indemnisation";
    // Tarif standard / G30 → taux %
    if(ri.rate&&ri.rate>0)return`${ri.rate}% → ${r.amount.toFixed(2)} €`;
    // Prime titulaire → points FID seulement
    if(ri.points!==null&&ri.fixedAmount===null)return`${ri.points} pts FID`;
    // Prime FID + tiers → points + BAD
    if(ri.dual==="fid_tiers"){
      const pts=ri.points||0;
      const bad=ri.fixedAmount||0;
      return pts>0&&bad>0?`${pts} pts FID + ${bad.toFixed(2)} € BAD tiers`:pts>0?`${pts} pts FID`:`${bad.toFixed(2)} € BAD tiers`;
    }
    // Prime GVT + tiers → 2× BAD
    if(ri.dual==="gvt_tiers"){
      const bad=ri.fixedAmount||0;
      return`${bad.toFixed(2)} € BAD GVT + ${bad.toFixed(2)} € BAD tiers`;
    }
    // Max Loisirs / montant fixe
    if(ri.fixedAmount!==null)return`Forfait : ${ri.fixedAmount.toFixed(2)} €`;
    return ri.type||"—";
  };

  const copyResult=(type)=>{
    // Helper : label de tarif (couvre Standard, Max, Prime, Groupe)
    const getTarifLabel=(id)=>[...TARIFS,{id:"groupe",label:"Tarif Groupe"}].find(t=>t.id===id)?.label||id||"—";
    // Ligne par segment — gère même tarif, nbPass, multiPassMode et groupe
    const segLine=(r)=>{
      const carrier=r.carrier?r.carrier.label:"—";
      if(r.multiPassMode&&r.passengersResult&&r.passengersResult.length>0){
        const passLines=r.passengersResult.map((p,pi)=>{
          const tl=getTarifLabel(p.tarif);
          const ri=p.rateInfo;
          const rateStr=ri?.rate>0?`${ri.rate}%`:ri?.fixedAmount!=null?`${ri.fixedAmount}€ BAD`:ri?.points!=null?`${ri.points} pts`:"—";
          return`  Pass.${pi+1} · ${tl} · ${p.price>0?p.price.toFixed(2)+"€":"0€"} · ${rateStr} → ${p.amount.toFixed(2)}€`;
        }).join("\n");
        return`${carrier}\n${passLines}`;
      }
      const tl=getTarifLabel(r.tarif);
      const n=r.nbPass||1;
      const isMax=["max_loisirs","prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(r.tarif);
      const prixStr=r.tarif==="groupe"?`${r.price.toFixed(2)}€ groupe`:isMax?"0€":n>1?`${n}×${r.price.toFixed(2)}€`:`${r.price.toFixed(2)}€`;
      const ri=r.rateInfo;
      const rateStr=ri?.rate>0?`${ri.rate}%`:ri?.fixedAmount!=null?`${ri.fixedAmount}€ BAD`:ri?.points!=null?`${ri.points} pts`:"—";
      return`${carrier} · ${tl} · ${prixStr} · ${rateStr} → ${r.amount.toFixed(2)}€`;
    };
    let text="";
    if(type==="retard"&&computed){
      const mode=isG30?"G30":"BD30";
      const lines=[`${mode} · ${delayLabel(computed.finalDelay)}`];
      computed.results.forEach(r=>{if(r.eligible)lines.push(segLine(r));});
      if(computed.exceptBonus>0) lines.push(`Bonus exception (${computed.excLvl?.label||""}) : +${computed.exceptBonus.toFixed(2)}€`);
      if(!isG30||computed.results.length>1) lines.push(`Total : ${computed.total.toFixed(2)}€`);
      else lines[0]+=` · ${computed.total.toFixed(2)}€`;
      text=lines.join("\n");
    }else if(type==="frais"&&fraisComputed){
      const lines=fraisComputed.results.map(r=>{
        const plafond=r.def?.max!=null?` (plaf. ${r.plafond.toFixed(2)}€)`:"";
        return`${r.def?.label||r.type} · ${r.qty}×${r.montant.toFixed(2)}€${plafond} → ${r.rembourse.toFixed(2)}€`;
      });
      lines.push(`Total frais : ${fraisComputed.total.toFixed(2)}€`);
      text=lines.join("\n");
    }else if(type==="combined"){
      const parts=[];
      if(computed&&computed.eligible){
        const mode=isG30?"G30":"BD30";
        parts.push(`${mode} · ${delayLabel(computed.finalDelay)}`);
        computed.results.forEach(r=>{if(r.eligible)parts.push(segLine(r));});
        if(computed.exceptBonus>0) parts.push(`Bonus exception (${computed.excLvl?.label||""}) : +${computed.exceptBonus.toFixed(2)}€`);
        parts.push(`Total G30/BD30 : ${computed.total.toFixed(2)}€`);
      }
      if(fraisComputed&&fraisComputed.total>0){
        if(parts.length>0) parts.push("---");
        fraisComputed.results.forEach(r=>{
          const plafond=r.def?.max!=null?` (plaf. ${r.plafond.toFixed(2)}€)`:"";
          parts.push(`${r.def?.label||r.type} · ${r.qty}×${r.montant.toFixed(2)}€${plafond} → ${r.rembourse.toFixed(2)}€`);
        });
        parts.push(`Total frais : ${fraisComputed.total.toFixed(2)}€`);
      }
      const grandTotal=((computed&&computed.eligible?computed.total:0)+(fraisComputed&&fraisComputed.total>0?fraisComputed.total:0));
      if(computed&&fraisComputed&&computed.eligible&&fraisComputed.total>0)
        parts.push(`Total général : ${grandTotal.toFixed(2)}€`);
      text=parts.join("\n");
    }
    if(!text)return;
    // Enregistrer dans l'historique au moment où l'agent copie
    if(computed&&computed.eligible){
      const getTL=(id)=>[...TARIFS,{id:"groupe",label:"Tarif Groupe"}].find(t=>t.id===id)?.label||id||"—";
      pushHistory({
        ts:Date.now(),
        delay:computed.finalDelay,
        total:computed.total,
        mode:isG30?"G30":"BD30",
        segments:computed.results.map(r=>({
          carrier:r.carrier?r.carrier.label:"—",
          tarif:r.multiPassMode?"Multi-tarifs":getTL(r.tarif),
          price:parseFloat(r.price)||0,
          amount:r.amount,
          rate:r.rateInfo?.rate||null,
        })),
      });
    }
    navigator.clipboard.writeText(text).then(()=>{
      setCopied(type);
      setTimeout(()=>setCopied(null),2000);
    }).catch(()=>{
      const ta=document.createElement("textarea");
      ta.value=text;document.body.appendChild(ta);ta.select();
      document.execCommand("copy");document.body.removeChild(ta);
      setCopied(type);setTimeout(()=>setCopied(null),2000);
    });
  };

  // ── Styles partagés inline (ce qui ne peut pas être en CSS global) ──
  const inp={
    width:"100%",padding:"10px 13px",borderRadius:10,border:`1.5px solid ${P.border}`,
    fontSize:13,outline:"none",background:P.surface,boxSizing:"border-box",
    transition:"border-color .2s, box-shadow .2s",fontFamily:"inherit",color:P.text,
  };
  const sel={...inp,cursor:"pointer"};

  // ─────────────────────────────────────────────────────────────────
  return(
    <div className="calc-root" style={{fontFamily:"'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif",minHeight:"100vh",background:P.bg}}>

      {/* ── HEADER COMPACT ──────────────────────────────────────── */}
      <header style={{
        background:P.red,padding:"0 16px",height:42,
        display:"flex",alignItems:"center",justifyContent:"space-between",
        boxShadow:"0 1px 4px rgba(0,0,0,.18)",flexShrink:0,
        position:"sticky",top:0,zIndex:102,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <LogoApp size={36}/>
          <span style={{color:"white",fontWeight:800,fontSize:13,letterSpacing:"-.2px",whiteSpace:"nowrap"}}>
            Calculateur BD30/G30
          </span>
          <span style={{
            background:"rgba(255,255,255,.15)",color:"rgba(255,255,255,.8)",
            fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,
            letterSpacing:.8,textTransform:"uppercase",border:"1px solid rgba(255,255,255,.2)",
            display:isMobile?"none":"inline",
          }}>SNCF Voyageurs</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span style={{color:"rgba(255,255,255,.45)",fontSize:11,display:isMobile?"none":"inline"}}>PRR 2021 · En vigueur 01/01/2025</span>
          {/* ── Historique ── */}
          {history.length>0&&(
            <button onClick={()=>setShowHistory(h=>!h)} title="Historique des calculs (5 derniers)" style={{
              background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.25)",
              color:"white",borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:700,
              cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit",
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
              {!isMobile&&"Historique"}
              <span style={{background:"rgba(255,255,255,.25)",borderRadius:10,padding:"0 5px",fontSize:10}}>{history.length}</span>
            </button>
          )}
          {/* ── Dark mode toggle ── */}
          <button onClick={toggleDark} title={darkMode?"Mode clair (Alt+D)":"Mode sombre (Alt+D)"} style={{
            background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.25)",
            color:"white",borderRadius:8,padding:"3px 9px",fontSize:13,
            cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit",
            transition:"background .15s",
          }}>
            {darkMode
              ? <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            }
          </button>
        </div>
      </header>

      {/* ── TABS ────────────────────────────────────────────────── */}
      <div style={{
        background:P.surface,borderBottom:`1.5px solid ${P.border}`,
        display:"flex",padding:"0 14px",overflowX:"auto",WebkitOverflowScrolling:"touch",
        alignItems:"stretch",gap:0,position:"sticky",top:42,zIndex:100,
        boxShadow:"0 2px 12px rgba(0,0,0,.07)",
      }}>
        {TABS.filter(t=>t.id!=="bareme").map(t=>{
          const active=tab===t.id;
          const col=tabColors[t.id]||P.red;
          return(
            <React.Fragment key={t.id}>
              <button className={`tab-btn${active?" active":""}`}
                style={{"--tab-color":col}}
                role="tab"
                aria-selected={active}
                aria-controls={`panel-${t.id}`}
                onClick={()=>setTab(t.id)}>
                <span style={{fontSize:13,opacity:active?1:.55}} aria-hidden="true">{t.icon}</span>
                <span>{t.label}</span>
              </button>
              {/* Indicateur G30/BD30 — juste après l'onglet Retard */}
              {t.id==="retard"&&(
                <div aria-label={isG30?"Mode G30 actif":"Mode BD30 actif"} style={{
                  display:"flex",alignItems:"center",gap:5,
                  padding:"0 10px",
                  borderRight:`1px solid ${P.border}`,
                  userSelect:"none",pointerEvents:"none",
                }}>
                  {/* Puce animée */}
                  <div style={{
                    width:7,height:7,borderRadius:"50%",flexShrink:0,
                    background:isG30?P.red:P.blue,
                    boxShadow:isG30?`0 0 0 2px ${P.red}28`:`0 0 0 2px ${P.blue}28`,
                    transition:"background .25s,box-shadow .25s",
                  }}/>
                  {/* Texte mode */}
                  <span style={{
                    fontSize:10.5,fontWeight:700,
                    color:isG30?P.textMuted:P.textMuted,
                    letterSpacing:.5,
                    fontVariantCaps:"all-small-caps",
                  }}>
                    <span style={{color:isG30?P.red:P.blue}}>{isG30?"G30":"BD30"}</span>
                  </span>
                </div>
              )}
            </React.Fragment>
          );
        })}
        <div style={{flex:1}}/>
        {/* Barèmes — léger décalage avec séparateur visuel */}
        {(()=>{const t=TABS.find(x=>x.id==="bareme");const active=tab==="bareme";return(
          <div style={{display:"flex",alignItems:"stretch",borderLeft:`1.5px solid ${P.border}`,marginLeft:8}}>
            <button className={`tab-btn${active?" active":""}`}
              style={{"--tab-color":tabColors.bareme}}
              role="tab"
              aria-selected={active}
              aria-controls="panel-bareme"
              onClick={()=>setTab("bareme")}>
              <span style={{fontSize:13,opacity:active?1:.55}} aria-hidden="true">{t.icon}</span>
              <span>{t.label}</span>
            </button>
          </div>
        );})()}
        <button onClick={resetAll} style={{
          background:resetConfirm?P.redLight:"none",
          border:resetConfirm?`1px solid ${P.redMid}`:"none",
          borderRadius:resetConfirm?8:0,
          padding:resetConfirm?"4px 12px":"0 14px",
          fontSize:11,
          color:resetConfirm?P.red:P.textMuted,
          cursor:"pointer",
          letterSpacing:.2,fontWeight:resetConfirm?700:500,fontFamily:"inherit",
          transition:"all .2s",whiteSpace:"nowrap",
        }}>{resetConfirm?"⚠️ Confirmer ?":"↺ Réinit."}</button>
      </div>

      {/* ── MAIN ────────────────────────────────────────────────── */}
      <main style={{maxWidth:800,margin:"0 auto",padding:"16px 14px 80px"}}>

        {/* ══════════ TAB RETARD ══════════ */}
        {tab==="retard"&&(<div id="panel-retard" role="tabpanel" aria-label="Retard et compensation">

          {/* Bandeau mode */}
          <div style={{
            background:P.surface,borderRadius:12,
            border:`1.5px solid ${isG30?"#F8D0D8":"#B8D0F0"}`,
            borderLeft:`3.5px solid ${MODE_COLOR}`,
            padding:"12px 16px",marginBottom:12,fontSize:12.5,
            color:P.textMid,lineHeight:1.7,
            boxShadow:"0 1px 3px rgba(0,0,0,.04)",
          }}>
            {isG30
              ?<><strong style={{color:P.red}}>ℹ️ Mode G30 — Trajet sec</strong> — 1 seul segment. Transporteurs éligibles : <strong>TGV INOUI domestique</strong>, <strong>TGV international (filiale)</strong> et <strong>Intercités</strong>. Ajoutez un segment pour basculer en <strong style={{color:P.blue}}>BD30</strong>.</>
              :<><strong style={{color:P.blue}}>ℹ️ Mode BD30 — Billet Direct</strong> — voyages ≥ 2 segments en une seule transaction. Les billets <span style={{color:P.green,fontWeight:700}}>Abonnés Max et Forfaits</span> (0€) suivent un barème G30 spécifique en montants fixes. Supprimez des segments pour repasser en <strong style={{color:P.red}}>G30</strong>.
              <span style={{
                display:"block",marginTop:7,paddingTop:7,
                borderTop:`1px solid #B8D0F0`,
                fontSize:11.5,color:P.blue,lineHeight:1.65,
              }}>
                ⚠️ <strong>Retard imputé à un transporteur non éligible</strong> — seul le retard enregistré <strong>sur le(s) segment(s) éligible(s)</strong> est pris en compte. Le retard global calculé via un train de report ne s'applique pas.
              </span>
              </>
            }
          </div>

          {/* Segments */}
          <div className="card card-anim">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <h2 className="section-title" style={{margin:0}}><IconTitle icon={Icon.train} label="Segments du voyage"/></h2>
                <span style={{
                  padding:"3px 12px",borderRadius:20,fontSize:11,fontWeight:800,
                  background:isG30?"#FDE8EE":"#D8EEFF",
                  color:isG30?P.red:P.blue,
                  border:`1px solid ${isG30?"#F0C0C0":"#A0C0E8"}`,
                }}>{isG30?"G30 — Trajet sec":"BD30 — Billet Direct"}</span>
              </div>
              <button onClick={addSegment} style={{
                background:P.red,color:"white",border:"none",
                borderRadius:8,padding:"7px 16px",fontSize:12,fontWeight:700,
                cursor:"pointer",boxShadow:"0 2px 10px rgba(155,0,64,.25)",fontFamily:"inherit",
              }}>+ Segment</button>
            </div>

            {segments.map((seg,idx)=>{
              const c=CARRIERS.find(c=>c.id===seg.carrier);
              const isNE=c&&c.group==="non_eligible";
              const availTarifs=getTarifsForCarrier(seg.carrier);
              const tarifInfo=availTarifs.find(t=>t.id===seg.tarif);
              const isMax=["max_loisirs","prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(seg.tarif);
              const isGroupe=seg.tarif==="groupe";
              const segColor=isNE?P.amber:(c?c.color:P.red);
              const availableCarriers=isG30?CARRIERS.filter(c=>G30_CARRIER_IDS.includes(c.id)):CARRIERS;

              // Couleur de fond selon tarif actif
              let segBg=P.surface2,segBorder=P.border;
              if(isNE){segBg=darkMode?P.amberLight:"#FFF3E0";segBorder=darkMode?P.amberMid:"#F0C090";}
              else if(seg.tarif==="prime_titulaire"){segBg=P.blueLight;segBorder=P.blueMid;}
              else if(seg.tarif==="prime_fid_tiers"){segBg=P.purpleLight;segBorder=darkMode?"#3A2858":"#C8A8F0";}
              else if(seg.tarif==="prime_gvt_tiers"){segBg=P.purpleLight;segBorder=darkMode?"#3A2858":"#D0A0E0";}
              else if(isMax){segBg=P.greenLight;segBorder=darkMode?"#1A3A20":"#A8DFC0";}
              else if(isGroupe){segBg=darkMode?"#0D1F14":"#F0FAF3";segBorder="#60C898";}

              const showToggle=!isNE&&!isGroupe&&seg.carrier&&availTarifs.length>0;
              const passengers=seg.passengers||[];

              return(
                <div key={seg.id} className="seg-card seg-anim" style={{
                  marginBottom:10,padding:"16px 18px",borderRadius:12,
                  background:segBg,border:`1px solid ${segBorder}`,
                }}>
                  {/* ── Ligne 1 : numéro + transporteur + supprimer ── */}
                  <div style={{display:"grid",gridTemplateColumns:"30px minmax(0,1fr) auto",gap:10,alignItems:"start"}}>
                    <div style={{
                      width:28,height:28,borderRadius:"50%",
                      background:`${segColor}22`,color:segColor,
                      border:`1.5px solid ${segColor}44`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontWeight:800,fontSize:11,flexShrink:0,marginTop:18,
                    }}>{idx+1}</div>

                    {/* Transporteur */}
                    <div>
                      <label className="field-label">Transporteur</label>
                      {isG30
                        ?<select aria-label="Transporteur" value={seg.carrier} onChange={e=>changeCarrier(seg.id,e.target.value)} style={{...sel,color:seg.carrier===""?P.textMuted:P.text}}>
                          <option value="" disabled>— Sélectionner un transporteur —</option>
                          {availableCarriers.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                        </select>
                        :<select aria-label="Transporteur" value={seg.carrier} onChange={e=>changeCarrier(seg.id,e.target.value)} style={{...sel,borderColor:isNE?"#F0C090":P.border,background:isNE?"#FFF3E0":"white",color:seg.carrier===""?P.textMuted:P.text}}>
                          <option value="" disabled>— Sélectionner un transporteur —</option>
                          <optgroup label="✅ Éligibles BD30">{CARRIERS.filter(c=>c.group==="eligible").map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</optgroup>
                          <optgroup label="❌ Hors périmètre BD30">{CARRIERS.filter(c=>c.group==="non_eligible").map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</optgroup>
                        </select>
                      }
                      {isNE&&(
                        <div style={{fontSize:11,color:seg.carrier==="trsi"?P.orange:P.amber,marginTop:5,lineHeight:1.6,fontWeight:seg.carrier==="trsi"?600:400}}>
                          {seg.carrier==="trsi"
                            ?<>⚠️ TRSI — Billet Combiné (2 contrats distincts). Hors périmètre BD30. G30 sur segment TGV/INT uniquement. Trains n° 17466–17499 · Marseille–Toulon–Nice.</>
                            :<>⚠️ Hors périmètre BD30 — aucune indemnisation sur ce segment.{seg.carrier==="coop_int"?" Bi-segment: G30 sur segment TGV/filiale seul.":""}{seg.carrier==="ter_autocar"?" Autres segments compensables via G30.":""}</>
                          }
                        </div>
                      )}
                    </div>

                    {/* Supprimer */}
                    {segments.length>1
                      ?<button onClick={()=>removeSegment(seg.id)} style={{
                          background:"rgba(0,0,0,0.06)",border:"none",color:P.textMuted,
                          borderRadius:"50%",width:28,height:28,cursor:"pointer",
                          marginTop:20,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",
                        }}>✕</button>
                      :<div/>
                    }
                  </div>

                  {/* ── Section Tarif + Voyageurs ── */}
                  {!isNE&&seg.carrier&&(
                    <div style={{marginTop:13,paddingTop:13,borderTop:`1px dashed ${segBorder}`}}>

                      {/* Label Tarif + Toggle sur la même ligne */}
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:6}}>

                      <div>✅ Accord billet TGV / INT</div>

                    <div style={{fontSize:11,lineHeight:1.75,color:P.text}}>
                      <div>Dernier TRSI du jour manqué</div>

                    </div>
                  </div>
                </div>
              </div>

              {/* ── Bloc 2 : TRSI retardé → TGV/INT manqué ── */}
              <div>

                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>

                    <div style={{fontSize:11,lineHeight:1.75,color:P.text}}>

                    <tr key={i} style={{background:i%2===0?"white":P.surface2}}>
                      <td style={{fontWeight:600,color:row.color}}>
                        {row.label}
                        {row.note&&<div style={{fontSize:11,fontWeight:500,color:P.textMuted,marginTop:2}}>{row.note}</div>}
                      </td>
                      <td style={{textAlign:"center",fontWeight:600,color:P.text,fontSize:12}}>{row.mensualite}</td>
                      <td style={{textAlign:"center",color:P.textMid}}>{row.engagement}</td>
                      <td style={{textAlign:"center",color:P.green,fontWeight:600,fontSize:12}}>{row.free}</td>
                      <td style={{textAlign:"center",fontWeight:700,color:P.red,fontSize:12}}>{row.frais}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="alert-info" style={{marginTop:12,fontSize:11.5}}>
              ℹ️ Les tarifs Max Actif / Actif+ varient selon l'origine/destination. Se référer aux CGV SNCF et à l'espace abonné pour les montants exacts. · Résiliation par courrier, en agence ou via l'espace client.
            </div>
          </div>
          </React.Fragment>)} {/* fin datesSection==="resiliation" */}

        </div>)}

      </main>

      {/* ── PANNEAU HISTORIQUE ───────────────────────────────────── */}
      {showHistory&&(
        <div className={darkMode?"card-glass":""} style={{
          position:"fixed",top:0,right:0,bottom:0,zIndex:300,
          width:"min(380px,100vw)",
          background:darkMode?"rgba(22,22,26,.88)":P.surface,
          borderLeft:`1.5px solid ${darkMode?"rgba(255,255,255,.08)":P.border}`,
          boxShadow:darkMode?"-8px 0 48px rgba(0,0,0,.6), inset 1px 0 0 rgba(255,255,255,.05)":"-8px 0 32px rgba(0,0,0,.18)",
          backdropFilter:darkMode?"blur(20px)":"none",
          WebkitBackdropFilter:darkMode?"blur(20px)":"none",
          display:"flex",flexDirection:"column",
          animation:"fadeSlideIn .22s cubic-bezier(.22,.68,0,1.2)",
        }}>
          {/* Header panneau */}
          <div style={{
            padding:"14px 16px",borderBottom:`1px solid ${P.border}`,
            display:"flex",alignItems:"center",justifyContent:"space-between",
            background:P.surface,flexShrink:0,
          }}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={P.red} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
              <span style={{fontWeight:800,fontSize:14,color:P.text}}>Historique des calculs</span>
              <span style={{background:P.redLight,color:P.red,borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700}}>{history.length}/5</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {history.length>0&&(
                <button onClick={()=>{setHistory([]);try{localStorage.removeItem("bd30_history_v30");}catch{}}} style={{
                  background:"none",border:`1px solid ${P.border}`,color:P.textMuted,
                  borderRadius:6,padding:"3px 9px",fontSize:11,cursor:"pointer",fontFamily:"inherit",
                }}>Effacer</button>
              )}
              <button onClick={()=>setShowHistory(false)} style={{
                background:P.surface2,border:`1px solid ${P.border}`,color:P.text,
                borderRadius:8,width:28,height:28,fontSize:15,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",
              }}>×</button>
            </div>
          </div>
          {/* Liste */}
          <div style={{overflowY:"auto",flex:1,padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
            {history.length===0?(
              <div style={{textAlign:"center",color:P.textMuted,fontSize:13,marginTop:40}}>
                Aucun calcul éligible enregistré
              </div>
            ):history.map((h,i)=>{
              const d=new Date(h.ts);
              const dateStr=d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
              const timeStr=d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
              return(
                <div key={h.ts} className="card" style={{
                  padding:"12px 14px",marginBottom:0,
                  borderLeft:`3px solid ${P.red}`,
                  animation:`fadeSlideUp .2s ${i*0.04}s both`,
                }}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{background:P.redLight,color:P.red,borderRadius:6,padding:"1px 7px",fontSize:10,fontWeight:700}}>{h.mode}</span>
                      <span style={{fontSize:11,color:P.textMuted}}>{dateStr} · {timeStr}</span>
                    </div>
                    <span style={{fontWeight:900,fontSize:17,color:P.green,fontVariantNumeric:"tabular-nums",fontFamily:"'Inter','DM Sans',sans-serif"}}>
                      {h.total.toFixed(2)} €
                    </span>
                  </div>
                  <div style={{fontSize:11,color:P.textMid,marginBottom:4}}>
                    ⏱ {delayLabel(h.delay)}
                  </div>
                  {h.segments.map((s,j)=>(
                    <div key={j} style={{
                      fontSize:11,color:P.textMuted,
                      padding:"4px 0",
                      borderTop:j>0?`1px solid ${P.border}`:"none",
                      display:"flex",justifyContent:"space-between",alignItems:"center",
                    }}>
                      <span>{s.carrier} · {s.tarif}</span>
                      <span style={{fontWeight:700,color:P.text}}>
                        {s.rate!=null?`${s.rate}%`:"—"} → {s.amount.toFixed(2)} €
                      </span>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
          <div style={{padding:"10px 14px",borderTop:`1px solid ${P.border}`,fontSize:10.5,color:P.textMuted,textAlign:"center",flexShrink:0}}>
            5 derniers résultats éligibles · stockés localement
          </div>
        </div>
      )}
      {/* Overlay cliquable pour fermer le panneau */}
      {showHistory&&(
        <div onClick={()=>setShowHistory(false)} style={{
          position:"fixed",inset:0,zIndex:299,background:"rgba(0,0,0,.35)",
          animation:"fadeSlideUp .15s ease",
        }}/>
      )}

      {/* ── BARRE RÉSULTAT FIXE ─────────────────────────────────── */}
      {/* ── STEPPER FLOTTANT G30 ───────────────────────────────────── */}
      {tab==="retard"&&(()=>{
        const step1=segments.length>0&&segments[0].carrier!=="";
        const step2=step1&&segments[0].tarif!=="";
        const step3=step2&&segments.some(s=>parseFloat(s.price)>0||["max_loisirs","prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(s.tarif));
        const step4=step3&&finalDelay>0;
        const step5=!!(computed&&computed.eligible);
        const allDone=step5;
        if(allDone) return null; /* masqué quand résultat éligible visible dans le bandeau bas */
        const steps=[
          {label:"Train",   done:step1},
          {label:"Tarif",   done:step2},
          {label:"Prix",    done:step3},
          {label:"Retard",  done:step4},
          {label:"Résultat",done:step5},
        ];
        const doneCount=steps.filter(s=>s.done).length;
        return(
          <div style={{
            position:"fixed",top:90,right:14,zIndex:150,
            background:P.surface,
            border:`1.5px solid ${P.border}`,
            borderRadius:14,
            boxShadow:"0 4px 20px rgba(0,0,0,.13)",
            padding:"10px 14px",
            display:"flex",flexDirection:"column",gap:6,
            minWidth:110,
          }}>
            {/* Titre compact */}
            <div style={{
              fontSize:9.5,fontWeight:800,letterSpacing:.8,
              textTransform:"uppercase",color:P.textMuted,
              marginBottom:2,textAlign:"center",
            }}>G30 — {doneCount}/5</div>

            {/* Barre de fond animée */}
            <div style={{position:"relative",height:3,borderRadius:3,background:P.border,overflow:"hidden",marginBottom:4}}>
              <div style={{
                position:"absolute",left:0,top:0,bottom:0,borderRadius:3,
                width:`${(doneCount/5)*100}%`,
                background:P.green,
                transition:"width .4s cubic-bezier(.22,.68,0,1.2)",
              }}/>
            </div>

            {/* Étapes verticales */}
            {steps.map((s,i)=>{
              const isActive=s.done;
              const isCurrent=!s.done&&(i===0||(steps[i-1]&&steps[i-1].done));
              return(
                <div key={s.label} style={{
                  display:"flex",alignItems:"center",gap:8,
                }}>
                  {/* Cercle */}
                  <div style={{
                    width:20,height:20,borderRadius:"50%",flexShrink:0,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    background:isActive?P.green:isCurrent?"rgba(155,0,64,.1)":P.bg,
                    border:`2px solid ${isActive?P.green:isCurrent?P.red:P.border}`,
                    transition:"all .3s ease",
                    boxShadow:isActive?`0 1px 6px ${P.green}55`:"none",
                    fontSize:9,fontWeight:800,
                    color:isActive?"white":isCurrent?P.red:P.textMuted,
                  }}>
                    {isActive
                      ?<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                      :<span>{i+1}</span>
                    }
                  </div>
                  {/* Label */}
                  <span style={{
                    fontSize:11,
                    fontWeight:isActive?700:isCurrent?600:400,
                    color:isActive?P.green:isCurrent?P.red:P.textMuted,
                    transition:"color .3s",
                  }}>{s.label}</span>
                  {/* Dot indicateur état courant */}
                  {isCurrent&&(
                    <div style={{width:5,height:5,borderRadius:"50%",background:P.red,marginLeft:"auto",animation:"pulse 1.4s infinite"}}/>
                  )}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* ── BARRE RÉSULTAT FLOTTANTE UNIVERSELLE ───────────────────── */}
      {(()=>{
        const hasG30   = computed&&computed.eligible;
        const hasFrais = fraisComputed&&fraisComputed.total>0;
        if(!hasG30&&!hasFrais) return null;
        const showBoth  = hasG30&&hasFrais;
        const primary   = hasG30?"retard":"frais";
        const bg        = hasG30
          ?"linear-gradient(135deg,#0A5530,#0F6B3C)"
          :`linear-gradient(135deg,#002B7A,${P.blue})`;
        const grandTotal = (hasG30?computed.total:0)+(hasFrais?fraisComputed.total:0);
        const onCurrentTab = tab===primary;

        /* Séparateur vertical */
        const Sep=()=><div style={{width:1,height:28,background:"rgba(255,255,255,.2)",flexShrink:0}}/>;

        return(
          <div role="status" aria-live="polite" aria-atomic="true" style={{
            position:"fixed",bottom:0,left:0,right:0,zIndex:200,
            background:bg,
            padding:"7px 16px",display:"flex",alignItems:"center",gap:10,
            boxShadow:"0 -4px 20px rgba(0,0,0,.22)",
          }}>

            {/* ── Bloc 1 : contexte (mode + retard) ── */}
            <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
              <span style={{background:"rgba(255,255,255,.22)",borderRadius:5,padding:"2px 8px",fontSize:10.5,fontWeight:800,color:"white",letterSpacing:.5}}>
                {hasG30?(isG30?"G30":"BD30"):"FRAIS"}
              </span>
              {hasG30&&(
                <span style={{color:"rgba(255,255,255,.8)",fontSize:11.5}}>
                  ✓ <strong style={{color:"white"}}>{delayLabel(computed.finalDelay)}</strong>
                  {computed.exceptBonus>0&&<span style={{color:"#FFD700",marginLeft:6,fontSize:10.5}}>⭐ +{computed.exceptBonus.toFixed(2)} €</span>}
                </span>
              )}
              {!hasG30&&hasFrais&&(
                <span style={{color:"rgba(255,255,255,.8)",fontSize:11.5}}>
                  🧾 <strong style={{color:"white"}}>{fraisComputed.results.length} poste{fraisComputed.results.length>1?"s":""}</strong>
                </span>
              )}
              {!onCurrentTab&&(
                <button onClick={()=>setTab(primary)} style={{
                  background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.22)",
                  color:"rgba(255,255,255,.85)",borderRadius:6,padding:"2px 8px",fontSize:10.5,fontWeight:600,
                  cursor:"pointer",fontFamily:"inherit",letterSpacing:.2,
                }}>← Voir</button>
              )}
            </div>

            <Sep/>

            {/* ── Bloc 2 : détail des montants ── */}
            <div style={{display:"flex",alignItems:"center",gap:14,flex:1,justifyContent:"center",flexWrap:"wrap"}}>
              {/* G30/BD30 */}
              {hasG30&&(
                <button onClick={()=>setTab("retard")} style={{
                  background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"2px 6px",
                  borderRadius:6,transition:"background .15s",
                }}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.1)"}
                onMouseLeave={e=>e.currentTarget.style.background="none"}>
                  <span style={{fontSize:9.5,fontWeight:700,color:"rgba(255,255,255,.6)",letterSpacing:.8,textTransform:"uppercase"}}>{isG30?"G30":"BD30"}</span>
                  <span style={{fontSize:17,fontWeight:900,color:"white",fontVariantNumeric:"tabular-nums",letterSpacing:"-.3px",fontFamily:"'Inter','DM Sans',sans-serif"}}>
                    <AnimatedNumber value={computed.total}/> €
                  </span>
                </button>
              )}
              {/* Séparateur + quand les deux actifs */}
              {showBoth&&(
                <span style={{color:"rgba(255,255,255,.45)",fontSize:18,fontWeight:300,lineHeight:1}}>+</span>
              )}
              {/* Frais */}
              {hasFrais&&(
                <button onClick={()=>setTab("frais")} style={{
                  background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"2px 6px",
                  borderRadius:6,transition:"background .15s",
                }}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.1)"}
                onMouseLeave={e=>e.currentTarget.style.background="none"}>
                  <span style={{fontSize:9.5,fontWeight:700,color:"rgba(255,255,255,.6)",letterSpacing:.8,textTransform:"uppercase"}}>Frais</span>
                  <span style={{fontSize:17,fontWeight:900,color:"white",fontVariantNumeric:"tabular-nums",letterSpacing:"-.3px",fontFamily:"'Inter','DM Sans',sans-serif"}}>
                    <AnimatedNumber value={fraisComputed.total}/> €
                  </span>
                </button>
              )}
              {/* Total général quand les deux actifs */}
              {showBoth&&(
                <>
                  <span style={{color:"rgba(255,255,255,.45)",fontSize:18,fontWeight:300,lineHeight:1}}>=</span>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"2px 6px"}}>
                    <span style={{fontSize:9.5,fontWeight:700,color:"rgba(255,255,255,.6)",letterSpacing:.8,textTransform:"uppercase"}}>Total</span>
                    <span style={{fontSize:20,fontWeight:900,color:"#FFD700",fontVariantNumeric:"tabular-nums",letterSpacing:"-.4px",fontFamily:"'Inter','DM Sans',sans-serif"}}>
                      <AnimatedNumber value={grandTotal}/> €
                    </span>
                  </div>
                </>
              )}
            </div>

            <Sep/>

            {/* ── Bloc 3 : boutons copier ── */}
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              {showBoth&&(
                <button onClick={()=>copyResult("combined")} title="Copier G30 + Frais" style={{
                  background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.28)",
                  color:"white",borderRadius:8,padding:"5px 11px",fontSize:11,fontWeight:700,
                  cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit",
                }}>
                  {copied==="combined"
                    ?<><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Copié !</>
                    :"📋 Tout copier"
                  }
                </button>
              )}
              <button onClick={()=>copyResult(primary)} title="Copier le résultat principal" style={{
                background:"rgba(255,255,255,.18)",border:"1px solid rgba(255,255,255,.3)",
                color:"white",borderRadius:8,padding:"5px 11px",fontSize:11,fontWeight:700,
                cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit",
              }}>
                {copied===primary
                  ?<><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Copié</>
                  :<><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copier</>
                }
              </button>
              {/* Montant principal répété à droite pour lecture rapide */}
              <div style={{
                color:"white",fontSize:23,fontWeight:900,
                fontVariantNumeric:"tabular-nums",
                fontFamily:"'Inter','DM Sans',sans-serif",letterSpacing:"-.5px",
                minWidth:80,textAlign:"right",
              }}>
                <AnimatedNumber value={showBoth?grandTotal:(hasG30?computed.total:fraisComputed.total)}/>{" €"}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── FOOTER ─────────────────────────────────────────────── */}
      <footer style={{
        textAlign:"center",padding:"14px",fontSize:11.5,
        color:P.textMuted,borderTop:`1px solid ${P.border}`,
        background:P.surface,letterSpacing:.2,
      }}>
        Calculateur BD30 / G30 · <strong style={{color:P.red}}>version 3.0</strong> · by PDSA · Règlement PRR 2021 · En vigueur au 02/03/2026 · À titre indicatif uniquement
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  
  </script>
</body>
</html>
