function getRateInfo(carrierId,tarif,delayMin){
  if(delayMin<30) return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
  if(tarif==="max_loisirs"){
    const table=carrierId==="ouigo"?RATES_MAX_LOISIRS.ouigo:RATES_MAX_LOISIRS.default;
    for(const[mn,mx,amt,type]of table)if(delayMin>=mn&&delayMin<=mx)return{rate:0,fixedAmount:amt,points:null,dual:null,type};
    return{rate:0,fixedAmount:null,points:null,type:null};
  }
  if(tarif==="prime_titulaire"){
    for(const[mn,mx,pts,type]of RATES_PRIME_TITULAIRE)if(delayMin>=mn&&delayMin<=mx)return{rate:0,fixedAmount:null,points:pts,dual:null,type};
    return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
  }
  if(tarif==="prime_fid_tiers"){
    const pts=getPrimePts(delayMin);const bad=getPrimeBadAmount(delayMin);
    if(pts>0||bad>0)return{rate:0,fixedAmount:bad,points:pts,dual:"fid_tiers",type:"BAD tiers + Pts FID"};
    return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
  }
  if(tarif==="prime_gvt_tiers"){
    const bad=getPrimeBadAmount(delayMin);
    if(bad>0)return{rate:0,fixedAmount:bad,fixedAmount2:bad,points:null,dual:"gvt_tiers",type:"BAD GVT + BAD tiers"};
    return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
  }
  const table=RATES_STANDARD[carrierId];
  if(!table)return{rate:0,fixedAmount:null,points:null,type:null};
  for(const[mn,mx,rate,type]of table)if(delayMin>=mn&&delayMin<=mx)return{rate,fixedAmount:null,points:null,dual:null,type};
  return{rate:0,fixedAmount:null,points:null,dual:null,type:null};
}

function computeSegmentAmount(price,tarif,rateInfo){
  if(tarif==="max_loisirs"||tarif==="prime_fid_tiers"||tarif==="prime_gvt_tiers")return rateInfo.fixedAmount||0;
  if(tarif==="prime_titulaire")return 0;
  if(rateInfo.rate===0)return 0;
  return(parseFloat(price)||0)*rateInfo.rate/100;
}

function computeDelayMinutes(theo,reel){
  if(!theo||!reel)return null;
  const[th,tm]=theo.split(":").map(Number);
  const[rh,rm]=reel.split(":").map(Number);
  let diff=(rh*60+rm)-(th*60+tm);
  if(diff<0)diff+=24*60;
  return diff;
}

  if(min<30)  return`${min} min (< 30 min)`;
  if(min<60)  return`${min} min (30–59 min)`;
  if(min<120) return`${min} min (60–119 min)`;
  if(min<180) return`${min} min (120–179 min)`;
  if(min<240) return`${min} min (180–239 min)`;
  return`${min} min (≥ 4h)`;
}

function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function addMonths(date,n){const d=new Date(date);d.setMonth(d.getMonth()+n);return d;}
function lastDayOfMonth(date){return new Date(date.getFullYear(),date.getMonth()+1,0);}
function fmtDate(d){if(!d)return"—";return d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function diffDays(a,b){return Math.round((b-a)/(1000*60*60*24));}

// ─── Jours fériés France ─────────────────────────────────────────
function getEaster(year){
  // Algorithme de Butcher
  const a=year%19,b=Math.floor(year/100),c=year%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=((h+l-7*m+114)%31)+1;
  return new Date(year,month-1,day);
}
function getJoursFeries(year){
  const e=getEaster(year);
  const fmtKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const fixed=[
    new Date(year,0,1),  // Nouvel An
    new Date(year,4,1),  // Fête du Travail
    new Date(year,4,8),  // Victoire 1945
    new Date(year,6,14), // Fête Nationale
    new Date(year,7,15), // Assomption
    new Date(year,10,1), // Toussaint
    new Date(year,10,11),// Armistice
    new Date(year,11,25),// Noël
  ];
  const mobile=[
    addDays(e,1),  // Lundi de Pâques
    addDays(e,39), // Ascension
    addDays(e,50), // Lundi de Pentecôte
  ];
  return new Set([...fixed,...mobile].map(fmtKey));
}
function isJourFerie(date){
  const y=date.getFullYear();
  const feries=getJoursFeries(y);
  const key=`${y}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
  return feries.has(key);
}
function isDimanche(date){return date.getDay()===0;}
function isSamedi(date){return date.getDay()===6;}
function isJourNonOuvrable(date){return isDimanche(date)||isJourFerie(date);}
function prochaineJourOuvrable(date){
  let d=new Date(date);
  d.setDate(d.getDate()+1);
  while(isJourNonOuvrable(d)){d=addDays(d,1);}
  return d;
}
function labelJourFerie(date){
  // Retourne le nom du jour férié si applicable
  const year=date.getFullYear();
  const e=getEaster(year);
  const same=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
  const checks=[
    [new Date(year,0,1),"Jour de l'An"],
    [addDays(e,1),"Lundi de Pâques"],
    [new Date(year,4,1),"Fête du Travail"],
    [new Date(year,4,8),"Victoire 1945"],
    [addDays(e,39),"Ascension"],
    [addDays(e,50),"Lundi de Pentecôte"],
    [new Date(year,6,14),"Fête Nationale"],
    [new Date(year,7,15),"Assomption"],
    [new Date(year,10,1),"Toussaint"],
    [new Date(year,10,11),"Armistice"],
    [new Date(year,11,25),"Noël"],
  ];
  for(const[d,name]of checks)if(same(d,date))return name;
  return null;
}

function computeRetractation(dateAchat){
  if(!dateAchat)return null;
  const achat=new Date(dateAchat);
  const limiteCalendaire=addDays(achat,14);
  const today=new Date();today.setHours(0,0,0,0);
  const limiteNonOuvrable=isJourNonOuvrable(limiteCalendaire);
  const limiteReportee=limiteNonOuvrable?prochaineJourOuvrable(limiteCalendaire):limiteCalendaire;
  const ferieLabel=isJourFerie(limiteCalendaire)?labelJourFerie(limiteCalendaire):null;
  const expired=today>limiteReportee;
  const remaining=diffDays(today,limiteReportee);
  return{achat,limiteCalendaire,limiteNonOuvrable,limiteReportee,ferieLabel,expired,remaining};
}

// Règle spécifique Cartes Avantages :
//  - délai de 14 jours démarre au 1er JOUR OUVRÉ après l'achat
//  - la date limite est le 1er JOUR OUVRÉ après la fin du délai de 14 jours
function computeRetractationCarte(dateAchat){
  if(!dateAchat)return null;
  const achat=new Date(dateAchat);
  const today=new Date();today.setHours(0,0,0,0);
  // 1er jour ouvré après l'achat (le jour d'achat ne compte pas)
  const premierJourOuvre=prochaineJourOuvrable(achat);
  // J+14 à partir de ce 1er jour ouvré
  const limiteCalendaire=addDays(premierJourOuvre,14);
  // La date limite effective = 1er jour ouvré après cette date
  const limiteNonOuvrable=isJourNonOuvrable(limiteCalendaire);
  const limiteReportee=limiteNonOuvrable?prochaineJourOuvrable(limiteCalendaire):limiteCalendaire;
  const ferieLabel=isJourFerie(limiteCalendaire)?labelJourFerie(limiteCalendaire):null;
  const ferieStartLabel=isJourFerie(premierJourOuvre)?labelJourFerie(premierJourOuvre):null;
  const expired=today>limiteReportee;
  const remaining=diffDays(today,limiteReportee);
  return{achat,premierJourOuvre,ferieStartLabel,limiteCalendaire,limiteNonOuvrable,limiteReportee,ferieLabel,expired,remaining};
}

function computeResiliation(dateActivation,dateDemande,mensualite,aboData){
  if(!dateActivation||!dateDemande)return null;
  const activationSaisie=new Date(dateActivation);
  const demande=new Date(dateDemande);
  const aboType=aboData.type;

  // Carte Liberté = valable 1 an, pas d'abonnement mensuel
  if(aboType==="annuel"){
    const finValidite=addMonths(activationSaisie,12);
    demande.setHours(0,0,0,0);finValidite.setHours(0,0,0,0);activationSaisie.setHours(0,0,0,0);
    return{type:"annuel",activation:activationSaisie,finValidite,demande,
      prixSansContratPro:aboData.prixSansContratPro,prixAvecContratPro:aboData.prixAvecContratPro};
  }

  // ── Max Actif/Actif+ : activation toujours le 1er du mois ─────
  let activation=activationSaisie;
  let activationCorrigee=false;
  if(aboData.debutPremierDuMois&&activationSaisie.getDate()!==1){
    activation=new Date(activationSaisie.getFullYear(),activationSaisie.getMonth(),1);
    activationCorrigee=true;
  }

  const finEngagementInitial=addMonths(activation,12);
  demande.setHours(0,0,0,0);finEngagementInitial.setHours(0,0,0,0);activation.setHours(0,0,0,0);
  const enEngagementInitial=demande<finEngagementInitial;
  const joursRestants=enEngagementInitial?diffDays(demande,finEngagementInitial):0;

  // ── Blocage 3 premiers mois (Max Jeune / Max Senior) ──────────
  const finBlocage3mois=aboData.blocage3mois?addMonths(activation,3):null;
  if(finBlocage3mois)finBlocage3mois.setHours(0,0,0,0);
  const enBlocage=!!finBlocage3mois&&demande<finBlocage3mois;
  const joursBlocageRestants=enBlocage?diffDays(demande,finBlocage3mois):0;

  // Frais selon type
  let frais=0;
  let fraisLabel="";
  if(enEngagementInitial){
    if(aboData.fraisResil==="forfait15"){frais=15;fraisLabel="15 € (forfait CGV)";}
    else if(aboData.fraisResil==="mensualite"){frais=mensualite||0;fraisLabel=mensualite?`${mensualite} € (1 mensualité)`:"1 mensualité (renseigner le tarif)";}
  }

  // ── Deadline et date d'effet ───────────────────────────────────
  // Pour mois glissants (Jeune/Senior) : la facturation tombe le même jour que
  // l'activation chaque mois. La deadline = date de facturation du mois - 5 jours.
  // Pour mois fixes (Actif/Actif+) : date de facturation = 1er du mois suivant.
  const datePourCalcul=enBlocage?finBlocage3mois:demande;
  let deadline, effetDate;

  if(aboData.glissant){
    const jourFacturation=activation.getDate();
    if(enBlocage){
      // La fin du blocage (M+3) tombe exactement sur la date anniversaire :
      // c'est la 1ère date d'effet possible. Deadline = finBlocage3mois - 5 jours.
      effetDate=new Date(finBlocage3mois);
      deadline=addDays(finBlocage3mois,-5);
    }else{
      // Hors blocage : prochaine date anniversaire mensuelle
      const dernierJourMoisCourant=lastDayOfMonth(datePourCalcul).getDate();
      const jourEffectif=Math.min(jourFacturation,dernierJourMoisCourant);
      const facturationCeMois=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth(),jourEffectif);
      facturationCeMois.setHours(0,0,0,0);
      const deadlineCeMois=addDays(facturationCeMois,-5);
      if(datePourCalcul<=deadlineCeMois){
        deadline=deadlineCeMois;
        effetDate=facturationCeMois;
      }else{
        const moisSuivant=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth()+1,1);
        const dernierJourMoisSuivant=lastDayOfMonth(moisSuivant).getDate();
        const jourEffectifSuivant=Math.min(jourFacturation,dernierJourMoisSuivant);
        effetDate=new Date(moisSuivant.getFullYear(),moisSuivant.getMonth(),jourEffectifSuivant);
        effetDate.setHours(0,0,0,0);
        deadline=addDays(effetDate,-5);
      }
    }
  }else{
    // Mois fixes : 1er du mois (Actif/Actif+), deadline = dernier jour du mois - 5
    const dernierJour=lastDayOfMonth(datePourCalcul);
    deadline=new Date(dernierJour);
    deadline.setDate(dernierJour.getDate()-5);
    if(datePourCalcul<=deadline){
      effetDate=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth()+1,1);
    }else{
      effetDate=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth()+2,1);
    }
  }
  return{type:aboType,activation,activationSaisie,activationCorrigee,
    finEngagementInitial,demande,enEngagement:enEngagementInitial,
    joursRestants,frais,fraisLabel,deadline,effetDate,reconduction:!!aboData.reconduction,

// Injection CSS globale
const GLOBAL_CSS = `
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: ${C.bg};
    color: ${C.text};
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .calc-root select,
  .calc-root input,
  .calc-root button { font-family: inherit; }

  /* ── Range input ── */
  .calc-root input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    height: 5px;
    border-radius: 999px;
    background: ${C.border};
    outline: none;
    cursor: pointer;
    width: 100%;
  }
  .calc-root input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: ${C.red};
    cursor: pointer;
    box-shadow: 0 1px 6px rgba(155,0,64,.35);
    border: 2.5px solid white;
    transition: transform .15s;
  }
  .calc-root input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.15); }
  .calc-root input[type=range]::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: ${C.red};
    cursor: pointer;
    box-shadow: 0 1px 6px rgba(155,0,64,.35);
    border: 2.5px solid white;
  }

  /* ── Boutons ── */
  .calc-root button { transition: transform .12s, box-shadow .12s, opacity .12s; }
  .calc-root button:hover { opacity: .92; }
  .calc-root button:active { transform: scale(.97); }

  /* ── Tabs ── */
  .tab-btn {
    background: none; border: none;
    padding: 14px 18px 12px;
    font-size: 12.5px; font-weight: 500;
    color: ${C.textMuted};
    cursor: pointer;
    white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
    border-bottom: 2.5px solid transparent;
    transition: color .2s, border-color .2s, font-weight .15s;
    letter-spacing: .1px;
    outline: none;
    position: relative;
  }
  .tab-btn:focus-visible {
    outline: 2.5px solid ${C.red};
    outline-offset: 2px;
    border-radius: 4px;
  }
  .tab-btn.active {
    font-weight: 700;
    border-bottom-color: var(--tab-color, ${C.red});
    color: var(--tab-color, ${C.red});
  }
  .tab-btn:hover:not(.active) { color: ${C.textMid}; }

  /* ── Inputs & Selects ── */
  .calc-input {
    width: 100%;
    padding: 10px 13px;
    border-radius: 10px;
    border: 1.5px solid ${C.border};
    font-size: 13px;
    outline: none;
    background: white;
    box-sizing: border-box;
    transition: border-color .2s, box-shadow .2s;
    color: ${C.text};
    font-family: inherit;
  }
  .calc-input:focus {
    border-color: ${C.red};
    box-shadow: 0 0 0 3px rgba(155,0,64,.1);
  }
  .calc-input:focus-visible {
    outline: 2.5px solid ${C.red};
    outline-offset: 1px;
  }

  /* ── Cards ── */
  .card {
    background: white;
    border-radius: 16px;
    border: 1px solid ${C.border};
    box-shadow: 0 1px 3px rgba(28,10,4,.05), 0 4px 14px rgba(28,10,4,.06);
    padding: 20px 22px;
    margin-bottom: 12px;
  }

  .card-inset {
    background: ${C.surface2};
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid ${C.border};
  }

  /* ── Quick delay buttons ── */
  .delay-btn {
    padding: 6px 13px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid ${C.border};
    background: white;
    color: ${C.textMid};
    transition: all .15s;
    outline: none;
    font-family: inherit;
  }
  .delay-btn:focus-visible { outline: 2.5px solid ${C.red}; outline-offset: 2px; }
  .delay-btn:hover { border-color: ${C.redMid}; color: ${C.red}; }
  .delay-btn.active { background: ${C.red}; color: white; border-color: ${C.red}; font-weight: 700; box-shadow: 0 2px 8px rgba(155,0,64,.25); }

  /* ── Tarif radio pills ── */
  .tarif-pill {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid ${C.border};
    background: white;
    font-size: 12px; font-weight: 400;
    color: ${C.textMid};
    transition: all .15s;
  }
  .tarif-pill.active { font-weight: 700; }

  /* ── Section header ── */
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: ${C.text};
    margin: 0 0 16px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Label ── */
  .field-label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: ${C.textMuted};
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1.1px;
  }

  /* ── Alert boxes ── */
  .alert-info   { background: ${C.blueLight};  border: 1px solid ${C.blueMid};  color: #002A80; border-radius: 10px; padding: 10px 13px; font-size: 11.5px; line-height: 1.65; }
  .alert-warn   { background: ${C.amberLight}; border: 1px solid ${C.amberMid}; color: ${C.amber}; border-radius: 10px; padding: 10px 13px; font-size: 11.5px; line-height: 1.65; }
  .alert-danger { background: #FFF0F0; border: 1px solid #F0A0A0; color: #7A0020; border-radius: 10px; padding: 10px 13px; font-size: 11.5px; line-height: 1.65; }

  /* ── Results breakdown row ── */
  .result-row {
    display: grid;
    grid-template-columns: 28px 1fr 90px 80px;
    align-items: center;
    gap: 12px;
    padding: 11px 8px;
  }
  .result-row + .result-row { border-top: 1px solid ${C.border}; }

  /* ── Badge ── */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* ── Barème table ── */
  .bareme-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .bareme-table th { padding: 9px 12px; text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .8px; }
  .bareme-table td { padding: 9px 12px; }
  .bareme-table tbody tr:nth-child(even) { background: ${C.surface2}; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .three-col { grid-template-columns: 1fr 1fr !important; }
    .tab-btn { padding: 12px 12px 10px; font-size: 11.5px; }
  }
  @media (max-width: 640px) {
    .two-col { grid-template-columns: 1fr !important; }
    .seg-card { padding: 14px !important; }
    .three-col { grid-template-columns: 1fr !important; }
    .result-row { grid-template-columns: 24px 1fr 70px 60px !important; gap: 8px !important; }
    .resil-grid { grid-template-columns: 1fr !important; }
  }
`;

function Badge({color=C.red,bg,children}){
  const bgColor = bg || color+"1A";
  return(
    <span className="badge" style={{background:bgColor,color,border:`1px solid ${color}30`}}>
      {children}
    </span>
  );
}

function TarifPill({tarif}){
  const t=TARIFS.find(x=>x.id===tarif);
  if(!t||t.id==="standard") return null;
  return(
    <span className="badge" style={{background:`${t.color}15`,color:t.color,border:`1px solid ${t.color}35`,fontWeight:800,fontSize:11}}>
      {t.label}
    </span>
  );
}

const _hours=Array.from({length:24},(_,i)=>String(i).padStart(2,"0"));
const _mins= Array.from({length:60},(_,i)=>String(i).padStart(2,"0"));

function TimePicker({value,onChange,highlight}){
  const isSet=!!value;
  const[hh,mm]=isSet?value.split(":"):(["00","00"]);
  const borderCol=!isSet?C.border:highlight?C.red:C.borderMid;
  const textColor=!isSet?C.textMuted:highlight?C.red:C.text;
  const selStyle={
    border:"none",outline:"none",background:"transparent",
    fontSize:22,fontWeight:700,color:textColor,
    width:46,cursor:"pointer",
    WebkitAppearance:"none",MozAppearance:"none",appearance:"none",
    textAlign:"center",textAlignLast:"center",padding:0,
  };
  return(
    <div style={{
      display:"flex",alignItems:"center",justifyContent:"center",
      borderRadius:10,border:`1.5px solid ${borderCol}`,
      background:isSet?"white":C.surface2,
      padding:"10px 12px",gap:2,position:"relative",minWidth:0,
      boxShadow:isSet?"0 1px 4px rgba(0,0,0,.05)":"none",
      transition:"border-color .2s",
    }}>
      <select aria-label="Heures" value={hh} onChange={e=>onChange(`${e.target.value}:${mm}`)} style={selStyle}>
        {_hours.map(h=><option key={h} value={h}>{h}</option>)}
      </select>
      <span style={{fontSize:24,fontWeight:800,color:textColor,userSelect:"none",flexShrink:0,lineHeight:1,marginBottom:1}}>:</span>
      <select aria-label="Minutes" value={mm} onChange={e=>onChange(`${hh}:${e.target.value}`)} style={selStyle}>
        {_mins.map(m=><option key={m} value={m}>{m}</option>)}
      </select>
      {isSet&&(
        <button onClick={()=>onChange("")} style={{
          position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",
          background:C.border,border:"none",color:C.textMid,
          borderRadius:"50%",width:18,height:18,fontSize:11,cursor:"pointer",
          padding:0,lineHeight:1,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",
        }}>×</button>
      )}
    </div>
  );
}

// Divider avec label centré
function Divider({label}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0"}}>
      <div style={{flex:1,height:1,background:C.border}}/>
      <span style={{fontSize:11.5,color:C.textMuted,fontWeight:600,letterSpacing:.6}}>{label}</span>
      <div style={{flex:1,height:1,background:C.border}}/>
    </div>
  );
}

// Pastille montant résultat
function AmountPill({children,color=C.red,size=15}){
  return(
    <div style={{
      background:color+"1A",color,fontWeight:800,
      fontSize:size,padding:"4px 10px",borderRadius:8,
      textAlign:"center",lineHeight:1.2,fontVariantNumeric:"tabular-nums",
    }}>{children}</div>
  );
}

function App(){
  // Injection CSS une seule fois
  useEffect(()=>{
    // CSS global
    const id="calc-global-styles";
    if(!document.getElementById(id)){
      const el=document.createElement("style");
      el.id=id;el.textContent=GLOBAL_CSS;
      document.head.appendChild(el);
    }
    // Favicon — vrai logo applicatif
    const favId="calc-favicon";
    if(!document.getElementById(favId)){

  const[tab,setTab]=useState("retard");
  const[isMobile,setIsMobile]=useState(()=>typeof window!=="undefined"&&window.innerWidth<640);
  useEffect(()=>{
    const h=()=>setIsMobile(window.innerWidth<640);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);

  const[segments,setSegments]=useState([emptySegment()]);
  const isG30=segments.length===1;

  const[heureTheo,setHeureTheo]=useState("");
  const[heureReel,setHeureReel]=useState("");
  const[sliderDelay,setSliderDelay]=useState(0);
  const timeDelay=computeDelayMinutes(heureTheo,heureReel);
  const finalDelay=timeDelay!==null?timeDelay:sliderDelay;

  const[rupture,setRupture]=useState(false);
  const[computed,setComputed]=useState(null);
  const[exceptLevel,setExceptLevel]=useState("none");
  const[exceptSegmentId,setExceptSegmentId]=useState(null);
  const[fraisList,setFraisList]=useState([]);
  const[fraisComputed,setFraisComputed]=useState(null);

  useEffect(()=>{if(timeDelay!==null)setSliderDelay(Math.min(360,timeDelay));},[timeDelay]);

  const addSegment   =()=>setSegments(s=>[...s,emptySegment()]);
  const removeSegment=id=>setSegments(s=>{
    const next=s.filter(x=>x.id!==id);
    if(next.length===1&&!G30_CARRIER_IDS.includes(next[0].carrier))return[{...next[0],carrier:"tgv_dom"}];
    return next;
  });
  const updateSegment=(id,f,v)=>setSegments(s=>s.map(x=>x.id===id?{...x,[f]:v}:x));

  // ── Calcul automatique retard ──────────────────────────────────
  useEffect(()=>{
    const results=segments.map(seg=>{
      const c=CARRIERS.find(c=>c.id===seg.carrier);
      const isEligible=c&&c.group==="eligible";
      let rateInfo={rate:0,fixedAmount:null,type:null};let amount=0;
      if(isEligible){rateInfo=getRateInfo(seg.carrier,seg.tarif,finalDelay);amount=computeSegmentAmount(seg.price,seg.tarif,rateInfo);}
      else{rateInfo.type="Non éligible BD30";}
      return{...seg,carrier:c,price:parseFloat(seg.price)||0,rateInfo,amount,eligible:isEligible};
    });
    let baseTotal=results.reduce((a,r)=>a+r.amount,0);
    const excLvl=EXCEPT_LEVELS.find(e=>e.id===exceptLevel);
    let exceptBonus=0,exceptOnSegId=null;
    if(excLvl&&excLvl.multiplier!==null&&exceptSegmentId){
      const target=results.find(r=>r.id===exceptSegmentId&&r.eligible);
      if(target){
        exceptOnSegId=target.id;
        const exceptionalTotal=target.tarif==="max_loisirs"?(excLvl.fixedMax||0):target.price*excLvl.multiplier;
        exceptBonus=Math.max(0,exceptionalTotal-target.amount);
      }
    }
    const total=baseTotal+exceptBonus;
    setComputed({results,baseTotal,total,exceptBonus,finalDelay,eligible:total>=4,hasNonEligible:results.some(r=>!r.eligible),excLvl,exceptOnSegId});
  },[segments,finalDelay,exceptLevel,exceptSegmentId]);

  const addFrais   =()=>setFraisList(f=>[...f,emptyFrais()]);
  const removeFrais=id=>setFraisList(f=>f.filter(x=>x.id!==id));
  const updateFrais=(id,f,v)=>setFraisList(l=>l.map(x=>x.id===id?{...x,[f]:v}:x));

  // ── Calcul automatique frais ───────────────────────────────────
  useEffect(()=>{
    if(fraisList.length===0){setFraisComputed(null);return;}
    const results=fraisList.map(f=>{
      const def=FRAIS_TYPES.find(t=>t.id===f.type);
      const montant=parseFloat(f.montant)||0;
      const qty=f.type==="taxi_nuit"||f.type==="taxi_optimum"?1:(parseInt(f.qty)||1);
      const plafond=def.max*qty;
      return{...f,def,montant,qty,plafond,rembourse:Math.min(montant,plafond)};
    });
    setFraisComputed({results,total:results.reduce((a,r)=>a+r.rembourse,0)});
  },[fraisList]);

  const[resetConfirm,setResetConfirm]=useState(false);

  // ─── État onglet Dates ───────────────────────────────────────────
  const[dateAchat,setDateAchat]=useState("");
  const[dateActivation,setDateActivation]=useState("");
  const[dateDemande,setDateDemande]=useState(()=>{
    const t=new Date();

  const[aboTypeId,setAboTypeId]=useState("max_actif");
  const[aboMensualiteCustom,setAboMensualiteCustom]=useState("");
  const[aboMensualiteVariable,setAboMensualiteVariable]=useState("");
  const[contratPro,setContratPro]=useState(false);
  const[jourOuvrableMode,setJourOuvrableMode]=useState(false);
  const[retractType,setRetractType]=useState("abo"); // "abo" | "carte"
  const[datesSection,setDatesSection]=useState(null); // null | "retractation" | "resiliation"

  const aboType=ABONNEMENTS_MAX.find(a=>a.id===aboTypeId)||ABONNEMENTS_MAX[2];
  const mensualiteEffective=
    aboTypeId==="custom"?(parseFloat(aboMensualiteCustom)||0):
    aboType.type==="mensuel_variable"?(parseFloat(aboMensualiteVariable)||0):
    (aboType.mensualite||0);

  const retractResult=dateAchat?computeRetractation(dateAchat):null;
  const carteRetractResult=dateAchat?computeRetractationCarte(dateAchat):null;
  const resiliResult=(dateActivation&&dateDemande)?computeResiliation(dateActivation,dateDemande,mensualiteEffective,aboType):null;

  const resetAll=()=>{
    if(!resetConfirm){setResetConfirm(true);setTimeout(()=>setResetConfirm(false),2500);return;}
    setSegments([emptySegment()]);setHeureTheo("");setHeureReel("");setSliderDelay(0);
    setRupture(false);setComputed(null);setExceptLevel("none");setExceptSegmentId(null);
    setFraisList([]);setFraisComputed(null);
    setDateAchat("");setDateActivation("");
    setDateDemande(new Date().toISOString().split("T")[0]);
    setAboTypeId("max_actif");setAboMensualiteCustom("");setAboMensualiteVariable("");setContratPro(false);setJourOuvrableMode(false);setRetractType("abo");setDatesSection(null);
    setResetConfirm(false);
  };

  const MODE_COLOR=isG30?C.red:C.blue;
  const tabColors={"retard":C.red,"frais":C.blue,"bareme":"#2A6B2A","dates":"#7B3FA0"};

  // ── Styles partagés inline (ce qui ne peut pas être en CSS global) ──
  const inp={
    width:"100%",padding:"10px 13px",borderRadius:10,border:`1.5px solid ${C.border}`,
    fontSize:13,outline:"none",background:"white",boxSizing:"border-box",
    transition:"border-color .2s, box-shadow .2s",fontFamily:"inherit",color:C.text,
  };
  const sel={...inp,cursor:"pointer"};

  // ─────────────────────────────────────────────────────────────────
  return(
    <div className="calc-root" style={{fontFamily:"'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif",minHeight:"100vh",background:C.bg}}>

      {/* ── HEADER ─────────────────────────────────────────────── */}
      <header style={{
        background:`linear-gradient(140deg, ${C.redDark} 0%, ${C.red} 55%, #B5004A 100%)`,
        padding:"14px 22px 12px",position:"relative",overflow:"hidden",
      }}>
        <div style={{position:"absolute",top:-50,right:-50,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,0.05)",pointerEvents:"none"}}/>
        <div style={{position:"relative",zIndex:1,display:"flex",alignItems:"center",gap:16}}>
          {/* Logo */}
          <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
            width:52,height:52,borderRadius:14,
            background:"rgba(255,255,255,0.12)",
            border:"1.5px solid rgba(255,255,255,0.2)",
            backdropFilter:"blur(8px)",
            boxShadow:"0 2px 12px rgba(0,0,0,0.18)",
          }}>
            <LogoApp size={36}/>
          </div>
          {/* Texte */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{background:"rgba(255,255,255,0.16)",color:"rgba(255,255,255,.92)",fontWeight:700,fontSize:11,padding:"2px 10px",borderRadius:20,letterSpacing:2,textTransform:"uppercase",border:"1px solid rgba(255,255,255,0.15)"}}>SNCF Voyageurs</span>
            </div>
            <h1 style={{margin:0,color:"white",fontSize:isMobile?16:20,fontWeight:800,letterSpacing:"-.4px",lineHeight:1.2}}>
              Calculateur d'indemnisation
            </h1>
            <div style={{marginTop:4,color:"rgba(255,255,255,0.45)",fontSize:11,letterSpacing:.2,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              {["BD30","Frais Annexes","Rétractation & Résiliation","Barèmes & Règles"].map((s,i,a)=>(
                <React.Fragment key={s}>
                  <span>{s}</span>
                  {i<a.length-1&&<span style={{opacity:.4}}>·</span>}
                </React.Fragment>
              ))}
            </div>
          </div>
          {/* Version */}
          <div style={{flexShrink:0,textAlign:"right"}}>
            <div style={{color:"rgba(255,255,255,.25)",fontSize:11,letterSpacing:.2,lineHeight:1.6}}>
              <strong style={{color:"rgba(255,255,255,.4)"}}>v2.0</strong> · by PDSA
              <span style={{display:"block"}}>En vigueur 20/01/2026</span>
            </div>
          </div>
        </div>
      </header>

      {/* ── TABS ────────────────────────────────────────────────── */}
      <div style={{
        background:"white",borderBottom:`1.5px solid ${C.border}`,
        display:"flex",padding:"0 14px",overflowX:"auto",WebkitOverflowScrolling:"touch",
        alignItems:"stretch",gap:0,position:"sticky",top:0,zIndex:100,
        boxShadow:"0 2px 12px rgba(0,0,0,.07)",
      }}>
        {TABS.filter(t=>t.id!=="bareme").map(t=>{
          const active=tab===t.id;
          const col=tabColors[t.id]||C.red;
          return(
            <React.Fragment key={t.id}>
              <button className={`tab-btn${active?" active":""}`}
                style={{"--tab-color":col}}
                role="tab"
                aria-selected={active}
                aria-controls={`panel-${t.id}`}
                onClick={()=>setTab(t.id)}>
                <span style={{fontSize:13,opacity:active?1:.55}} aria-hidden="true">{t.icon}</span>
                <span>{t.label}</span>
              </button>
              {/* Badge G30/BD30 — juste après l'onglet Retard */}
              {t.id==="retard"&&(
                <div style={{
                  display:"flex",alignItems:"center",gap:4,padding:"0 10px",
                  borderRight:`1px solid ${C.border}`,

                  <div style={{width:6,height:6,borderRadius:"50%",background:isG30?C.red:C.blue,boxShadow:isG30?`0 0 5px ${C.red}88`:`0 0 5px ${C.blue}88`}}/>
                  <span style={{fontWeight:800,fontSize:11,color:isG30?C.red:C.blue,letterSpacing:.4}}>{isG30?"G30":"BD30"}</span>
                </div>
              )}
            </React.Fragment>
          );
        })}
        <div style={{flex:1}}/>
        {/* Barèmes poussé tout à droite */}
        {(()=>{const t=TABS.find(x=>x.id==="bareme");const active=tab==="bareme";return(
          <button className={`tab-btn${active?" active":""}`}
            style={{"--tab-color":tabColors.bareme}}

            aria-selected={active}
            aria-controls="panel-bareme"

          </button>

          fontSize:11,
          color:resetConfirm?C.red:C.textMuted,
          cursor:"pointer",
          letterSpacing:.2,fontWeight:resetConfirm?700:500,fontFamily:"inherit",
          transition:"all .2s",whiteSpace:"nowrap",
        }}>{resetConfirm?"⚠️ Confirmer ?":"↺ Réinit."}</button>
      </div>

      {/* ── MAIN ────────────────────────────────────────────────── */}
      <main style={{maxWidth:800,margin:"0 auto",padding:"16px 14px 80px"}}>

        {/* ══════════ TAB RETARD ══════════ */}
        {tab==="retard"&&(<React.Fragment><div id="panel-retard" role="tabpanel" aria-label="Retard et compensation">

          {/* Bandeau mode */}
          <div style={{
            background:"white",borderRadius:12,
            border:`1.5px solid ${isG30?"#F8D0D8":"#B8D0F0"}`,
            borderLeft:`3.5px solid ${MODE_COLOR}`,
            padding:"12px 16px",marginBottom:12,fontSize:12.5,
            color:C.textMid,lineHeight:1.7,
            boxShadow:"0 1px 3px rgba(0,0,0,.04)",
          }}>
            {isG30
              ?<><strong style={{color:C.red}}>ℹ️ Mode G30 — Trajet sec</strong> — 1 seul segment. Transporteurs éligibles : <strong>TGV INOUI domestique</strong>, <strong>TGV international (filiale)</strong> et <strong>Intercités</strong>. Ajoutez un segment pour basculer en <strong style={{color:C.blue}}>BD30</strong>.</>
              :<><strong style={{color:C.blue}}>ℹ️ Mode BD30 — Billet Direct</strong> — voyages ≥ 2 segments en une seule transaction. Les billets <span style={{color:C.green,fontWeight:700}}>Abonnés Max et Forfaits</span> (0€) suivent un barème G30 spécifique en montants fixes. Supprimez des segments pour repasser en <strong style={{color:C.red}}>G30</strong>.
              <span style={{
                display:"block",marginTop:7,paddingTop:7,
                borderTop:`1px solid #B8D0F0`,
                fontSize:11.5,color:"#1A3A6A",lineHeight:1.65,

                ⚠️ <strong>Retard imputé à un transporteur non éligible</strong> — seul le retard enregistré <strong>sur le(s) segment(s) éligible(s)</strong> est pris en compte. Le retard global calculé via un train de report ne s'applique pas.
              </span>
              </>
            }
          </div>

          {/* Segments */}
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <h2 className="section-title" style={{margin:0}}>🚆 Segments du voyage</h2>
                <span style={{
                  padding:"3px 12px",borderRadius:20,fontSize:11,fontWeight:800,
                  background:isG30?"#FDE8EE":"#D8EEFF",
                  color:isG30?C.red:C.blue,
                  border:`1px solid ${isG30?"#F0C0C0":"#A0C0E8"}`,
                }}>{isG30?"G30 — Trajet sec":"BD30 — Billet Direct"}</span>
              </div>
              <button onClick={addSegment} style={{
                background:C.red,color:"white",border:"none",
                borderRadius:8,padding:"7px 16px",fontSize:12,fontWeight:700,
                cursor:"pointer",boxShadow:"0 2px 10px rgba(155,0,64,.25)",fontFamily:"inherit",
              }}>+ Segment</button>
            </div>

            {segments.map((seg,idx)=>{
              const c=CARRIERS.find(c=>c.id===seg.carrier);
              const isNE=c&&c.group==="non_eligible";
              const tarifInfo=TARIFS.find(t=>t.id===seg.tarif);
              const isMax=["max_loisirs","prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(seg.tarif);
              const segColor=isNE?C.amber:(c?c.color:C.red);
              const availableCarriers=isG30?CARRIERS.filter(c=>G30_CARRIER_IDS.includes(c.id)):CARRIERS;

              let segBg=C.surface2,segBorder=C.border;
              if(isNE){segBg="#FFF3E0";segBorder="#F0C090";}
              else if(seg.tarif==="prime_titulaire"){segBg=C.blueLight;segBorder=C.blueMid;}
              else if(seg.tarif==="prime_fid_tiers"){segBg="#F0EAFF";segBorder="#C8A8F0";}
              else if(seg.tarif==="prime_gvt_tiers"){segBg="#F8EAFF";segBorder="#D0A0E0";}
              else if(isMax){segBg=C.greenLight;segBorder="#A8DFC0";}

              return(
                <div key={seg.id} className="seg-card" style={{
                  marginBottom:10,padding:"16px 18px",borderRadius:12,
                  background:segBg,border:`1px solid ${segBorder}`,
                }}>
                  <div style={{display:"grid",gridTemplateColumns:"30px minmax(0,1fr) 100px auto",gap:10,alignItems:"start"}}>
                    {/* Numéro segment */}
                    <div style={{
                      width:28,height:28,borderRadius:"50%",
                      background:`${segColor}22`,color:segColor,
                      border:`1.5px solid ${segColor}44`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontWeight:800,fontSize:11,flexShrink:0,marginTop:18,

                    {/* Transporteur */}
                    <div>
                      <label className="field-label">Transporteur</label>
                      {isG30
                        ?<select aria-label="Transporteur" value={seg.carrier} onChange={e=>updateSegment(seg.id,"carrier",e.target.value)} style={{...sel}}>
                          {availableCarriers.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                        </select>
                        :<select aria-label="Transporteur" value={seg.carrier} onChange={e=>updateSegment(seg.id,"carrier",e.target.value)} style={{...sel,borderColor:isNE?"#F0C090":C.border,background:isNE?"#FFF3E0":"white"}}>
                          <optgroup label="✅ Éligibles BD30">{CARRIERS.filter(c=>c.group==="eligible").map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</optgroup>
                          <optgroup label="❌ Hors périmètre BD30">{CARRIERS.filter(c=>c.group==="non_eligible").map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</optgroup>
                        </select>
                      }
                      {isNE&&(
                        <div style={{fontSize:11,color:seg.carrier==="trsi"?C.orange:C.amber,marginTop:5,lineHeight:1.6,fontWeight:seg.carrier==="trsi"?600:400}}>
                          {seg.carrier==="trsi"
                            ?<>⚠️ TRSI — Billet Combiné (2 contrats distincts). Hors périmètre BD30. G30 sur segment TGV/INT uniquement. Trains n° 17466–17499 · Marseille–Toulon–Nice.</>
                            :<>⚠️ Hors périmètre BD30 — aucune indemnisation sur ce segment.{seg.carrier==="coop_int"?" Bi-segment: G30 sur segment TGV/filiale seul.":""}{seg.carrier==="ter_autocar"?" Autres segments compensables via G30.":""}</>
                          }
                        </div>
                      )}
                    </div>

                    {/* Prix */}
                    <div>
                      <label className="field-label">
                        Prix (€)
                        {isMax&&<span style={{color:["prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(seg.tarif)?C.blue:C.green,marginLeft:3}}>
                          {["prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(seg.tarif)?"— Prime":"— 0€"}
                        </span>}
                      </label>
                      <input type="number" min="0" step="0.01"
                        aria-label="Prix du billet (€)"
                        placeholder={isMax?"—":"ex: 45.00"}
                        value={isMax?"0":seg.price}
                        onChange={e=>updateSegment(seg.id,"price",e.target.value)}
                        disabled={isNE||isMax}
                        style={{...inp,background:(isNE||isMax)?C.surface2:"white",color:(isNE||isMax)?C.textMuted:C.text,fontFamily:"'Inter','DM Sans',sans-serif",fontWeight:600,fontSize:14}}
                      />
                    </div>

                    {/* Supprimer */}
                    {segments.length>1
                      ?<button onClick={()=>removeSegment(seg.id)} style={{
                          background:"rgba(0,0,0,0.06)",border:"none",color:C.textMuted,
                          borderRadius:"50%",width:28,height:28,cursor:"pointer",

                    <div style={{marginTop:13,paddingTop:13,borderTop:`1px dashed ${segBorder}`}}>
                      <label className="field-label">Tarif du billet</label>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:7}}>
                        {TARIFS.map(t=>(
                          <label key={t.id} className={`tarif-pill${seg.tarif===t.id?" active":""}`}
                            style={{
                              borderColor:seg.tarif===t.id?t.color+"70":C.border,
                              background:seg.tarif===t.id?`${t.color}10`:"white",
                              color:seg.tarif===t.id?t.color:C.textMid,
                            }}>
                            <input type="radio" name={`tarif-${seg.id}`} value={t.id}
                              checked={seg.tarif===t.id}
                              onChange={()=>updateSegment(seg.id,"tarif",t.id)}

                            />
                            {t.label}
                          </label>
                        ))}
                      </div>
                      <div style={{fontSize:11.5,color:C.textMuted,lineHeight:1.5}}>{tarifInfo.desc}</div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* ── Retard ── */}
          <div className="card">
            <h2 className="section-title">⏱️ Retard à la destination finale</h2>

            {/* Heures */}
            <div style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:14,alignItems:"flex-end"}}>
              <div style={{flex:"1 1 130px",minWidth:0,display:"flex",flexDirection:"column"}}>
                <label className="field-label" style={{minHeight:22,display:"flex",alignItems:"flex-end",paddingBottom:4}}>Arrivée théorique</label>
                {isMobile
                  ?<TimePicker value={heureTheo} onChange={setHeureTheo} highlight={false}/>
                  :<input type="time" value={heureTheo} onChange={e=>setHeureTheo(e.target.value)} style={{...inp,fontSize:18,fontWeight:700,padding:"10px 12px"}}/>
                }
              </div>
              <div style={{flex:"1 1 130px",minWidth:0,display:"flex",flexDirection:"column"}}>
                <label className="field-label" style={{minHeight:22,display:"flex",alignItems:"flex-end",paddingBottom:4}}>Arrivée réelle</label>
                {isMobile
                  ?<TimePicker value={heureReel} onChange={setHeureReel} highlight={!!(timeDelay!==null&&timeDelay>0)}/>
                  :<input type="time" value={heureReel} onChange={e=>setHeureReel(e.target.value)} style={{...inp,fontSize:18,fontWeight:700,padding:"10px 12px",borderColor:timeDelay!==null&&timeDelay>0?C.red:C.border,color:timeDelay!==null&&timeDelay>0?C.red:"inherit"}}/>
                }
              </div>
            </div>

            {/* Résultat calcul auto */}
            {timeDelay!==null&&(
              <div style={{
                marginBottom:14,padding:"12px 16px",borderRadius:10,
                background:timeDelay===0?C.greenLight:timeDelay<30?C.amberLight:C.redLight,
                border:`1.5px solid ${timeDelay===0?"#A0E0B8":timeDelay<30?C.amberMid:C.redMid}`,

                <span style={{fontSize:12,color:C.textMid,fontWeight:500}}>Retard calculé :</span>
                <span style={{
                  fontSize:22,fontWeight:800,
                  color:timeDelay===0?C.green:timeDelay<30?C.amber:C.red,
                  fontVariantNumeric:"tabular-nums",

                  {timeDelay===0?"✓ À l'heure":`${timeDelay} min${timeDelay>=60?` (${Math.floor(timeDelay/60)}h${timeDelay%60>0?String(timeDelay%60).padStart(2,"0")+"min":""})`:""}` }
                </span>
              </div>

            <Divider label="OU saisir manuellement"/>

            {/* Boutons rapides — tranches barème */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C.textMuted,letterSpacing:1,textTransform:"uppercase",marginBottom:7}}>Tranches du barème</div>

                {[
                  {label:"< 30 min",      sub:"Non éligible",    value:15,  color:C.textMuted, bg:C.surface2,    border:C.border},
                  {label:"30 – 59 min",   sub:"25% ou 5€ BAD",   value:30,  color:C.red,       bg:"#FDE8EE",     border:C.redMid},
                  {label:"60 – 119 min",  sub:"25% ou 5€ BAD",   value:60,  color:C.red,       bg:"#FDE8EE",     border:C.redMid},
                  {label:"120 – 179 min", sub:"50% ou 5€ BAD",   value:120, color:C.red,       bg:"#FDE8EE",     border:C.redMid},
                  {label:"180 – 239 min", sub:"75% ou 10€ BAD",  value:180, color:"#7A0032",   bg:"#F5C0D0",     border:"#E080A0"},

                    value===60  ? finalDelay>=60&&finalDelay<=119 :

                        fontFamily:"inherit",textAlign:"left",
                        border:`1.5px solid ${active?color:border}`,
                        background:active?color:bg,
                        boxShadow:active?`0 2px 8px ${color}40`:"none",
                        transition:"all .15s",

                      <div style={{fontSize:12,fontWeight:700,color:active?"white":color,lineHeight:1.2}}>{label}</div>
                      <div style={{fontSize:10,color:active?"rgba(255,255,255,.7)":C.textMuted,marginTop:2}}>{sub}</div>

                <span style={{fontSize:12,color:C.textMid,fontWeight:600}}>Retard manuel</span>

              </div>
              <input type="range" min="0" max="360" step="1"
                aria-label="Retard en minutes (0 à 360)"
                aria-valuetext={`${sliderDelay} minutes`}
                value={sliderDelay}
                onChange={e=>{setSliderDelay(Number(e.target.value));setHeureTheo("");setHeureReel("");}}

            </div>

        </div></React.Fragment>)}

        {/* ══════════ TAB FRAIS ══════════ */}
        {tab==="frais"&&(<React.Fragment><div id="panel-frais" role="tabpanel" aria-label="Frais annexes">

            {fraisList.map(f=>{

                  <div style={{fontWeight:700,fontSize:13,color:resiliResult.enEngagement?C.amber:C.green,marginBottom:12}}>
                    {resiliResult.enEngagement
                      ?`⚠️ En période d'engagement initial — ${resiliResult.joursRestants} jour${resiliResult.joursRestants>1?"s":""} restant${resiliResult.joursRestants>1?"s":""}`
                      :"✅ Hors période d'engagement initial — Résiliation libre et sans frais"
                    }
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:resiliResult.finBlocage3mois?"1fr 1fr 1fr":"1fr 1fr",gap:10}}>
                    <div style={{background:"white",borderRadius:10,padding:"11px 13px",border:`1px solid ${resiliResult.activationCorrigee?"#F5D080":C.border}`}}>
                      <div style={{fontSize:11,fontWeight:700,color:C.textMuted,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Activation</div>
                      <div style={{fontSize:12,fontWeight:700,color:C.text}}>{fmtDate(resiliResult.activation)}</div>
                      {resiliResult.activationCorrigee&&(
                        <div style={{fontSize:11,color:C.amber,fontWeight:600,marginTop:3}}>
                          📅 Recalée au 1er du mois<br/>
                          <span style={{fontWeight:400,color:C.textMuted}}>Saisie : {resiliResult.activationSaisie.toLocaleDateString("fr-FR")}</span>
                        </div>
                      )}
                      {resiliResult.glissant&&(
                        <div style={{fontSize:11,color:C.purple,fontWeight:600,marginTop:3}}>📆 Mois glissant</div>
                      )}
                    </div>
                    {resiliResult.finBlocage3mois&&(
                      <div style={{
                        background:resiliResult.enBlocage?"#FDE8EE":C.surface2,
                        borderRadius:10,padding:"11px 13px",
                        border:`1px solid ${resiliResult.enBlocage?"#F0A0B0":C.border}`,
                      }}>
                        <div style={{fontSize:11,fontWeight:700,color:resiliResult.enBlocage?C.red:C.textMuted,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>
                          {resiliResult.enBlocage?"🚫 Fin blocage 3 mois":"✅ Fin blocage 3 mois"}
                        </div>
                        <div style={{fontSize:12,fontWeight:700,color:resiliResult.enBlocage?C.red:C.textMid}}>{fmtDate(resiliResult.finBlocage3mois)}</div>
                      </div>
                    )}
                    <div style={{
                      background:resiliResult.enEngagement?"#FFF0D0":"#D4F0E4",
                      borderRadius:10,padding:"11px 13px",
                      border:`1px solid ${resiliResult.enEngagement?C.amberMid:"#60C898"}`,
                    }}>
                      <div style={{fontSize:11,fontWeight:700,color:resiliResult.enEngagement?C.amber:C.green,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Fin d'engagement initial</div>
                      <div style={{fontSize:12,fontWeight:700,color:resiliResult.enEngagement?C.amber:C.green}}>{fmtDate(resiliResult.finEngagementInitial)}</div>
                    </div>
                  </div>
                </div>

                {/* Frais */}
                {resiliResult.enEngagement&&(
                  <div style={{
                    background:"#FDE8EE",border:`1.5px solid #F0A0B0`,
                    borderRadius:14,padding:"14px 18px",
                    display:"flex",alignItems:"center",gap:14,
                  }}>
                    <div style={{fontSize:36}}>💳</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:C.red,marginBottom:3}}>Frais de résiliation anticipée</div>
                      <div style={{fontSize:11.5,color:"#7A0032",lineHeight:1.6}}>
                        {resiliResult.reconduction
                          ?"Résiliation avant la fin des 12 mois initiaux → prélèvement d'une mensualité supplémentaire"
                          :"Résiliation avant la fin des 12 mois d'engagement → frais de dossier forfaitaires CGV SNCF"
                        }
                      </div>
                      {resiliResult.type==="mensuel_variable"&&!mensualiteEffective&&(
                        <div style={{fontSize:11,color:C.orange,fontWeight:600,marginTop:4}}>
                          ⚠️ Renseignez votre mensualité O/D ci-dessus pour calculer le montant exact.
                        </div>
                      )}
                    </div>
                    <div style={{
                      background:C.red,borderRadius:12,padding:"10px 18px",
                      textAlign:"center",flexShrink:0,
                    }}>
                      <div style={{color:"rgba(255,255,255,.7)",fontSize:11,fontWeight:600,letterSpacing:.8}}>FRAIS</div>
                      <div style={{color:"white",fontSize:resiliResult.frais?24:14,fontWeight:900,lineHeight:1}}>
                        {resiliResult.frais?`${resiliResult.frais} €`:"Variable"}
                      </div>
                      {resiliResult.fraisLabel&&<div style={{color:"rgba(255,255,255,.6)",fontSize:11,marginTop:2}}>{resiliResult.fraisLabel}</div>}
                    </div>
                  </div>
                )}

                {/* Exonération des frais sur justificatif */}
                {resiliResult.enEngagement&&resiliResult.glissant&&(
                  <div style={{
                    background:"#F5EEFF",border:`1px solid #C8A0F0`,
                    borderRadius:12,padding:"12px 16px",
                  }}>
                    <div style={{fontWeight:700,fontSize:12,color:C.purple,marginBottom:6}}>
                      📎 Exonération des frais — Cas exceptionnels (CGV §10.1)
                    </div>
                    <div style={{fontSize:11.5,color:"#3D1A6A",lineHeight:1.7}}>
                      Les frais de 15 € <strong>ne sont pas dus</strong> avant les 12 premières mensualités, sur présentation de pièces justificatives, dans les cas suivants :
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:8}}>
                      {[
                        {icon:"⚫",label:"Décès",sub:"Abonné, Payeur ou conjoint"},
                        {icon:"🏥",label:"Maladie longue durée",sub:"≥ 3 mois · empêchant l'utilisation"},
                        {icon:"✈️",label:"Mutation / déménagement",sub:"À l'étranger — Abonné uniquement"},
                        {icon:"⚖️",label:"Emprisonnement",sub:"Abonné uniquement"},
                      ].map(({icon,label,sub})=>(
                        <div key={label} style={{
                          background:"white",borderRadius:8,padding:"7px 10px",
                          border:`1px solid #D8B4FF`,
                        }}>
                          <div style={{fontSize:11,fontWeight:700,color:C.purple}}>{icon} {label}</div>
                          <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{sub}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Date d'effet & deadline */}
                <div className="resil-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div style={{
                    background:resiliResult.enBlocage?"rgba(91,45,142,.12)":C.purpleLight,
                    borderRadius:12,padding:"14px 16px",
                    border:`1.5px solid ${resiliResult.enBlocage?"#7B3FA0":"#D8B4FF"}`,
                  }}>
                    <div style={{fontSize:11,fontWeight:700,color:C.purple,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>
                      📬 Deadline résiliation
                      {resiliResult.glissant
                        ?<span style={{fontWeight:400,fontSize:11,display:"block",color:"rgba(91,45,142,.7)",marginTop:1}}>
                          {resiliResult.enBlocage?"calculée après fin de blocage":`veille des 5 j avant le ${resiliResult.effetDate.getDate()} du mois`}
                        </span>
                        :<span style={{fontWeight:400,fontSize:11,display:"block",color:"rgba(91,45,142,.7)",marginTop:1}}>
                          {resiliResult.enBlocage?"calculée après fin de blocage":"veille des 5 j avant le 1er du mois suivant"}
                        </span>
                      }
                    </div>
                    <div style={{fontSize:13,fontWeight:700,color:C.purple}}>{fmtDate(resiliResult.deadline)}</div>
                    <div style={{fontSize:11.5,color:C.textMuted,marginTop:4}}>
                      {resiliResult.enBlocage
                        ?<span style={{color:"#7B3FA0",fontWeight:600}}>⚠️ Blocage en cours — deadline projetée</span>
                        :resiliResult.demande<=resiliResult.deadline
                          ?"✅ Demande dans les délais → effet M+1"
                          :"⚠️ Demande hors délai → effet M+2"
                      }
                    </div>
                  </div>
                  <div style={{
                    background:"#0D1B3E",borderRadius:12,padding:"14px 16px",
                    border:`1.5px solid ${resiliResult.enBlocage?"#7B3FA0":"#2A2A5E"}`,
                  }}>
                    <div style={{fontSize:11,fontWeight:700,color:"#A0C4FF",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>
                      📅 Date d'effet de la résiliation
                      {resiliResult.enBlocage&&<span style={{fontWeight:400,fontSize:11,display:"block",color:"rgba(160,196,255,.6)",marginTop:1}}>1ère date possible</span>}
                    </div>
                    <div style={{fontSize:13,fontWeight:800,color:"#FFD700"}}>{fmtDate(resiliResult.effetDate)}</div>
                    <div style={{fontSize:11.5,color:"rgba(255,255,255,.45)",marginTop:4}}>
                      {resiliResult.enBlocage
                        ?"1ère date possible après fin de blocage"
                        :resiliResult.glissant
                          ?`Date anniversaire mensuelle · Attestation PDF invalide à partir de cette date`
                          :"1er du mois · Attestation PDF invalide à partir de cette date"
                      }
                    </div>
                  </div>
                </div>

                {/* Note réservations */}
                <div className="alert-danger" style={{fontSize:11.5}}>
                  🚫 <strong>Rappel CGV :</strong> Les réservations effectuées par l'abonné au-delà de la date d'effet sont <strong>automatiquement annulées</strong>. L'attestation d'abonnement au format PDF n'est plus valable à compter de la date d'effet de la résiliation.
                </div>

                {/* Condition impayés */}
                <div className="alert-warn" style={{fontSize:11.5}}>
                  ⚠️ <strong>Compte débiteur :</strong> Si le compte client est débiteur, la résiliation ne sera <strong>effective qu'après régularisation des impayés</strong> (CGV §10.1).
                </div>

                {/* Annulation de la demande */}
                {resiliResult.glissant&&resiliResult.deadline&&(
                  <div className="alert-info" style={{fontSize:11.5}}>
                    🔙 <strong>Annulation de la demande possible :</strong> L'abonné peut annuler sa demande de résiliation <strong>jusqu'à la deadline de résiliation</strong> (soit avant le {fmtDate(resiliResult.deadline)}). Passé ce délai, la résiliation suit son cours.
                  </div>
                )}

              </div>
            )}
            {(!dateActivation||!dateDemande)&&(
              <div style={{textAlign:"center",padding:"24px",color:C.textMuted,fontSize:12.5,background:C.surface2,borderRadius:12}}>
                ↑ Renseignez la date d'activation et la date de demande pour calculer les délais de résiliation
              </div>
            )}
          </div>

          {/* Récapitulatif barème abonnements — affiché dans la section résiliation */}
          <div className="card">
            <h2 className="section-title" style={{fontSize:13}}>📋 Récapitulatif — Abonnements Max</h2>
            <div style={{overflowX:"auto"}}>
              <table className="bareme-table">
                <thead>
                  <tr style={{background:C.purple,color:"white"}}>
                    {["Abonnement","Mensualité","Engagement","Résiliation libre dès","Frais anticipés"].map(h=>(
                      <th key={h} style={{color:"white",textAlign:"center"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    {label:"Max Jeune (–26 ans)",  mensualite:"79 €/mois",   engagement:"12 mois",        free:"Mois 13",                frais:"15 €",         color:C.purple, note:"Mois glissant · Blocage 3 mois"},
                    {label:"Max Senior (+60 ans)", mensualite:"79 €/mois",   engagement:"12 mois",        free:"Mois 13",                frais:"15 €",         color:C.purple, note:"Mois glissant · Blocage 3 mois"},
                    {label:"Max Actif",             mensualite:"Variable O/D",engagement:"12 mois (tacite)",free:"Après période initiale",frais:"1 mensualité", color:C.blue,   note:"Débute le 1er du mois"},
                    {label:"Max Actif+",            mensualite:"Variable O/D",engagement:"12 mois (tacite)",free:"Après période initiale",frais:"1 mensualité", color:C.blue,   note:"Débute le 1er du mois"},
                  ].map((row,i)=>(
                    <tr key={i} style={{background:i%2===0?"white":C.surface2}}>
                      <td style={{fontWeight:600,color:row.color}}>
                        {row.label}
                        {row.note&&<div style={{fontSize:11,fontWeight:500,color:C.textMuted,marginTop:2}}>{row.note}</div>}
                      </td>
                      <td style={{textAlign:"center",fontWeight:600,color:C.text,fontSize:12}}>{row.mensualite}</td>
                      <td style={{textAlign:"center",color:C.textMid}}>{row.engagement}</td>
                      <td style={{textAlign:"center",color:C.green,fontWeight:600,fontSize:12}}>{row.free}</td>
                      <td style={{textAlign:"center",fontWeight:700,color:C.red,fontSize:12}}>{row.frais}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="alert-info" style={{marginTop:12,fontSize:11.5}}>
              ℹ️ Les tarifs Max Actif / Actif+ varient selon l'origine/destination. Se référer aux CGV SNCF et à l'espace abonné pour les montants exacts. · Résiliation par courrier, en agence ou via l'espace client.
            </div>
          </div>
          </React.Fragment>)} {/* fin datesSection==="resiliation" */}

        </div></React.Fragment>)}

      </main>

      {/* ── BARRE RÉSULTAT FIXE ─────────────────────────────────── */}
      {tab==="retard"&&computed&&computed.eligible&&(
        <div role="status" aria-live="polite" aria-atomic="true" style={{
          position:"fixed",bottom:0,left:0,right:0,zIndex:200,
          background:`linear-gradient(135deg,#0A5530,#0F6B3C)`,
          padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",
          boxShadow:"0 -4px 20px rgba(0,0,0,.22)",
        }}>
          <div style={{color:"rgba(255,255,255,.7)",fontSize:12}}>
            ✓ Éligible · <strong style={{color:"white"}}>{delayLabel(computed.finalDelay)}</strong>
            {computed.exceptBonus>0&&<span style={{color:"#FFD700",marginLeft:8,fontSize:11}}>⭐ +{computed.exceptBonus.toFixed(2)} € exception</span>}
          </div>
          <div style={{color:"white",fontSize:26,fontWeight:900,fontVariantNumeric:"tabular-nums",fontFamily:"'Inter','DM Sans',sans-serif",letterSpacing:"-.5px"}}>
            {computed.total.toFixed(2)} €
          </div>
        </div>
      )}
      {tab==="frais"&&fraisComputed&&fraisComputed.total>0&&(
        <div role="status" aria-live="polite" aria-atomic="true" style={{
          position:"fixed",bottom:0,left:0,right:0,zIndex:200,
          background:`linear-gradient(135deg,#002B7A,${C.blue})`,
          padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",
          boxShadow:"0 -4px 20px rgba(0,0,0,.22)",
        }}>
          <div style={{color:"rgba(255,255,255,.7)",fontSize:12}}>
            🧾 <strong style={{color:"white"}}>{fraisComputed.results.length} poste{fraisComputed.results.length>1?"s":""}</strong> · Frais annexes remboursables
          </div>
          <div style={{color:"white",fontSize:26,fontWeight:900,fontVariantNumeric:"tabular-nums",fontFamily:"'Inter','DM Sans',sans-serif",letterSpacing:"-.5px"}}>
            {fraisComputed.total.toFixed(2)} €
          </div>
        </div>
      )}

      {/* ── FOOTER ─────────────────────────────────────────────── */}
      <footer style={{
        textAlign:"center",padding:"14px",fontSize:11.5,
        color:C.textMuted,borderTop:`1px solid ${C.border}`,
        background:"white",letterSpacing:.2,
      }}>
        Calculateur BD30 / G30 · <strong style={{color:C.red}}>version 2.0</strong> · by PDSA · Règlement PRR 2021 · En vigueur au 01/01/2025 · À titre indicatif uniquement
      </footer>

    </div>
  );
}

export default App;

  </script>
</body>
</html>
