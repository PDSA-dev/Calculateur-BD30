                              <div style={{flex:"1 1 90px",minWidth:0}}>
                                <label className="label" htmlFor={`nbpass-${seg.id}`}>Nbre pass.</label>
                                <input id={`nbpass-${seg.id}`} type="number" min="1" max="20" value={seg.nbPass||1}
                                  onChange={e=>setGlobalNbPass(Math.max(1,parseInt(e.target.value)||1))}
                                  className="calc-input" style={{fontFamily:"'Outfit',sans-serif",fontVariantNumeric:"tabular-nums lining-nums",fontWeight:700,fontSize:16,textAlign:"center"}}/>
                              </div>
                            )}
                          </div>
                        )}

                        {/* MULTI-TARIFS mode */}
                        {seg.multiPassMode && (
                          <div style={{marginTop:6}}>
                            {passengers.map((p,pi)=>{
                              const availTPs=getTarifsForCarrier(seg.carrier).filter(t=>t.id!=="groupe");
                              const pIsMax=["max_loisirs","prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(p.tarif);
                              const isOuigo=seg.carrier==="ouigo";
                              return (
                                <div key={p.id} className="pass-row">
                                  <span style={{fontSize:10.5,fontWeight:800,color:"var(--tx-muted)",width:28,textAlign:"center",flexShrink:0}}>P{pi+1}</span>
                                  {isOuigo ? (
                                    <div style={{flex:1,display:"flex",alignItems:"center"}}>
                                      <span className="badge" style={{color:"#E8005D",background:"rgba(232,0,93,.1)",border:"1.5px solid rgba(232,0,93,.2)",fontSize:11}}>Standard</span>
                                    </div>
                                  ) : (
                                    <div style={{flex:1,minWidth:0}}>
                                      <select value={p.tarif} onChange={e=>updatePassenger(seg.id,p.id,"tarif",e.target.value)}
                                        className="calc-input" style={{padding:"6px 10px",fontSize:12}}>
                                        <option value="" disabled>— Tarif —</option>
                                        {availTPs.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
                                      </select>
                                    </div>
                                  )}
                                  <div style={{width:90,flexShrink:0}}>
                                    <input type="number" min="0" step="0.01" placeholder="0.00" value={p.price}
                                      onChange={e=>updatePassenger(seg.id,p.id,"price",e.target.value)}
                                      className="calc-input" style={{padding:"6px 10px",fontSize:13,fontFamily:"'Outfit',sans-serif",fontVariantNumeric:"tabular-nums lining-nums",fontWeight:600,textAlign:"right",opacity:pIsMax?.5:1}}
                                      disabled={pIsMax}/>
                                  </div>
                                  {passengers.length > 1
                                    ? <button onClick={()=>removePassenger(seg.id,p.id)} className="btn btn-ghost btn-xs" aria-label="Supprimer ce passager">✕</button>
                                    : <div/>
                                  }
                                </div>
                              );
                            })}
                            <button onClick={()=>addPassenger(seg.id)} style={{
                              background:"none",border:"1.5px dashed var(--border-mid)",color:"var(--tx-mid)",
                              borderRadius:"var(--r-md)",padding:"6px 12px",fontSize:11.5,fontWeight:600,
                              cursor:"pointer",fontFamily:"var(--font)",width:"100%",marginTop:4,
                            }}>+ Ajouter un passager</button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* ── Retard card ── */}
            <div className="card">
              <SectionTitle color="var(--prune)">Retard à la destination finale</SectionTitle>

              {/* Time pickers */}
              <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div>
                  <label className="label" htmlFor="heure-theo">Arrivée théorique</label>
                  {isMobile
                    ? <TimePicker value={heureTheo} onChange={setHeureTheo} highlight={false}/>
                    : <input id="heure-theo" type="time" value={heureTheo} onChange={e=>setHeureTheo(e.target.value)} className="calc-input" style={{fontSize:19,fontWeight:800,padding:"9px 12px",fontFamily:"'Outfit',sans-serif",fontVariantNumeric:"tabular-nums lining-nums"}}/>
                  }
                </div>
                <div>
                  <label className="label" htmlFor="heure-reel">Arrivée réelle</label>
                  {isMobile
                    ? <TimePicker value={heureReel} onChange={setHeureReel} highlight={!!(timeDelay!==null&&timeDelay>0)}/>
                    : <input id="heure-reel" type="time" value={heureReel} onChange={e=>setHeureReel(e.target.value)} className="calc-input" style={{fontSize:19,fontWeight:800,padding:"9px 12px",fontFamily:"'Outfit',sans-serif",fontVariantNumeric:"tabular-nums lining-nums",borderColor:timeDelay!==null&&timeDelay>0?"var(--prune)":"var(--border)",color:timeDelay!==null&&timeDelay>0?"var(--prune)":"var(--tx)"}}/>
                  }
                </div>
              </div>

              {/* Calculated delay */}
              {timeDelay !== null && (
                <div style={{marginBottom:14,padding:"12px 16px",borderRadius:"var(--r-md)",background:timeDelay===0?"var(--green-lt)":timeDelay<30?"var(--amber-lt)":"var(--prune-lt)",border:`1.5px solid ${timeDelay===0?"rgba(130,190,0,.3)":timeDelay<30?"rgba(224,82,6,.25)":"rgba(161,0,107,.2)"}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:12,color:"var(--tx-mid)",fontWeight:500}}>Retard calculé :</span>
                  <span className="amount-display" style={{fontSize:22,color:timeDelay===0?"var(--green)":timeDelay<30?"var(--amber)":"var(--prune)"}}>
                    {timeDelay===0?"✓ À l'heure":`${timeDelay} min${timeDelay>=60?` (${Math.floor(timeDelay/60)}h${timeDelay%60>0?String(timeDelay%60).padStart(2,"0")+"min":""})`:""}`}
                  </span>
                </div>
              )}

              <Divider label="OU saisir manuellement"/>

              {/* Delay quick buttons */}
              <div style={{marginBottom:12}}>
                <div className="label" style={{marginBottom:7}}>Tranches du barème</div>
                <div className="three-col" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {[
                    {label:"< 30 min",     sub:"Non éligible",   value:15,  color:"var(--tx-muted)", bg:"var(--surface2)"},
                    {label:"30 – 59 min",  sub:"25% ou 5€ BAD",  value:30,  color:"var(--prune)"},
                    {label:"60 – 119 min", sub:"25% ou 5€ BAD",  value:60,  color:"var(--prune)"},
                    {label:"120 – 179 min",sub:"50% ou 5€ BAD",  value:120, color:"var(--prune)"},
                    {label:"180 – 239 min",sub:"75% ou 10€ BAD", value:180, color:"var(--prune-dk)"},
                    {label:"≥ 240 min",    sub:"75% ou 20€ BAD", value:240, color:"var(--prune-dk)"},
                  ].map(({label,sub,value,color})=>{
                    const active = timeDelay===null && (
                      value===15?finalDelay<30:value===30?finalDelay>=30&&finalDelay<=59:
                      value===60?finalDelay>=60&&finalDelay<=119:value===120?finalDelay>=120&&finalDelay<=179:
                      value===180?finalDelay>=180&&finalDelay<=239:finalDelay>=240
                    );
                    return (
                      <button key={value} onClick={()=>{setSliderDelay(value);setHeureTheo("");setHeureReel("");}}
                        className={`delay-btn${active?" active":""}`}>
                        <div className="delay-btn-label" style={{color:active?"white":color}}>{label}</div>
                        <div className="delay-btn-sub">{sub}</div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Manual minutes input */}
              <details style={{marginBottom:14}}>
                <summary className="label" style={{cursor:"pointer",userSelect:"none",marginBottom:6}}>Saisie exacte en minutes ▸</summary>
                <div style={{display:"flex",alignItems:"center",gap:12,paddingTop:6}}>
                  <input type="number" min="0" max="600" step="1" placeholder="ex: 47" value={timeDelay===null?sliderDelay:timeDelay}
                    onChange={e=>{setSliderDelay(parseInt(e.target.value)||0);setHeureTheo("");setHeureReel("");}}
                    className="calc-input" style={{width:120,fontFamily:"'Outfit',sans-serif",fontVariantNumeric:"tabular-nums lining-nums",fontWeight:800,fontSize:18,textAlign:"center"}}/>
                  <input type="range" min="0" max="360" step="1" value={timeDelay===null?sliderDelay:timeDelay}
                    onChange={e=>{setSliderDelay(parseInt(e.target.value));setHeureTheo("");setHeureReel("");}}
                    style={{flex:1}} aria-label="Retard en minutes"/>
                  <span className="mono fw-700" style={{color:"var(--prune)",minWidth:50,textAlign:"right"}}>{finalDelay} min</span>
                </div>
              </details>

              {/* Situation perturbée */}
              <details style={{marginBottom:0}}>
                <summary className="label" style={{cursor:"pointer",userSelect:"none",marginBottom:6}}>Situation perturbée (Retard BD30 imputé au transporteur) ▸</summary>
                <div style={{paddingTop:8}}>
                  <div className="alert alert-amber" style={{marginBottom:10}}>
                    ⚠️ Les règles BD30 s'appliquent uniquement lorsque le retard est <strong>imputé au transporteur éligible</strong>. En cas de situation perturbée, des règles spécifiques s'appliquent.
                  </div>
                  <div style={{marginBottom:10}}>
                    <div className="label" style={{marginBottom:6}}>Avis de perturbation</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {[{v:"j2",l:"J-2 ou avant"},{v:"j1h00",l:"J-1 avant 18h"},{v:"apresH00",l:"J-1 après 18h ou Jour J"},{v:"inopinee",l:"Inopinée (≤ 2h avant)"},{v:"bypass",l:"Bypass (situation active)"}].map(({v,l})=>(
                        <button key={v} className={`sp-pill${spAvis===v?" active":""}`} onClick={()=>setSpAvis(a=>a===v?"":v)}>{l}</button>
                      ))}
                    </div>
                  </div>
                  {spAvis && (
                    <div style={{marginBottom:10}}>
                      <div className="label" style={{marginBottom:6}}>COS (Cellule Opérations Spéciales)</div>
                      <div style={{display:"flex",gap:6}}>
                        {[{v:"oui",l:"Oui"},{v:"non",l:"Non"}].map(({v,l})=>(
                          <button key={v} className={`sp-pill${spCos===v?" active":""}`} onClick={()=>setSpCos(c=>c===v?"":v)}>{l}</button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </details>
            </div>

            {/* ── Résultats détaillés ── */}
            {computed && computed.eligible && (
              <div className="card" style={{borderColor:"rgba(161,0,107,.2)"}}>
                <SectionTitle color="var(--prune)">Indemnisation calculée</SectionTitle>
                {computed.results.map((r,i)=>{
                  const ri=r.rateInfo,pts=ri?.points>0,dual=ri?.dual;
                  const isExceptSeg=computed.exceptOnSegId===r.id;
                  const exceptBonus=isExceptSeg?computed.exceptBonus:0;
                  const totalAmt=(r.amount||0)+exceptBonus;
                  const hasComplement=r.ouigoRealDelayMin!==null&&r.ouigoBD30Due!==null;
                  return (
                    <div key={r.id||i} style={{borderTop:i>0?"1px solid var(--border)":"none"}}>
                      <div className="result-row" style={{
                        background:hasComplement?(r.ouigoRefus?"rgba(161,0,107,.04)":"rgba(110,30,120,.04)"):isExceptSeg?"var(--amber-lt)":"transparent",
                        borderRadius:(hasComplement||isExceptSeg)?8:0,padding:"10px 0",
                      }}>
                        <div className="seg-num" style={{width:22,height:22,fontSize:9,background:r.eligible?(r.carrier?.color||"var(--prune)"):"#DDD",color:"white",border:"none",flexShrink:0}}>{i+1}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12.5,fontWeight:600,color:"var(--tx)",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            {r.carrier?.label||"—"}
                            {r.eligible && <TarifPill tarif={r.tarif}/>}
                            {isExceptSeg&&<span style={{fontSize:10,background:"var(--amber-lt)",color:"var(--amber)",padding:"1px 7px",borderRadius:10,fontWeight:700,border:"1px solid var(--amber)"}}>Except.</span>}
                            {hasComplement&&<span style={{fontSize:10,background:r.ouigoRefus?"#F5D0D8":"#EDE0FF",color:r.ouigoRefus?"var(--prune)":"var(--purple)",padding:"1px 7px",borderRadius:10,fontWeight:700,border:`1px solid ${r.ouigoRefus?"var(--prune)":"#C0A0E8"}`}}>RT 6373</span>}
                          </div>
                          <div style={{fontSize:11,color:"var(--tx-muted)",marginTop:2,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            {r.eligible
                              ?(r.multiPassMode
                                ? <span style={{fontStyle:"italic",color:"var(--blue)",fontWeight:600}}>Multi-tarifs · {(r.passengersResult||[]).length} passager{(r.passengersResult||[]).length>1?"s":""}</span>
                                : TARIFS_MAP.get(r.tarif)?.label||"—")
                              :<em>Hors périmètre BD30</em>
                            }
                            {ri&&ri.type&&r.eligible&&!r.multiPassMode&&(
                              <Badge color={r.tarif==="prime_titulaire"?"var(--blue)":r.tarif==="prime_fid_tiers"?"var(--purple)":r.tarif==="prime_gvt_tiers"?"var(--purple)":(ri.rate>0||ri.fixedAmount)?"var(--prune)":"var(--tx-muted)"}>
                                {ri.type}
                              </Badge>
                            )}
                          </div>
                          {/* ── Détail passagers en mode multi-tarifs ── */}
                          {r.multiPassMode && r.passengersResult && r.passengersResult.length > 0 && (
                            <div style={{marginTop:8,borderTop:"1px dashed var(--border)",paddingTop:8,display:"flex",flexDirection:"column",gap:5}}>
                              {r.passengersResult.map((p,pi)=>{
                                const pri = p.rateInfo;
                                const pTarifLabel = TARIFS_MAP.get(p.tarif)?.label||p.tarif||"—";
                                const pColor = TARIFS.find(t=>t.id===p.tarif)?.color||"var(--prune)";
                                const isMaxP = ["max_loisirs","prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(p.tarif);
                                const rateStr = pri?.points>0 ? `${pri.points} pts FID`
                                  : pri?.dual==="fid_tiers" ? `${pri.points||0} pts + ${pri.fixedAmount||0} € BAD`
                                  : pri?.dual==="gvt_tiers" ? `${(pri.fixedAmount||0)*2} € BAD×2`
                                  : pri?.fixedAmount!=null ? `${pri.fixedAmount} € BAD`
                                  : pri?.rate>0 ? `${pri.rate}%`
                                  : "—";
                                return (
                                  <div key={p.id||pi} style={{
                                    display:"grid",
                                    gridTemplateColumns:"20px 1fr auto auto",
                                    gap:8, alignItems:"center",
                                    padding:"5px 8px",
                                    borderRadius:6,
                                    background:"var(--surface2)",
                                    border:"1px solid var(--border)",
                                  }}>
                                    <span style={{fontSize:10,fontWeight:800,color:"var(--tx-muted)",textAlign:"center"}}>P{pi+1}</span>
                                    <div style={{minWidth:0}}>
                                      <span style={{fontSize:11.5,fontWeight:600,color:pColor}}>{pTarifLabel}</span>
                                      {!isMaxP && p.price>0 && (
                                        <span style={{fontSize:11,color:"var(--tx-muted)",marginLeft:6,fontVariantNumeric:"tabular-nums"}}>
                                          {p.price.toFixed(2)} €
                                        </span>
                                      )}
                                      {isMaxP && (
                                        <span style={{fontSize:10,color:"var(--tx-muted)",marginLeft:6}}>0 €</span>
                                      )}
                                    </div>
                                    <span style={{
                                      fontSize:11,fontWeight:700,
                                      background: pri?.rate>0?"var(--prune-lt)":pri?.fixedAmount!=null?"var(--green-lt)":pri?.points>0?"var(--blue-lt)":"var(--surface3)",
                                      color: pri?.rate>0?"var(--prune)":pri?.fixedAmount!=null?"var(--green)":pri?.points>0?"var(--blue)":"var(--tx-muted)",
                                      padding:"2px 7px",borderRadius:5,
                                      fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap",
                                    }}>
                                      {rateStr}
                                    </span>
                                    <span style={{
                                      fontSize:12,fontWeight:800,color:"var(--prune)",
                                      fontVariantNumeric:"tabular-nums",minWidth:52,textAlign:"right",whiteSpace:"nowrap",
                                    }}>
                                      {p.amount>0?`${p.amount.toFixed(2)} €`:p.rateInfo?.points>0?`${p.rateInfo.points} pts`:"—"}
                                    </span>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                          {/* ── RT 6373 : détail complément OUIGO ── */}
                          {hasComplement&&(
                            <div style={{marginTop:6,fontSize:11,color:"var(--purple)",lineHeight:1.65,padding:"6px 10px",background:"rgba(110,30,120,.05)",borderRadius:6,border:"1px solid rgba(110,30,120,.18)"}}>
                              BD30 dû : <strong>{r.ouigoBD30Due.toFixed(2)} EUR</strong>
                              {" — "}déjà versé OUIGO ({r.ouigoRealDelayMin} min) : <strong>{r.ouigoAlreadyPaid.toFixed(2)} EUR</strong>
                              {r.ouigoRefus
                                ?<span style={{display:"block",color:"var(--prune)",fontWeight:700,marginTop:3}}>⛔ Refus — OUIGO a déjà versé ≥ BD30 due</span>
                                :<span style={{display:"block",color:"var(--green)",fontWeight:700,marginTop:3}}>= Complément TGV Care : {totalAmt.toFixed(2)} EUR</span>
                              }
                            </div>
                          )}
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          {r.eligible&&ri ? (
                            ri.points>0
                              ?<div style={{background:"var(--blue-lt)",color:"var(--blue)",fontWeight:800,fontSize:13,padding:"4px 8px",borderRadius:6,textAlign:"center",lineHeight:1.2,fontVariantNumeric:"tabular-nums"}}>{ri.points}<br/><span style={{fontSize:11,fontWeight:600}}>pts</span></div>
                              :ri.fixedAmount!==null
                              ?<AmountPill color="var(--green)" size={12}>{ri.fixedAmount} EUR</AmountPill>
                              :<div style={{background:ri.rate>0?"var(--prune-lt)":"var(--surface2)",color:ri.rate>0?"var(--prune)":"var(--tx-muted)",fontWeight:800,fontSize:16,padding:"4px 8px",borderRadius:6,fontVariantNumeric:"tabular-nums"}}>{ri.rate}%</div>
                          ):<div style={{color:"var(--tx-muted)",fontSize:14}}>—</div>}
                        </div>
                        <AmountPill color={r.eligible?"var(--prune)":"var(--tx-muted)"} size={13}>
                          {r.eligible?totalAmt.toFixed(2):"—"}{r.eligible?" €":""}
                        </AmountPill>
                      </div>
                    </div>
                  );
                })}
                {computed.exceptBonus > 0 && (
                  <div style={{marginTop:8,padding:"10px 12px",background:"rgba(255,213,0,.12)",border:"1px solid rgba(255,213,0,.4)",borderRadius:"var(--r-md)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:12,color:"var(--tx-mid)"}}>⭐ Bonus exceptionnel ({computed.excLvl?.label})</span>
                    <span className="amount-display" style={{color:"#B8860B",fontSize:14}}>+{computed.exceptBonus.toFixed(2)} €</span>
                  </div>
                )}
                {computed.results.length > 1 && (
                  <div style={{marginTop:10,padding:"10px 12px",background:"var(--prune-lt)",border:"1px solid rgba(161,0,107,.2)",borderRadius:"var(--r-md)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:12.5,fontWeight:700,color:"var(--prune)"}}>Total BD30</span>
                    <span className="amount-display" style={{color:"var(--prune)",fontSize:20}}>{computed.total.toFixed(2)} €</span>
                  </div>
                )}
              </div>
            )}

            {/* ── Circonstance exceptionnelle ── */}
            <div className="card">
              <SectionTitle color="var(--amber)">Circonstance exceptionnelle</SectionTitle>
              <div className="alert alert-amber" style={{marginBottom:12}}>
                Applicable lorsque le retard est lié à une circonstance exceptionnelle (grève, intempérie grave, acte malveillant…). Nécessite une validation hiérarchique.
              </div>
              <div className="label" style={{marginBottom:8}}>Niveau d'indemnisation exceptionnelle</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                {EXCEPT_LEVELS.map(l=>(
                  <button key={l.id} onClick={()=>{setExceptLevel(l.id);if(l.id==="none")setExceptSegmentId(null);}}
                    className="delay-btn" style={{
                      borderColor:exceptLevel===l.id?"var(--amber)":"var(--border)",
                      background:exceptLevel===l.id?"var(--amber)":"var(--surface)",
                      color:exceptLevel===l.id?"white":"var(--tx-mid)",
                    }}>
                    <div className="delay-btn-label">{l.label}</div>
                  </button>
                ))}
              </div>
              {exceptLevel!=="none" && segments.filter(s=>CARRIERS.find(c=>c.id===s.carrier)?.group==="eligible").length > 1 && (
                <div style={{marginTop:12}}>
                  <div className="label" style={{marginBottom:6}}>Segment concerné</div>
                  {segments.filter(s=>CARRIERS.find(c=>c.id===s.carrier)?.group==="eligible").map((seg,i)=>{
                    const c=CARRIERS.find(c=>c.id===seg.carrier);
                    return (
                      <button key={seg.id} onClick={()=>setExceptSegmentId(exceptSegmentId===seg.id?null:seg.id)}
                        style={{display:"block",width:"100%",textAlign:"left",padding:"8px 12px",margin:"0 0 5px",borderRadius:"var(--r-md)",border:`1.5px solid ${exceptSegmentId===seg.id?"var(--amber)":"var(--border)"}`,background:exceptSegmentId===seg.id?"var(--amber-lt)":"var(--surface)",cursor:"pointer",fontFamily:"var(--font)",fontSize:12.5,color:"var(--tx)"}}>
                        Segment {i+1} — {c?.label||"—"}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ═══════ TAB : FRAIS ═══════ */}
        {tab==="frais" && (
          <div id="panel-frais" role="tabpanel" aria-label="Frais annexes">

          {/* ── 1. Situation perturbée ── */}
          <div className="card" style={{padding:0,overflow:"hidden",borderColor:"var(--blue)",borderWidth:1.5,marginBottom:12}}>
            {(()=>{
              const open=openFraisCards.has("sp");
              const toggle=()=>setOpenFraisCards(prev=>{const n=new Set(prev);n.has("sp")?n.delete("sp"):n.add("sp");return n;});
              const getVerdict=()=>{
                if(!spVoyage) return null;
                if(spRenoncement==="oui") return {type:"renoncement"};
                if(!spRenoncement||spRenoncement==="") return null;
                if(!spAvis) return null;
                if(spAvis==="j2") return {type:"refus",title:"REFUS des frais supplémentaires",text:"Le client a été avisé jusqu'à J−2 : l'échange devait être effectué sans frais. Aucune prise en charge des frais de rachat ou de surcoût.",g30:true,g30note:"La G30 reste applicable sur le retard global (y compris si le train de report est TER, car, bus)."};
                if(spAvis==="bypass") return {type:"accord",title:"ACCORD — G30 retard global",text:"Le client a voyagé avec RC 00 ou a échangé sans frais (Bypass) : la G30 s'applique sur le retard global, même si le train de report était un TER.",g30:true,g30note:"Retard global = heure réelle d'arrivée à destination finale via le train de report."};
                if(spAvis==="j1h00"){
                  if(!spCos) return null;
                  if(spCos==="oui") return {type:"refus",title:"REFUS — COS a proposé une alternative",text:"Le COS a proposé une solution dans les 100 minutes : refus de prise en charge des frais.",g30:false};
                  return {type:"accord",title:"ACCORD — Pas de proposition COS dans les 100 min",text:"Le COS n'a pas proposé de solution alternative dans les 100 minutes après l'heure de départ théorique.",details:["✅ Remboursement du montant du billet racheté","✅ G30 sur le retard global (y compris si report en car, bus ou autre entité ferroviaire)"],g30:true,g30note:"Retard global calculé à destination finale."};
                }
                if(spAvis==="apresH00"||spAvis==="inopinee"){
                  if(!spCos) return null;
                  if(spCos==="oui") return {type:"refus",title:"REFUS — COS a proposé une alternative",text:"Le COS a proposé une solution dans les 100 minutes : refus de prise en charge des frais supplémentaires.",g30:false};
                  return {type:"accord",title:"ACCORD — Pas de proposition COS dans les 100 min",text:"Suppression inopinée ou avisé après H00 — COS sans proposition dans les 100 minutes.",details:["✅ Remboursement des frais d'échange ou du billet initial non utilisé","✅ Remboursement du surcoût de rachat","✅ G30 sur le retard global"],g30:true,g30note:"Retard global calculé à destination finale."};
                }
                return null;
              };
              const verdict=getVerdict();
              const needCos=spAvis==="j1h00"||spAvis==="apresH00"||spAvis==="inopinee";
              const showAvisFlow=spRenoncement==="non";
              return(<>
                <button onClick={toggle} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left",borderBottom:open?"1px solid var(--blue-mid)":"none"}}>
                  <span style={{display:"flex",alignItems:"center",gap:9}}>
                    <span style={{fontSize:18}}>🚨</span>
                    <span style={{fontSize:13,fontWeight:700,color:"var(--blue)"}}>Situation perturbée — Éligibilité des frais</span>
                  </span>
                  <span className={`acc-chevron${open?" open":""}`} style={{color:"var(--tx-muted)"}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                  </span>
                </button>
                {open&&(
                  <div style={{padding:"16px 18px"}}>
                    <div style={{marginBottom:12}}>
                      <label className="label">Motif de la perturbation</label>
                      <select className="calc-input" value={spVoyage} onChange={e=>{setSpVoyage(e.target.value);setSpAvis("");setSpCos("");setSpRenoncement("");}}>
                        <option value="">— Sélectionner —</option>
                        <option value="suppression">Suppression de train</option>
                        <option value="retard60">Retard ≥ 60 min</option>
                      </select>
                    </div>
                    {spVoyage&&(
                      <div style={{marginBottom:12}}>
                        <label className="label">Le client renonce-t-il au voyage ?</label>
                        <div style={{display:"flex",gap:10,marginTop:6}}>
                          {[["oui","✈️ Oui — renoncement"],["non","🚆 Non — voyage maintenu"]].map(([v,l])=>(
                            <button key={v} onClick={()=>{setSpRenoncement(v);setSpAvis("");setSpCos("");}} style={{flex:1,padding:"9px 14px",borderRadius:10,fontFamily:"inherit",fontSize:12,fontWeight:spRenoncement===v?700:500,cursor:"pointer",border:`1.5px solid ${spRenoncement===v?(v==="oui"?"var(--purple)":"var(--blue)"):"var(--border)"}`,background:spRenoncement===v?(v==="oui"?"var(--purple-lt)":"var(--blue-lt)"):"var(--surface)",color:spRenoncement===v?(v==="oui"?"var(--purple)":"var(--blue)"):"var(--tx-mid)"}}>{l}</button>
                          ))}
                        </div>
                      </div>
                    )}
                    {verdict&&verdict.type==="renoncement"&&(
                      <div style={{borderRadius:12,padding:"14px 16px",background:"var(--purple-lt)",border:"1.5px solid #C89AE0",marginTop:4}}>
                        <div style={{fontWeight:800,fontSize:13,color:"var(--purple)",marginBottom:10}}>✅ Renoncement au voyage — Remboursement intégral</div>
                        <div style={{fontSize:12,color:"#5A2D80",lineHeight:1.7,marginBottom:10}}>Remboursement intégral du billet, y compris les billets <strong>NE / NR</strong>.</div>
                        <div style={{padding:"10px 14px",borderRadius:10,background:"var(--surface)",border:"1px solid #D4B0F0"}}>
                          <div style={{fontWeight:700,fontSize:11,color:"var(--purple)",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>🎫 Barème particulier — Billets Prime GVT / Exit (en BAD uniquement)</div>
                          {[["Prime Promo","40 €/trajet/voyageur"],["Billet Prime 2nde","40 €/trajet/voyageur"],["Billet Prime 1ère","50 €/trajet/voyageur"]].map(([type,montant])=>(
                            <div key={type} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #EDE0FF"}}>
                              <span style={{fontSize:12,color:"#5A2D80",fontWeight:500}}>{type}</span>
                              <span style={{fontSize:13,color:"var(--purple)",fontWeight:800,fontVariantNumeric:"tabular-nums"}}>{montant}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {showAvisFlow&&(<>
                      <div style={{marginBottom:12}}>
                        <label className="label">Quand le client a-t-il été avisé ?</label>
                        <select className="calc-input" value={spAvis} onChange={e=>{setSpAvis(e.target.value);setSpCos("");}}>
                          <option value="">— Sélectionner —</option>
                          <option value="j2">Jusqu'à J−2 (avisé bien avant)</option>
                          <option value="j1h00">J−1 jusqu'à H00 (veille ou la nuit)</option>
                          <option value="apresH00">Après H00 (matin du jour J, avant gare)</option>
                          <option value="inopinee">Inopinée — découverte en gare le jour J</option>
                          <option value="bypass">Voyage avec RC 00 ou échange sans frais (Bypass)</option>
                        </select>
                      </div>
                      {needCos&&spAvis&&(
                        <div style={{marginBottom:12}}>
                          <label className="label">Le COS a-t-il proposé une solution dans les <strong>100 minutes</strong> ?</label>

                              }

          {/* ── 3. Mémo Frais annexes §09 ── */}

                  <span style={{display:"flex",alignItems:"center",gap:8,color:"white",fontWeight:700,fontSize:13}}><span>ℹ️</span> Frais annexes (§09) — Types acceptés par SNCF Voyageurs sur justificatifs</span>

              </div>

                  <span style={{fontSize:18,flexShrink:0}}>🚄➕🟣</span>
                  <div style={{flex:1,minWidth:0}}><div style={{color:"white",fontWeight:800,fontSize:13}}>Billet Direct TGV / Intercités + OUIGO</div><div style={{color:"rgba(255,255,255,.65)",fontSize:11,marginTop:1}}>Règle en vigueur depuis le 7 juin 2023 — retard à l'arrivée finale uniquement</div></div>

                {openOuigoCard&&(
                  <div style={{padding:"14px 18px",background:"var(--blue-lt)"}}>
                    <div style={{fontSize:11.5,color:"var(--blue)",lineHeight:1.7,padding:"8px 12px",background:"rgba(0,136,206,.08)",borderRadius:8,border:"1px solid rgba(0,136,206,.2)",marginBottom:14}}>📌 <strong>Principe :</strong> Le retard pris en compte est celui constaté à <strong>l'arrivée finale</strong> du voyageur, quel que soit le segment perturbé.</div>

                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>{[["Retard &lt; 60 min","BAD uniquement"],["Retard ≥ 60 min","BAD ou virement"]].map(([label,val])=><div key={label} style={{padding:"8px 10px",borderRadius:8,background:"var(--blue-lt)",border:"1px solid var(--blue-mid)"}}><div style={{fontWeight:700,fontSize:11,color:"var(--blue)",marginBottom:4}} dangerouslySetInnerHTML={{__html:label}}/><div style={{fontSize:11,color:"var(--tx-mid)"}}>{val}</div></div>)}</div>
                        <div style={{fontSize:11,padding:"7px 10px",borderRadius:7,background:"#FFF8E0",border:"1px solid #F5D060",color:"#7A5000"}}>💬 <strong>Si OUIGO aussi retardé :</strong> informer le client que la compensation OUIGO sera gérée en proactif par OUIGO. Ne pas cumuler les deux indemnisations.</div>

                    </div>

                      <div style={{padding:"12px 14px",background:"white",fontSize:11.5,lineHeight:1.8,color:"var(--tx-mid)"}}>
                        <div style={{marginBottom:8}}><strong>Traitement :</strong> TGV Care intervient sur le segment <strong>TGV / Intercités uniquement</strong>. OUIGO gère son propre retard en proactif.</div>
                        <div style={{fontSize:11,padding:"7px 10px",borderRadius:7,background:"#E6F7F8",border:"1px solid #80D0D8",color:"#005C62"}}>✅ G30 calculée sur le segment TGV/IC. Aucune action TGV Care sur le segment OUIGO retardé.</div>
                      </div>
                    </div>
                    <div style={{borderRadius:10,overflow:"hidden",border:"1.5px solid var(--purple)"}}>

                      <div style={{padding:"12px 14px",background:"var(--purple-lt)",fontSize:11.5,lineHeight:1.8,color:"var(--tx-mid)"}}>

                        <div style={{display:"flex",flexDirection:"column",gap:6}}>
                          <div style={{display:"flex",gap:8,alignItems:"flex-start"}}><span style={{flexShrink:0,background:"#B00020",color:"white",borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:700,marginTop:2}}>REFUS</span><span>Compensation OUIGO déjà versée <strong>≥ G30 due</strong> sur le billet direct → refus total.</span></div>
                          <div style={{display:"flex",gap:8,alignItems:"flex-start"}}><span style={{flexShrink:0,background:"var(--green)",color:"white",borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:700,marginTop:2}}>COMPLÉMENT</span><span>Compensation OUIGO versée <strong>&lt; G30 due</strong> → TGV Care verse uniquement la différence en BAD.</span></div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
            return null;
          })()}

          </div>
        )}

                <button onClick={()=>copyResult(primary)} className="rbar-btn">
                  {copied===primary
                    ? <><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Copié</>
                    : <><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copier</>
                  }
                </button>
                <div style={{color:"white",fontSize:22,fontWeight:900,fontFamily:"'Outfit',sans-serif",fontVariantNumeric:"tabular-nums lining-nums",letterSpacing:"-.5px",minWidth:76,textAlign:"right"}}>
                  <AnimatedNumber value={showBoth?grandTotal:(hasG30?computed.total:fraisComputed.total)}/>{" €"}
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── FOOTER ─────────────────────────────────────────────── */}
      <footer className="app-footer">
        Calculateur BD30/G30 · <strong style={{color:"var(--prune)"}}>v3.4</strong> · PDSA · Règlement PRR 2021 · En vigueur au 02/03/2026 · À titre indicatif uniquement
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
