<style>
:root {
  --pm-expo:   cubic-bezier(0.16, 1, 0.3, 1);
  --pm-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --pm-quart:  cubic-bezier(0.25, 1, 0.5, 1);
}

/* ── Cursor glow ── */
#pm-glow {
  position:fixed; top:0; left:0;
  width:480px; height:480px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(161,0,107,.07) 0%, rgba(161,0,107,.025) 38%, transparent 65%);
  pointer-events:none; z-index:0; will-change:transform;
  transform:translate3d(-9999px,-9999px,0);
}
[data-theme="dark"] #pm-glow {
  background:radial-gradient(circle, rgba(212,104,142,.09) 0%, rgba(212,104,142,.025) 38%, transparent 65%);
}

/* ── Ambient orbs — upgrade ── */
body::before { animation: pm-orb-a 22s ease-in-out infinite !important; will-change:transform; }
@keyframes pm-orb-a {
  0%,100% { transform:translate(0,0) scale(1); }
  25%      { transform:translate(55px,-38px) scale(1.07); }
  50%      { transform:translate(22px,46px) scale(0.93); }
  75%      { transform:translate(-38px,18px) scale(1.04); }
}

/* ── Card enter — blur + fade + slide ── */
@keyframes pm-enter {
  from { opacity:0; transform:translateY(12px) scale(0.986); filter:blur(4px); }
  to   { opacity:1; transform:none; filter:none; }
}
.card       { animation: pm-enter 0.38s var(--pm-expo) both !important; }
.seg-card   { animation: pm-enter 0.32s var(--pm-expo) both !important; }
.mode-banner{ animation: pm-enter 0.30s var(--pm-expo) both !important; }
.pass-row   { animation: pm-enter 0.24s var(--pm-expo) both !important; }

/* Card stagger */
.card:nth-child(1) { animation-delay:  0ms !important; }
.card:nth-child(2) { animation-delay: 55ms !important; }
.card:nth-child(3) { animation-delay:110ms !important; }
.card:nth-child(4) { animation-delay:165ms !important; }
.card:nth-child(5) { animation-delay:220ms !important; }
.seg-card:nth-child(2) { animation-delay: 45ms !important; }
.seg-card:nth-child(3) { animation-delay: 90ms !important; }

/* ── Card parallax — driven by JS custom props ── */
.card {
  position:relative;
  transform-style:preserve-3d;
  will-change:transform;
  transition: transform 0.38s var(--pm-quart), box-shadow 0.35s var(--pm-quart), border-color 0.2s ease !important;
}
.card:hover {
  box-shadow: var(--sh-md), 0 0 36px var(--prune-glow) !important;
  border-color: rgba(161,0,107,.18) !important;
}
[data-theme="dark"] .card:hover {
  box-shadow: var(--sh-md), 0 0 28px rgba(212,104,142,.13) !important;
  border-color: rgba(212,104,142,.2) !important;
}

/* Card shimmer sweep */
.card::before {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background: linear-gradient(108deg, transparent 15%, rgba(255,255,255,.06) 50%, transparent 85%);
  background-size:300% 100%; background-position:200% 0;
  opacity:0; pointer-events:none;
  transition: opacity 0.5s var(--pm-quart), background-position 0.75s var(--pm-quart);
  z-index:1;
}
.card:hover::before { opacity:1; background-position:-70% 0; }
[data-theme="dark"] .card::before {
  background: linear-gradient(108deg, transparent 15%, rgba(255,255,255,.035) 50%, transparent 85%);
  background-size:300% 100%;
}

/* ── Interactive elements ── */
.btn-primary {
  transition: background 0.2s var(--pm-expo), transform 0.2s var(--pm-spring), box-shadow 0.22s ease !important;
  box-shadow: 0 4px 18px rgba(161,0,107,.24), inset 0 1px 0 rgba(255,255,255,.14) !important;
  will-change:transform;
}
.btn-primary:hover {
  transform: translateY(-2px) scale(1.015) !important;
  box-shadow: 0 8px 30px rgba(161,0,107,.34), inset 0 1px 0 rgba(255,255,255,.14) !important;
}
.btn-primary:active { transform:scale(0.97) !important; transition-duration:0.07s !important; }

.rbar-btn {
  transition: background 0.15s ease, transform 0.2s var(--pm-spring), box-shadow 0.2s ease !important;
  will-change:transform;
}
.rbar-btn:hover  { transform:translateY(-2px) !important; box-shadow:0 6px 20px rgba(0,0,0,.22) !important; }
.rbar-btn:active { transform:scale(0.96) !important; transition-duration:0.07s !important; }

.delay-btn {
  transition: all 0.22s var(--pm-expo) !important;
  will-change:transform;
}
.delay-btn:hover { transform:translateY(-2px) !important; }
.delay-btn.active { transform:translateY(-1px) scale(1.03) !important; }

.tarif-pill {
  transition: all 0.2s var(--pm-expo) !important;
  will-change:transform;
}
.tarif-pill:hover  { transform:translateY(-1px) !important; opacity:1 !important; box-shadow:0 4px 14px rgba(0,0,0,.08); }
.tarif-pill.active { transform:translateY(-1px) !important; box-shadow:0 4px 18px rgba(0,0,0,.1); }

.icon-btn {
  transition: all 0.2s var(--pm-expo) !important;
}
.icon-btn:hover  { transform:translateY(-2px) scale(1.07) !important; }
.icon-btn:active { transform:scale(0.90) !important; }

.pill-btn { transition: all 0.2s var(--pm-expo) !important; }
.pill-btn:hover { transform:translateY(-1px) !important; }

/* Input focus glow */
.calc-input:focus, select.calc-input:focus {
  border-color:var(--prune) !important;
  box-shadow: 0 0 0 3px var(--prune-glow), 0 2px 10px rgba(161,0,107,.08) !important;
  transition: box-shadow 0.22s var(--pm-expo), border-color 0.16s ease !important;
}

/* ── Result bar enter ── */
@keyframes pm-bar-enter {
  from { transform:translateY(100%); opacity:0; }
  to   { transform:translateY(0); opacity:1; }
}
.result-bar { animation: pm-bar-enter 0.42s var(--pm-expo) both; }

/* ── Amount counting reveal ── */
@keyframes pm-amount-in {
  from { opacity:0; transform:translateY(6px) scale(0.9); filter:blur(3px); }
  to   { opacity:1; transform:none; filter:none; }
}
.amount-display { animation: pm-amount-in 0.45s var(--pm-expo) both; }

/* ── Pass row hover ── */
.pass-row {
  transition: background 0.18s ease, border-color 0.18s ease !important;
}
.pass-row:hover {
  background:var(--surface2) !important;
  border-color:rgba(161,0,107,.2) !important;
}

/* ── History panel ── */
.history-panel { transition: transform 0.32s var(--pm-expo), opacity 0.28s ease; }

/* ── Scroll ── */
html { scroll-behavior:smooth; }

/* ── Reduced motion — hard off ── */
@media (prefers-reduced-motion: reduce) {
  #pm-glow { display:none !important; }
  body::before { animation:none !important; }
  .card, .seg-card, .mode-banner, .pass-row,
  .result-bar, .amount-display {
    animation:none !important; filter:none !important; will-change:auto !important;
  }
  .card::before { display:none !important; }
  html { scroll-behavior:auto !important; }
}
</style>

<script>
(function(){
  'use strict';
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  /* ── Lerp utility ── */
  var lerp = function(a,b,t){ return a+(b-a)*t; };

  /* ── 1. Cursor glow — GPU lerp via rAF ── */
  var glow = document.createElement('div');
  glow.id = 'pm-glow';
  document.body.appendChild(glow);
  var mx=-9999, my=-9999, cx=-9999, cy=-9999;
  document.addEventListener('mousemove', function(e){ mx=e.clientX; my=e.clientY; }, {passive:true});
  document.addEventListener('mouseleave', function(){ mx=-9999; my=-9999; });
  (function loop(){
    cx = lerp(cx, mx-240, 0.065);
    cy = lerp(cy, my-240, 0.065);
    glow.style.transform = 'translate3d('+cx+'px,'+cy+'px,0)';
    requestAnimationFrame(loop);
  })();

  /* ── 2. Card parallax — subtle 3D tilt ── */
  function attachParallax(card){
    if(card._pm) return; card._pm = true;
    card.addEventListener('mousemove', function(e){
      var r = card.getBoundingClientRect();
      var x = (e.clientX-r.left)/r.width  - 0.5;
      var y = (e.clientY-r.top) /r.height - 0.5;
      card.style.transform = 'perspective(900px) rotateX('+(-y*3)+'deg) rotateY('+(x*4)+'deg) translateY(-3px)';
    }, {passive:true});
    card.addEventListener('mouseleave', function(){
      card.style.transition = 'transform 0.5s cubic-bezier(0.16,1,0.3,1), box-shadow 0.35s ease, border-color 0.2s ease';
      card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) translateY(0)';
    });
  }

  /* ── 3. Magnetic buttons ── */
  function attachMagnetic(btn){
    if(btn._pmMag) return; btn._pmMag = true;
    btn.addEventListener('mousemove', function(e){
      var r = btn.getBoundingClientRect();
      var dx = (e.clientX-(r.left+r.width /2))*0.25;
      var dy = (e.clientY-(r.top +r.height/2))*0.25;
      btn.style.transform = 'translate('+dx+'px,'+dy+'px) translateY(-1px)';
    }, {passive:true});
    btn.addEventListener('mouseleave', function(){
      btn.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1)';
      btn.style.transform = '';
      setTimeout(function(){ btn.style.transition=''; }, 500);
    });
  }

  /* ── 4. Number counting animation ── */
  function countUp(el){
    if(el._pmCount) return; el._pmCount = true;
    var text = el.textContent||'';
    var m = text.match(/([\d]+(?:[.,]\d+)?)/);
    if(!m) return;
    var target = parseFloat(m[1].replace(',','.'));
    if(isNaN(target)||target<1) return;
    var pre = text.slice(0, text.indexOf(m[1]));
    var suf = text.slice(text.indexOf(m[1])+m[1].length);
    var dec = (m[1].split(/[.,]/)[1]||'').length;
    var t0 = null, dur = 650;
    var ease = function(t){ return 1-Math.pow(1-t,3); };
    requestAnimationFrame(function step(ts){
      if(!t0) t0=ts;
      var p = Math.min((ts-t0)/dur, 1);
      el.textContent = pre + (ease(p)*target).toFixed(dec) + suf;
      if(p<1) requestAnimationFrame(step);
      else el.textContent = pre+target.toFixed(dec)+suf;
    });
  }

  /* ── 5. Tab content transition ── */
  document.addEventListener('click', function(e){
    if(!e.target.closest('.tab-btn')) return;
    var main = document.querySelector('.main');
    if(!main) return;
    main.style.cssText += ';opacity:0;transform:translateY(5px);filter:blur(3px);transition:opacity .13s ease,transform .13s ease,filter .13s ease';
    setTimeout(function(){
      main.style.cssText += ';opacity:1;transform:none;filter:none;transition:opacity .32s cubic-bezier(.16,1,.3,1),transform .32s cubic-bezier(.16,1,.3,1),filter .26s ease';
    }, 80);
  });

  /* ── 6. MutationObserver — wires everything to React DOM ── */
  var pending = false;
  function applyAll(){
    document.querySelectorAll('.card').forEach(attachParallax);
    document.querySelectorAll('.btn-primary,.rbar-btn').forEach(attachMagnetic);
    document.querySelectorAll('.amount-display').forEach(countUp);
  }
  new MutationObserver(function(){
    if(pending) return; pending=true;
    requestAnimationFrame(function(){ applyAll(); pending=false; });
  }).observe(document.getElementById('root')||document.body, {childList:true,subtree:true});
  setTimeout(applyAll, 250);

})();
</script>

</body>
</html>
