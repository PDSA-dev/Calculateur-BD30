<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Calculateur BD30/G30 — Indemnisation retards SNCF selon PRR 2021"/>
  <meta name="theme-color" content="#A1006B"/>
  <title>Calculateur BD30 / G30 · v3.4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ══════════════════════════════════════════════════════════════
       BD30/G30 CALCULATOR — Design System v3.4
       Charte SNCF × Precision UI × Refined Glass
       Auteur : PDSA · Refonte UX/UI : 2026 · Optimisation perf React
    ══════════════════════════════════════════════════════════════ */

    /* ── Tokens light ── */
    :root {
      /* SNCF Brand */
      --prune:#A1006B; --prune-dk:#7A0052; --prune-lt:#F7EBF2; --prune-glow:rgba(161,0,107,.12);
      --blue:#0088CE; --blue-lt:#E8F4FB; --blue-mid:rgba(0,136,206,.16);
      --green:#3D9900; --green-lt:#EBF5DF;
      --amber:#D95A00; --amber-lt:#FDF0E6; --amber-mid:rgba(217,90,0,.18);
      --purple:#6E1E78; --purple-lt:#F2EAF5;
      --teal:#007A84; --teal-lt:#E0F3F5;
      /* Surfaces */
      --bg:#F0EBE4; --surface:#FFFFFF; --surface2:#F6F2EE; --surface3:#EDE8E2;
      --glass:rgba(255,255,255,.82); --glass2:rgba(246,242,238,.9);
      /* Borders */
      --border:#E4DDD6; --border-mid:#D0C8C0;
      /* Text */
      --tx:#1A120E; --tx-mid:#5A4E48; --tx-muted:#8C7E78;
      /* Shadows */
      --sh:0 1px 2px rgba(28,10,4,.04),0 3px 12px rgba(28,10,4,.06);
      --sh-md:0 2px 6px rgba(28,10,4,.05),0 8px 28px rgba(28,10,4,.08);
      --sh-lg:0 4px 12px rgba(28,10,4,.06),0 16px 48px rgba(28,10,4,.10);
      --sh-prune:0 4px 20px rgba(161,0,107,.24);
      /* Radii */
      --r-sm:7px; --r-md:11px; --r-lg:16px; --r-xl:20px; --r-full:9999px;
      /* Font */
      --font:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
      --mono:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
      /* Tab height */
      --header-h:56px; --tabs-h:46px;
    }

    /* ── Tokens dark ── */
    [data-theme="dark"] {
      --prune:#D4688E; --prune-dk:#B04E72; --prune-lt:#200D17; --prune-glow:rgba(212,104,142,.16);
      --blue:#5BA8E0; --blue-lt:#0A1826; --blue-mid:rgba(91,168,224,.18);
      --green:#5BBF80; --green-lt:#071C0F;
      --amber:#E8B84A; --amber-lt:#1C1200; --amber-mid:rgba(232,184,74,.18);
      --purple:#9A78CC; --purple-lt:#120C1E;
      --teal:#40C8D4; --teal-lt:#061A1C;
      --bg:#14141A; --surface:#1C1C24; --surface2:#24242E; --surface3:#2C2C38;
      --glass:rgba(28,28,36,.86); --glass2:rgba(36,36,46,.92);
      --border:#2C2C3A; --border-mid:#3A3A4C;
      --tx:#EAE6E0; --tx-mid:#9E9A96; --tx-muted:#64606A;
      --sh:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.22);
      --sh-md:0 2px 8px rgba(0,0,0,.28),0 8px 28px rgba(0,0,0,.22);
      --sh-lg:0 4px 12px rgba(0,0,0,.32),0 16px 48px rgba(0,0,0,.28);
      --sh-prune:0 4px 20px rgba(212,104,142,.16);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      font-family:var(--font);
      background:var(--bg);
      color:var(--tx);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      min-height:100dvh;
    }

    /* Ambient background */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 1000px 650px at 10% -5%, var(--prune-glow) 0%, transparent 62%),
        radial-gradient(ellipse 500px 400px at 90% 100%, rgba(0,136,206,.04) 0%, transparent 60%);
    }
    #root { position:relative; z-index:1; }

    /* ── Targeted transitions (remplace la règle * globale) ── */
    .tab-btn, .icon-btn, .pill-btn, .tarif-pill, .delay-btn,
    .sp-pill, .rbar-btn, .btn {
      transition-property:background-color,border-color,color,box-shadow,transform,opacity;
      transition-duration:0.16s; transition-timing-function:ease;
    }
    input.calc-input, select.calc-input {
      transition-property:border-color,box-shadow;
      transition-duration:0.16s; transition-timing-function:ease;
    }
    /* Theme transitions uniquement sur les surfaces */
    body, .app-header, .tabs-nav, .card, .card-inset, .seg-card,
    .result-bar, .history-panel, .mode-banner {
      transition-property:background-color,border-color,color;
      transition-duration:0.2s; transition-timing-function:ease;
    }

    /* ── Typography ── */
    .t-xs  { font-size:11px; }
    .t-sm  { font-size:12.5px; }
    .t-base{ font-size:14px; }
    .t-md  { font-size:15.5px; }
    .t-lg  { font-size:18px; }
    .t-xl  { font-size:22px; }
    .t-2xl { font-size:28px; }
    .t-3xl { font-size:36px; }
    .fw-400{font-weight:400}.fw-500{font-weight:500}.fw-600{font-weight:600}
    .fw-700{font-weight:700}.fw-800{font-weight:800}.fw-900{font-weight:900}
    .tx-muted{color:var(--tx-muted)}.tx-mid{color:var(--tx-mid)}
    .tx-prune{color:var(--prune)}.tx-blue{color:var(--blue)}
    .tx-green{color:var(--green)}.tx-amber{color:var(--amber)}
    .tx-purple{color:var(--purple)}.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
    .label {
      display:block; font-size:11px; font-weight:700; letter-spacing:0.7px;
      text-transform:uppercase; color:var(--tx-muted); margin-bottom:6px;
    }

    /* ── Header ── */
    .app-header {
      background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:0 20px;
      position:sticky; top:0; z-index:102;
      height:var(--header-h); display:flex; align-items:center;
      box-shadow:0 1px 0 var(--border),0 2px 16px rgba(0,0,0,.05);
    }
    .header-inner {
      max-width:860px; margin:0 auto; width:100%;
      display:flex; align-items:center; gap:12px;
    }
    .header-brand {
      display:flex; align-items:center; gap:9px; flex-shrink:0;
    }
    .header-logo-badge {
      background:var(--prune); color:white;
      font-size:11px; font-weight:800; letter-spacing:0.4px;
      padding:3px 9px; border-radius:6px; white-space:nowrap;
    }
    .header-title {
      font-size:15.5px; font-weight:700; color:var(--tx);
      letter-spacing:-0.3px; line-height:1;
    }
    .header-sub {
      font-size:11px; color:var(--tx-muted); font-weight:400; white-space:nowrap; margin-top:2px;
    }
    .header-divider {
      width:1px; height:22px; background:var(--border); flex-shrink:0; margin:0 2px;
    }
    .header-right { display:flex; align-items:center; gap:7px; margin-left:auto; flex-shrink:0; }

    /* ── Mode badge (G30/BD30) — redesign v3.4 ── */
    .mode-badge {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 12px; border-radius:var(--r-full);
      font-size:12px; font-weight:800; letter-spacing:0.6px;
      border:1.5px solid;
    }
    .mode-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ── Icon / Pill buttons ── */
    .icon-btn {
      width:34px; height:34px; border-radius:var(--r-md);
      border:1.5px solid var(--border); background:var(--surface);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:15px; color:var(--tx-mid);
      outline:none; font-family:var(--font);
    }
    .icon-btn:hover { border-color:var(--prune); background:var(--prune-lt); color:var(--prune); }
    .icon-btn:focus-visible { outline:2px solid var(--prune); outline-offset:2px; }
    .pill-btn {
      display:flex; align-items:center; gap:5px;
      padding:6px 11px; border-radius:var(--r-md);
      border:1.5px solid var(--border); background:var(--surface);
      font-family:var(--font); font-size:11.5px; font-weight:700;
      color:var(--tx-mid); cursor:pointer; white-space:nowrap;
    }
    .pill-btn:hover { border-color:var(--prune); color:var(--prune); background:var(--prune-lt); }

    /* ── TABS ── v3.4: pill style ── */
    .tabs-nav {
      background:var(--glass2); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:0 20px; overflow-x:auto; scrollbar-width:none;
      position:sticky; top:var(--header-h); z-index:100;
      height:var(--tabs-h);
    }
    .tabs-nav::-webkit-scrollbar { display:none; }
    .tabs-inner {
      max-width:860px; margin:0 auto; display:flex; align-items:center;
      height:100%; gap:4px; padding:6px 0;
    }
    .tab-btn {
      display:flex; align-items:center; gap:7px;
      padding:0 14px; height:32px;
      font-family:var(--font); font-size:12.5px; font-weight:500;
      color:var(--tx-muted); background:transparent;
      border:none; border-radius:var(--r-md);
      cursor:pointer; white-space:nowrap; outline:none;
      transition:color .16s, background .16s, box-shadow .16s;
    }
    .tab-btn:hover:not(.active) { background:var(--surface2); color:var(--tx-mid); }
    .tab-btn:focus-visible { outline:2px solid var(--prune); outline-offset:1px; }
    .tab-btn.active {
      background:var(--tab-active-bg, var(--prune-lt));
      color:var(--tab-active-color, var(--prune));
      font-weight:700;
      box-shadow:0 0 0 1.5px var(--tab-active-color, var(--prune)) inset;
    }
    .tab-icon-wrap {
      width:22px; height:22px; border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      background:var(--border); color:var(--tx-muted); flex-shrink:0;
      font-size:11px; transition:background .16s, color .16s;
    }
    .tab-btn.active .tab-icon-wrap {
      background:var(--tab-active-color, var(--prune));
      color:white;
    }
    .tab-sep { width:1px; height:18px; background:var(--border); flex-shrink:0; margin:0 4px; }

    /* ── Main ── */
    .main { max-width:860px; margin:0 auto; padding:18px 20px 120px; }

    /* ── Cards ── */
    .card {
      background:var(--surface); border-radius:var(--r-lg);
      border:1px solid var(--border); box-shadow:var(--sh);
      padding:20px 22px; margin-bottom:14px;
      animation:slideUp .22s cubic-bezier(.22,.68,0,1.2) both;
    }
    .card-inset {
      background:var(--surface2); border-radius:var(--r-md);
      padding:14px 16px; border:1px solid var(--border);
    }
    .card-glass {
      background:var(--glass); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    }

    /* ── Animations ── */
    @keyframes slideUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateX(-6px); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes popIn {
      0%   { transform:scale(.88); opacity:0; }
      60%  { transform:scale(1.04); }
      100% { transform:scale(1); opacity:1; }
    }
    @keyframes pulseGlow {
      0%   { box-shadow:0 0 0 0 rgba(161,0,107,.5); }
      60%  { box-shadow:0 0 0 8px rgba(161,0,107,0); }
      100% { box-shadow:0 0 0 0 rgba(161,0,107,0); }
    }
    @keyframes pulse {
      0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)}
    }
    @keyframes fadeSlideIn {
      from { transform:translateX(40px); opacity:0; }
      to   { transform:translateX(0); opacity:1; }
    }
    @keyframes fadeSlideUp {
      from { transform:translateY(6px); opacity:0; }
      to   { transform:translateY(0); opacity:1; }
    }

    /* ── Segment card ── */
    .seg-card {
      border-radius:var(--r-md); padding:16px 18px;
      margin-bottom:10px; border:1px solid var(--border);
      background:var(--surface2);
      animation:fadeIn .2s cubic-bezier(.22,.68,0,1.2) both;
    }
    .seg-num {
      width:28px; height:28px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:800;
    }

    /* ── Mode banner (redesign v3.4) ── */
    .mode-banner {
      border-radius:var(--r-lg); padding:14px 18px; margin-bottom:16px;
      display:flex; align-items:flex-start; gap:14px;
      border:1.5px solid; animation:slideUp .22s both;
    }
    .mode-banner-icon {
      width:38px; height:38px; border-radius:var(--r-md); flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:18px;
    }
    .mode-banner-title { font-size:14.5px; font-weight:800; margin-bottom:4px; letter-spacing:-.2px; }
    .mode-banner-desc  { font-size:12.5px; line-height:1.65; opacity:.85; }
    .mode-banner-note  {
      font-size:11.5px; line-height:1.6; margin-top:10px; padding-top:10px;
      border-top:1px solid; opacity:.7;
    }

    /* ── Form inputs ── */
    .calc-input, select.calc-input {
      width:100%; padding:9px 12px;
      border-radius:var(--r-md); border:1.5px solid var(--border);
      font-size:14px; font-family:var(--font);
      outline:none; background:var(--surface); color:var(--tx);
      transition:border-color .16s, box-shadow .16s;
    }
    .calc-input:focus { border-color:var(--prune); box-shadow:0 0 0 3px var(--prune-glow); }
    .calc-input:focus-visible { outline:none; }

    /* ── Tarif pills ── */
    .tarif-pill {
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:var(--r-full);
      border:1.5px solid var(--border); background:var(--surface);
      font-family:var(--font); font-size:12.5px; font-weight:400;
      color:var(--tx-mid); cursor:pointer; white-space:nowrap;
      transition:all .14s;
    }
    .tarif-pill.active { font-weight:700; }
    .tarif-pill:hover { opacity:.88; }

    /* ── Delay buttons ── */
    .delay-btn {
      padding:8px 12px; border-radius:var(--r-md);
      border:1.5px solid var(--border); background:var(--surface);
      font-family:var(--font); font-size:12px; color:var(--tx-mid);
      cursor:pointer; text-align:left; outline:none;
      transition:all .16s cubic-bezier(.22,.68,0,1.2) !important;
    }
    .delay-btn:hover { border-color:var(--prune); background:var(--prune-lt); color:var(--prune); }
    .delay-btn.active {
      border-color:var(--prune); background:var(--prune); color:white;
      box-shadow:var(--sh-prune); transform:scale(1.04);
      animation:pulseGlow .55s ease-out;
    }
    .delay-btn-label { font-weight:700; font-size:12px; line-height:1.2; }
    .delay-btn-sub   { font-size:10.5px; margin-top:2px; opacity:.72; }

    /* ── Badges ── */
    .badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:2px 9px; border-radius:var(--r-full);
      font-size:11px; font-weight:700; letter-spacing:.2px; white-space:nowrap;
    }
    .badge-prune  { background:var(--prune-lt);  color:var(--prune); }
    .badge-blue   { background:var(--blue-lt);   color:var(--blue); }
    .badge-green  { background:var(--green-lt);  color:var(--green); }
    .badge-amber  { background:var(--amber-lt);  color:var(--amber); }
    .badge-purple { background:var(--purple-lt); color:var(--purple); }
    .badge-teal   { background:var(--teal-lt);   color:var(--teal); }
    .badge-neutral{ background:var(--surface2);  color:var(--tx-mid); border:1px solid var(--border); }

    /* ── Alerts ── */
    .alert {
      padding:12px 16px; border-radius:var(--r-md);
      font-size:13px; line-height:1.65;
    }
    .alert-blue   { background:var(--blue-lt);   border:1px solid rgba(0,136,206,.2);  color:var(--blue); }
    .alert-prune  { background:var(--prune-lt);  border:1px solid rgba(161,0,107,.16); color:var(--prune); }
    .alert-green  { background:var(--green-lt);  border:1px solid rgba(61,153,0,.2);   color:var(--green); }
    .alert-amber  { background:var(--amber-lt);  border:1px solid rgba(217,90,0,.2);   color:var(--amber); }
    .alert-purple { background:var(--purple-lt); border:1px solid rgba(110,30,120,.16); color:var(--purple); }

    /* ── Section sep ── */
    .section-sep {
      display:flex; align-items:center; gap:10px; margin:14px 0;
    }
    .section-sep::before, .section-sep::after { content:''; flex:1; height:1px; background:var(--border); }
    .section-sep span {
      font-size:11px; font-weight:700; color:var(--tx-muted);
      letter-spacing:.8px; text-transform:uppercase; white-space:nowrap;
    }

    /* ── Result rows ── */
    .result-row {
      display:grid; grid-template-columns:26px 1fr 88px 76px;
      align-items:center; gap:10px; padding:12px 8px;
    }
    .result-row + .result-row { border-top:1px solid var(--border); }
    .amount-display {
      font-family:var(--mono); font-variant-numeric:tabular-nums;
      font-weight:800; letter-spacing:-0.5px;
    }

    /* ── Sticky result bar (refined v3.4) ── */
    .result-bar {
      position:fixed; bottom:0; left:0; right:0; z-index:200;
      background:linear-gradient(135deg, var(--prune-dk) 0%, var(--prune) 55%, #C4006A 100%);
      border-top:1px solid rgba(255,255,255,.08);
      box-shadow:0 -4px 32px rgba(161,0,107,.3),0 -1px 0 rgba(255,255,255,.06);
      padding:10px 20px;
    }
    .result-bar-inner {
      max-width:860px; margin:0 auto;
      display:flex; align-items:center; gap:10px;
    }
    .rbar-sep { width:1px; height:28px; background:rgba(255,255,255,.15); flex-shrink:0; }
    .rbar-btn {
      display:flex; align-items:center; gap:5px;
      background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22);
      color:white; border-radius:var(--r-md); padding:7px 12px;
      font-family:var(--font); font-size:11.5px; font-weight:700;
      cursor:pointer; white-space:nowrap; transition:background .14s, transform .1s;
    }
    .rbar-btn:hover  { background:rgba(255,255,255,.24); }
    .rbar-btn:active { transform:scale(.97); }
    .rbar-tag {
      background:rgba(255,255,255,.2); border-radius:5px;
      padding:2px 8px; font-size:10.5px; font-weight:800;
      color:white; letter-spacing:.5px; white-space:nowrap;
    }

    /* ── Barème table ── */
    .bareme-table { width:100%; border-collapse:collapse; font-size:12.5px; }
    .bareme-table th {
      padding:10px 13px; text-align:left; font-weight:700;
      font-size:11px; text-transform:uppercase; letter-spacing:.7px;
      color:var(--tx-muted); background:var(--surface2);
      border-bottom:1.5px solid var(--border);
    }
    .bareme-table td { padding:10px 13px; border-bottom:1px solid var(--border); color:var(--tx); }
    .bareme-table tr:last-child td { border-bottom:none; }
    .bareme-table tbody tr:hover td { background:var(--surface2); }

    /* ── Range input ── */
    input[type=range] {
      -webkit-appearance:none; appearance:none;
      height:5px; border-radius:var(--r-full); background:var(--border);
      outline:none; cursor:pointer; width:100%;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
      background:var(--prune); cursor:pointer;
      box-shadow:0 1px 6px var(--prune-glow); border:2.5px solid white;
      transition:transform .15s;
    }
    input[type=range]:hover::-webkit-slider-thumb { transform:scale(1.18); }
    input[type=range]::-moz-range-thumb {
      width:20px; height:20px; border-radius:50%;
      background:var(--prune); cursor:pointer; border:2.5px solid white;
    }

    /* ── Buttons ── */
    .btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 14px; border-radius:var(--r-md);
      font-family:var(--font); font-size:13px; font-weight:700;
      cursor:pointer; border:1.5px solid transparent; outline:none;
      transition:background .14s, border-color .14s, color .14s, transform .1s;

function addDays(date,n){ const d=new Date(date);d.setDate(d.getDate()+n);return d; }
function addMonths(date,n){ const d=new Date(date);d.setMonth(d.getMonth()+n);return d; }

function getEaster(year){
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;

  return new Date(year,month-1,day);

function getJoursFeries(year){

  return new Set([
    new Date(year,0,1), new Date(year,4,1), new Date(year,4,8), new Date(year,6,14),
    new Date(year,7,15), new Date(year,10,1), new Date(year,10,11), new Date(year,11,25),
    addDays(e,1), addDays(e,39), addDays(e,50)
  ].map(fmt));
}
function isJourFerie(date){
  const y=date.getFullYear(),feries=getJoursFeries(y);
  const key=`${y}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
  return feries.has(key);
}
function isJourNonOuvrable(date){ return date.getDay()===0||isJourFerie(date); }
function isDimanche(date){ return date.getDay()===0; }
function prochaineJourOuvrable(date){ let d=new Date(date);d.setDate(d.getDate()+1);while(isJourNonOuvrable(d))d=addDays(d,1);return d; }
function labelJourFerie(date){
  const y=date.getFullYear(),e=getEaster(y);
  const same=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();

  for(const[d,name]of checks)if(same(d,date))return name;
  return null;
}

function computeRetractation(dateAchat){
  if(!dateAchat)return null;
  const achat=new Date(dateAchat);achat.setHours(0,0,0,0);
  const limiteCalendaire=addDays(achat,14);
  const today=new Date();today.setHours(0,0,0,0);
  const limiteNonOuvrable=isJourNonOuvrable(limiteCalendaire);
  const limiteReportee=limiteNonOuvrable?prochaineJourOuvrable(limiteCalendaire):limiteCalendaire;
  const ferieLabel=isJourFerie(limiteCalendaire)?labelJourFerie(limiteCalendaire):null;
  const joursRestants=diffDays(today,limiteReportee);
  const estDansDelai=today<=limiteReportee;
  // deadline kept for back-compat
  return{achat,limiteCalendaire,limiteNonOuvrable,limiteReportee,ferieLabel,joursRestants,estDansDelai,deadline:limiteCalendaire};
}
function computeRetractationCarte(dateAchat){
  if(!dateAchat)return null;
  const achat=new Date(dateAchat);achat.setHours(0,0,0,0);
  const today=new Date();today.setHours(0,0,0,0);
  // Le délai de 14 jours démarre au 1er JOUR OUVRÉ après l'achat
  const premierJourOuvre=prochaineJourOuvrable(achat);
  // J+14 à partir de ce 1er jour ouvré
  const limiteCalendaire=addDays(premierJourOuvre,14);
  // La date limite effective = 1er jour ouvré après cette date
  const limiteNonOuvrable=isJourNonOuvrable(limiteCalendaire);
  const limiteReportee=limiteNonOuvrable?prochaineJourOuvrable(limiteCalendaire):limiteCalendaire;
  const ferieLabel=isJourFerie(limiteCalendaire)?labelJourFerie(limiteCalendaire):null;
  const ferieStartLabel=isJourFerie(premierJourOuvre)?labelJourFerie(premierJourOuvre):null;
  const expired=today>limiteReportee;
  const remaining=diffDays(today,limiteReportee);
  return{achat,premierJourOuvre,ferieStartLabel,limiteCalendaire,limiteNonOuvrable,limiteReportee,ferieLabel,expired,remaining};
}
function computeResiliation(dateActivation,dateDemande,mensualite,aboData){
  if(!dateActivation||!dateDemande||!aboData)return null;
  const activationSaisie=new Date(dateActivation);activationSaisie.setHours(0,0,0,0);
  const demande=new Date(dateDemande);demande.setHours(0,0,0,0);
  const aboType=aboData.type;

  // Carte Liberté/Avantage = valable 1 an
  if(aboType==="annuel"){
    const finValidite=addMonths(activationSaisie,12);
    demande.setHours(0,0,0,0);finValidite.setHours(0,0,0,0);activationSaisie.setHours(0,0,0,0);
    return{type:"annuel",activation:activationSaisie,finValidite,demande,
      prixSansContratPro:aboData.prixSansContratPro,prixAvecContratPro:aboData.prixAvecContratPro};
  }

  // Max Actif/Actif+ : activation toujours le 1er du mois
  let activation=activationSaisie;
  let activationCorrigee=false;
  if(aboData.debutPremierDuMois&&activationSaisie.getDate()!==1){
    activation=new Date(activationSaisie.getFullYear(),activationSaisie.getMonth(),1);
    activationCorrigee=true;
  }

  const finEngagementInitial=addMonths(activation,12);
  demande.setHours(0,0,0,0);finEngagementInitial.setHours(0,0,0,0);activation.setHours(0,0,0,0);
  const enEngagementInitial=demande<finEngagementInitial;
  const joursRestants=enEngagementInitial?diffDays(demande,finEngagementInitial):0;

  // Blocage 3 premiers mois (Max Jeune / Max Senior)
  const finBlocage3mois=aboData.blocage3mois?addMonths(activation,3):null;
  if(finBlocage3mois)finBlocage3mois.setHours(0,0,0,0);
  const enBlocage=!!finBlocage3mois&&demande<finBlocage3mois;
  const joursBlocageRestants=enBlocage?diffDays(demande,finBlocage3mois):0;

  // Deadline et date d'effet
  const datePourCalcul=enBlocage?finBlocage3mois:demande;
  let deadline,effetDate;

  if(aboData.glissant){
    const jourFacturation=activation.getDate();
    if(enBlocage){
      effetDate=new Date(finBlocage3mois);
      deadline=addDays(finBlocage3mois,-6);
    }else{
      const dernierJourMoisCourant=lastDayOfMonth(datePourCalcul).getDate();
      const jourEffectif=Math.min(jourFacturation,dernierJourMoisCourant);
      const facturationCeMois=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth(),jourEffectif);
      facturationCeMois.setHours(0,0,0,0);
      const deadlineCeMois=addDays(facturationCeMois,-6);
      if(datePourCalcul<=deadlineCeMois){
        deadline=deadlineCeMois;effetDate=facturationCeMois;
      }else{
        const moisSuivant=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth()+1,1);
        const dernierJourMoisSuivant=lastDayOfMonth(moisSuivant).getDate();
        const jourEffectifSuivant=Math.min(jourFacturation,dernierJourMoisSuivant);
        effetDate=new Date(moisSuivant.getFullYear(),moisSuivant.getMonth(),jourEffectifSuivant);
        effetDate.setHours(0,0,0,0);
        deadline=addDays(effetDate,-6);
      }
    }
  }else{
    const dernierJour=lastDayOfMonth(datePourCalcul);
    deadline=new Date(dernierJour);deadline.setDate(dernierJour.getDate()-6);
    if(datePourCalcul<=deadline){
      effetDate=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth()+1,1);
    }else{
      effetDate=new Date(datePourCalcul.getFullYear(),datePourCalcul.getMonth()+2,1);
    }
  }
  effetDate.setHours(0,0,0,0);

  // Frais : s'appliquent uniquement si la DATE D'EFFET est avant la fin des 12 mois d'engagement
  // (une demande tardive dont l'effet tombe après la fin d'engagement est sans frais)
  let frais=0,fraisLabel="";
  if(effetDate<finEngagementInitial){
    if(aboData.fraisResil==="forfait15"){frais=15;fraisLabel="Résiliation avant la fin des 12 mois d'engagement → frais de dossier forfaitaires CGV SNCF";}
    else if(aboData.fraisResil==="mensualite"){frais=mensualite||0;fraisLabel=mensualite?`Résiliation avant la fin des 12 mois initiaux → prélèvement d'une mensualité supplémentaire`:"Résiliation avant la fin des 12 mois initiaux → prélèvement d'une mensualité supplémentaire";}
  }
  return{type:aboType,activation,activationSaisie,activationCorrigee,
    finEngagementInitial,demande,enEngagement:enEngagementInitial,
    joursRestants,frais,fraisLabel,deadline,effetDate,reconduction:!!aboData.reconduction,
    enBlocage,finBlocage3mois,joursBlocageRestants,glissant:!!aboData.glissant,
    debutPremierDuMois:!!aboData.debutPremierDuMois};
}

// Animated number counter
function useAnimatedNumber(target, duration=480) {
  const [val, setVal] = useState(target);
  const ref = useRef({ start:target, startTime:null, raf:null });
  useEffect(() => {
    const from = val;
    if (Math.abs(target - from) < 0.01) { setVal(target); return; }
    ref.current.start = from;
    ref.current.startTime = null;
    if (ref.current.raf) cancelAnimationFrame(ref.current.raf);
    const ease = t => 1 - Math.pow(1-t,3);
    const step = ts => {
      if (!ref.current.startTime) ref.current.startTime = ts;
      const p = Math.min((ts - ref.current.startTime) / duration, 1);
      setVal(ref.current.start + (target - ref.current.start) * ease(p));
      if (p < 1) ref.current.raf = requestAnimationFrame(step);
    };
    ref.current.raf = requestAnimationFrame(step);
    return () => { if (ref.current.raf) cancelAnimationFrame(ref.current.raf); };
  }, [target]);
  return val;
}
function AnimatedNumber({ value, decimals=2 }) {
  const v = useAnimatedNumber(value);
  return <span className="mono">{v.toFixed(decimals)}</span>;
}

const LS_KEY  = "bd30_state_v34";
const LS_HIST = "bd30_hist_v34";
let _lsCache = null;
function lsRead() {
  if (_lsCache !== null) return _lsCache;
  try { _lsCache = JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch { _lsCache = {}; }
  return _lsCache;
}
function lsGet(k, def) { const v = lsRead(); return v[k] !== undefined ? v[k] : def; }
let _lsTimer = null;
function lsSet(partial) {
  _lsCache = { ...lsRead(), ...partial };
  if (_lsTimer) clearTimeout(_lsTimer);
  _lsTimer = setTimeout(() => { try { localStorage.setItem(LS_KEY, JSON.stringify(_lsCache)); } catch {} _lsTimer = null; }, 400);
}

function App() {

  // ── Dark mode — data-theme approach ──────────────────────────────
  const [darkMode, setDarkMode] = useState(() => lsGet("darkMode", window.matchMedia("(prefers-color-scheme: dark)").matches));
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "light");
    lsSet({ darkMode });
    // Loader removal
    const loader = document.getElementById("app-loading");
    if (loader) { loader.style.opacity="0"; setTimeout(()=>loader?.remove?.(),350); }
    // Favicon
    if (!document.getElementById("calc-fav")) {
      const l=document.createElement("link");l.id="calc-fav";l.rel="icon";l.type="image/svg+xml";
      l.href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23A1006B'/%3E%3Ccircle cx='16' cy='14' r='8' fill='%23F0A020'/%3E%3Cline x1='16' y1='14' x2='16' y2='8' stroke='white' stroke-width='1.5'/%3E%3Cline x1='16' y1='14' x2='13' y2='17' stroke='white' stroke-width='2'/%3E%3Crect x='4' y='22' width='24' height='7' rx='2' fill='%231C2D4E'/%3E%3C/svg%3E";
      document.head.appendChild(l);
    }
    document.title = "Calculateur BD30/G30 — SNCF Voyageurs";
  }, [darkMode]);

  const toggleDark = useCallback(() => setDarkMode(d => !d), []);

  const [tab, setTab] = useState(() => lsGet("tab","retard"));
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < 640);
  useEffect(() => {
    const h = () => setIsMobile(window.innerWidth < 640);
    window.addEventListener("resize",h); return () => window.removeEventListener("resize",h);
  },[]);

  // Keyboard shortcuts
  useEffect(() => {
    const TAB_IDS = ["retard","frais","dates","bareme"];
    const h = e => {
      if (!e.altKey) return;
      const n = parseInt(e.key);
      if (n>=1&&n<=4) { e.preventDefault(); setTab(TAB_IDS[n-1]); }
      if (e.key==="d"||e.key==="D") { e.preventDefault(); toggleDark(); }
    };
    window.addEventListener("keydown",h); return () => window.removeEventListener("keydown",h);
  },[]);

  // ── History ──────────────────────────────────────────────────────
  const [history, setHistory] = useState(() => { try { return JSON.parse(localStorage.getItem(LS_HIST)||"[]"); } catch { return []; }});
  const [showHistory, setShowHistory] = useState(false);
  const pushHistory = useCallback(entry => setHistory(prev => { const n=[entry,...prev].slice(0,5); try{localStorage.setItem(LS_HIST,JSON.stringify(n));}catch{} return n; }), []);

  // ── Retard state ─────────────────────────────────────────────────
  const [segments, setSegments] = useState(() => { const s=lsGet("segments",null); return s&&Array.isArray(s)&&s.length>0?s:[emptySegment()]; });
  const isG30 = useMemo(() => segments.length===1 && (!segments[0]?.carrier || G30_CARRIER_IDS.includes(segments[0].carrier)), [segments]);
  const [heureTheo, setHeureTheo] = useState(() => lsGet("heureTheo",""));
  const [heureReel, setHeureReel] = useState(() => lsGet("heureReel",""));
  const [sliderDelay, setSliderDelay] = useState(() => lsGet("sliderDelay",0));
  const timeDelay = computeDelayMinutes(heureTheo, heureReel);
  const finalDelay = timeDelay !== null ? timeDelay : sliderDelay;
  const [exceptLevel, setExceptLevel] = useState("none");
  const [exceptSegmentId, setExceptSegmentId] = useState(null);
  const [ouigoRealDelays, setOuigoRealDelays] = useState({});
  const [trsiMode, setTrsiMode] = useState(() => lsGet("trsiMode", {}));

  useEffect(() => { if (timeDelay !== null) setSliderDelay(Math.min(360,timeDelay)); }, [timeDelay]);

  const addSegment    = useCallback(() => setSegments(s => [...s,{...emptySegment(),nbPass:s[0]?.nbPass||1}]), []);
  const removeSegment = useCallback(id => setSegments(s => { const n=s.filter(x=>x.id!==id); return n.length===0?[emptySegment()]:n; }), []);
  const updateSegment = useCallback((id,f,v) => setSegments(s => s.map(x => x.id===id?{...x,[f]:v}:x)), []);
  const setGlobalNbPass = useCallback(n => setSegments(s => s.map(x => ({...x,nbPass:n}))), []);
  const changeCarrier = useCallback((segId,carrierId) => setSegments(s => s.map(x => {
    if (x.id!==segId) return x;
    const avail = getTarifsForCarrier(carrierId).map(t=>t.id);
    const newTarif = carrierId==="ouigo"?"standard":avail.includes(x.tarif)?x.tarif:"";
    return {...x,carrier:carrierId,tarif:newTarif,passengers:(x.passengers||[]).map(p=>({...p,tarif:carrierId==="ouigo"?"standard":avail.includes(p.tarif)?p.tarif:""}))};
  })), []);
  const toggleMultiPass = useCallback(segId => setSegments(s => s.map(x => {
    if (x.id!==segId) return x;
    const next=!x.multiPassMode;
    if (!next) return {...x,multiPassMode:false};
    const n=x.nbPass||1;
    const existing=x.passengers&&x.passengers.length>0?x.passengers:[];
    const availIds=getTarifsForCarrier(x.carrier).filter(t=>t.id!=="groupe").map(t=>t.id);
    const defaultTarif=availIds.length===1?availIds[0]:"";
    const p1={...(existing[0]||emptyPassenger()),tarif:x.tarif||"",price:x.price||""};
    const rest=Array.from({length:Math.max(0,n-1)},(_,i)=>existing[i+1]||{...emptyPassenger(),tarif:defaultTarif,price:""});
    return {...x,multiPassMode:true,passengers:[p1,...rest]};
  })), []);
  const addPassenger    = useCallback(segId => setSegments(s => s.map(x => x.id===segId?{...x,passengers:[...(x.passengers||[]),emptyPassenger()]}:x)), []);
  const removePassenger = useCallback((segId,passId) => setSegments(s => s.map(x => x.id===segId?{...x,passengers:x.passengers.filter(p=>p.id!==passId)}:x)), []);
  const updatePassenger = useCallback((segId,passId,f,v) => setSegments(s => s.map(x => x.id===segId?{...x,passengers:x.passengers.map(p=>p.id===passId?{...p,[f]:v}:p)}:x)), []);

  // ── Compute retard (useMemo: pas de setState intermédiaire) ─────
  const computed = useMemo(() => {
    const results = segments.map(seg => {
      const c = CARRIERS.find(c=>c.id===seg.carrier);
      const isEligible = c&&c.group==="eligible"&&!(seg.carrier==="ter_zou"&&trsiMode[seg.id]);
      let rateInfo={rate:0,fixedAmount:null,type:null},amount=0,passengersResult=[];
      const ouigoRealDelayMin = !isG30&&seg.carrier==="ouigo"&&ouigoRealDelays[seg.id]!==undefined?parseInt(ouigoRealDelays[seg.id])||0:null;
      let ouigoAlreadyPaid=null,ouigoBD30Due=null,ouigoRefus=false;
      if (isEligible) {
        if (seg.multiPassMode&&seg.passengers&&seg.passengers.length>0) {
          passengersResult = seg.passengers.map(p=>{
            const ri=getRateInfo(seg.carrier,p.tarif,finalDelay);
            return {...p,rateInfo:ri,amount:computeSegmentAmount(p.price,p.tarif,ri),price:parseFloat(p.price)||0};
          });
          amount=passengersResult.reduce((s,p)=>s+p.amount,0);
          rateInfo=passengersResult[0]?.rateInfo||{rate:0,fixedAmount:null,type:"Multi-tarifs"};
        } else {
          rateInfo=getRateInfo(seg.carrier,seg.tarif,finalDelay);
          const baseAmt=computeSegmentAmount(seg.price,seg.tarif,rateInfo);
          const n=seg.tarif==="groupe"?1:(seg.nbPass||1);
          amount=baseAmt*n;
        }
        if (ouigoRealDelayMin!==null) {
          ouigoBD30Due=amount;
          const riAlready=getRateInfo("ouigo","standard",ouigoRealDelayMin);
          if (seg.multiPassMode&&passengersResult.length>0) {
            // Multi-pass : proratiser sur chaque passager
            ouigoAlreadyPaid=passengersResult.reduce((s,p)=>s+computeSegmentAmount(p.price,"standard",riAlready),0);
          } else {
            const n=seg.nbPass||1;
            ouigoAlreadyPaid=computeSegmentAmount(seg.price,"standard",riAlready)*n;
          }
          const complement=Math.max(0,ouigoBD30Due-ouigoAlreadyPaid);
          ouigoRefus=ouigoAlreadyPaid>=ouigoBD30Due&&ouigoBD30Due>0;
          amount=complement;
        }
      } else { rateInfo.type="Non eligible BD30"; }
      return {...seg,carrier:c,price:parseFloat(seg.price)||0,rateInfo,amount,eligible:isEligible,passengersResult,ouigoRealDelayMin,ouigoAlreadyPaid,ouigoBD30Due,ouigoRefus};
    });
    const baseTotal=results.reduce((a,r)=>a+r.amount,0);
    const excLvl=EXCEPT_LEVELS.find(e=>e.id===exceptLevel);
    let exceptBonus=0,exceptOnSegId=null;
    if (excLvl&&excLvl.multiplier!==null&&exceptSegmentId) {
      const target=results.find(r=>r.id===exceptSegmentId&&r.eligible);
      if (target) {
        const _n=target.tarif==="groupe"?1:(target.nbPass||1);
        const exceptionalTotal=target.multiPassMode&&target.passengersResult?.length>0
          ?target.passengersResult.reduce((s,p)=>s+(parseFloat(p.price)||0),0)*excLvl.multiplier
          :target.tarif==="max_loisirs"?(excLvl.fixedMax||0)*_n:target.price*_n*excLvl.multiplier;
        exceptBonus=Math.max(0,exceptionalTotal-target.amount);
        exceptOnSegId=target.id;
      }
    }
    const total=baseTotal+exceptBonus;
    const hasPrimePoints=results.some(r=>r.eligible&&(r.rateInfo?.points>0||(r.passengersResult||[]).some(p=>p.rateInfo?.points>0)));
    const missingTarif=segments.some(seg=>{
      const c=CARRIERS.find(c=>c.id===seg.carrier);
      if(!c||c.group!=="eligible")return false;
      if(seg.carrier==="ter_zou"&&trsiMode[seg.id])return false;
      if(seg.carrier==="ouigo")return false;
      if(seg.multiPassMode)return(seg.passengers||[]).some(p=>!p.tarif);
      return !seg.tarif;
    });
    return {results,baseTotal,total,exceptBonus,finalDelay,eligible:total>=4||hasPrimePoints,hasNonEligible:results.some(r=>!r.eligible),excLvl,exceptOnSegId,missingTarif};
  }, [segments,finalDelay,exceptLevel,exceptSegmentId,ouigoRealDelays,trsiMode,isG30]);

  // ── Frais ────────────────────────────────────────────────────────
  const [fraisList, setFraisList] = useState([]);
  const addFrais    = useCallback(() => setFraisList(f=>[...f,emptyFrais()]), []);
  const removeFrais = useCallback(id => setFraisList(f=>f.filter(x=>x.id!==id)), []);
  const updateFrais = useCallback((id,f,v) => setFraisList(l=>l.map(x=>x.id===id?{...x,[f]:v}:x)), []);
  const fraisComputed = useMemo(() => {
    if (!fraisList.length) return null;
    const results=fraisList.map(f=>{
      const def=FRAIS_TYPES.find(t=>t.id===f.type);
      const montant=parseFloat(f.montant)||0;
      const qty=f.type==="taxi_nuit"||f.type==="taxi_optimum"?1:(parseInt(f.qty)||1);
      const plafond=def.max!=null?def.max*qty:null;
      return {...f,def,montant,qty,plafond,rembourse:plafond!=null?Math.min(montant,plafond):montant};
    });
    return {results,total:results.reduce((a,r)=>a+r.rembourse,0)};
  }, [fraisList]);

  // ── Dates ────────────────────────────────────────────────────────
  const [dateAchat, setDateAchat] = useState(() => lsGet("dateAchat",""));
  const [dateActivation, setDateActivation] = useState(() => lsGet("dateActivation",""));
  const [dateDemande, setDateDemande] = useState(() => { const s=lsGet("dateDemande",null); if(s)return s; return new Date().toISOString().split("T")[0]; });
  const [aboTypeId, setAboTypeId] = useState(() => lsGet("aboTypeId","max_actif"));
  const [aboMensualiteCustom, setAboMensualiteCustom] = useState(() => lsGet("aboMensualiteCustom",""));
  const [aboMensualiteVariable, setAboMensualiteVariable] = useState(() => lsGet("aboMensualiteVariable",""));
  const [contratPro, setContratPro] = useState(false);
  const [retractType, setRetractType] = useState("abo");
  const [jourOuvrableMode, setJourOuvrableMode] = useState(false);
  const [datesSection, setDatesSection] = useState(null);
  const [baremeFilter, setBaremeFilter] = useState("all");
  const [openBareme, setOpenBareme] = useState(new Set(["standard"]));
  const [spAvis,setSpAvis]=useState("");const [spCos,setSpCos]=useState("");
  const [openFraisCards,setOpenFraisCards]=useState(new Set(["sp","frais"]));
  const [openOuigoCard,setOpenOuigoCard]=useState(false);
  const [spVoyage,setSpVoyage]=useState("");const [spRenoncement,setSpRenoncement]=useState("");

  // Persist state
  useEffect(() => {
    lsSet({tab,heureTheo,heureReel,sliderDelay,segments,dateAchat,dateActivation,dateDemande,aboTypeId,aboMensualiteCustom,aboMensualiteVariable,trsiMode});
  },[tab,heureTheo,heureReel,sliderDelay,segments,dateAchat,dateActivation,dateDemande,aboTypeId,aboMensualiteCustom,aboMensualiteVariable,trsiMode]);

  const aboType = useMemo(() => ABONNEMENTS_MAX.find(a=>a.id===aboTypeId)||ABONNEMENTS_MAX[2], [aboTypeId]);
  const mensualiteEffective = useMemo(() => aboTypeId==="custom"?(parseFloat(aboMensualiteCustom)||0):aboType.type==="mensuel_variable"?(parseFloat(aboMensualiteVariable)||0):(aboType.mensualite||0), [aboTypeId,aboType,aboMensualiteCustom,aboMensualiteVariable]);
  const retractResult      = useMemo(() => dateAchat?computeRetractation(dateAchat):null, [dateAchat]);
  const carteRetractResult = useMemo(() => dateAchat?computeRetractationCarte(dateAchat):null, [dateAchat]);
  const resiliResult       = useMemo(() => (dateActivation&&dateDemande)?computeResiliation(dateActivation,dateDemande,mensualiteEffective,aboType):null, [dateActivation,dateDemande,mensualiteEffective,aboType]);

  // ── Reset ─────────────────────────────────────────────────────────
  const [resetConfirm,setResetConfirm]=useState(false);
  const resetAll=useCallback(()=>{
    if(!resetConfirm){setResetConfirm(true);setTimeout(()=>setResetConfirm(false),2500);return;}
    setSegments([emptySegment()]);setHeureTheo("");setHeureReel("");setSliderDelay(0);
    setExceptLevel("none");setExceptSegmentId(null);setFraisList([]);setOuigoRealDelays({});
    setDateAchat("");setDateActivation("");setDateDemande(new Date().toISOString().split("T")[0]);
    setAboTypeId("max_actif");setAboMensualiteCustom("");setAboMensualiteVariable("");setContratPro(false);setRetractType("abo");setDatesSection(null);
    setSpAvis("");setSpCos("");setSpVoyage("");setSpRenoncement("");setResetConfirm(false);
    _lsCache = {};
    try{localStorage.removeItem(LS_KEY);}catch{}
  },[resetConfirm]);

  // ── Copy result ───────────────────────────────────────────────────
  const [copied,setCopied]=useState(null);
  const fmtRate=useCallback(r=>{
    if(!r.eligible)return"Non éligible BD30";
    const ri=r.rateInfo;
    if(!ri||ri.type===null)return"Aucune indemnisation";
    if(ri.rate&&ri.rate>0)return`${ri.rate}% → ${r.amount.toFixed(2)} €`;
    if(ri.points!==null&&ri.fixedAmount===null)return`${ri.points} pts FID`;
    if(ri.dual==="fid_tiers"){const pts=ri.points||0,bad=ri.fixedAmount||0;return pts>0&&bad>0?`${pts} pts FID + ${bad.toFixed(2)} € BAD tiers`:pts>0?`${pts} pts FID`:`${bad.toFixed(2)} € BAD tiers`;}
    if(ri.dual==="gvt_tiers"){const bad=ri.fixedAmount||0;return`${bad.toFixed(2)} € BAD GVT + ${bad.toFixed(2)} € BAD tiers`;}
    if(ri.fixedAmount!==null)return`Forfait : ${ri.fixedAmount.toFixed(2)} €`;
    return ri.type||"—";
  },[]);
  const getTarifLabel=useCallback(id=>TARIFS_MAP.get(id)?.label||id||"—",[]);
  const copyResult=type=>{
    const segLine=r=>{
      const carrier=r.carrier?r.carrier.label:"-";
      if(r.multiPassMode&&r.passengersResult&&r.passengersResult.length>0){
        const pl=r.passengersResult.map((p,pi)=>{const ri=p.rateInfo;const rs=ri?.rate>0?`${ri.rate}%`:ri?.fixedAmount!=null?`${ri.fixedAmount}EUR BAD`:ri?.points!=null?`${ri.points} pts`:"-";return`Pass.${pi+1} - ${getTarifLabel(p.tarif)} - ${p.price>0?p.price.toFixed(2)+"EUR":"0EUR"} - ${rs} -> ${p.amount.toFixed(2)}EUR`;}).join(" | ");
        return`${carrier} | ${pl}`;
      }
      const tl=getTarifLabel(r.tarif),n=r.nbPass||1,isMax=["max_loisirs","prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(r.tarif);
      const prixStr=r.tarif==="groupe"?`${r.price.toFixed(2)}EUR groupe`:isMax?"0EUR":n>1?`${n}x${r.price.toFixed(2)}EUR`:`${r.price.toFixed(2)}EUR`;
      const ri=r.rateInfo;const rateStr=ri?.rate>0?`${ri.rate}%`:ri?.fixedAmount!=null?`${ri.fixedAmount}EUR BAD`:ri?.points!=null?`${ri.points} pts`:"-";
      if(r.ouigoRealDelayMin!==null&&r.ouigoBD30Due!==null){
        if(r.ouigoRefus)return`${carrier} - ${tl} - ${prixStr} - BD30 du ${r.ouigoBD30Due.toFixed(2)}EUR - OUIGO deja verse ${r.ouigoAlreadyPaid.toFixed(2)}EUR (${r.ouigoRealDelayMin}min) - REFUS complement RT 6373`;
        return`${carrier} - ${tl} - ${prixStr} - BD30 du ${r.ouigoBD30Due.toFixed(2)}EUR - OUIGO deja verse ${r.ouigoAlreadyPaid.toFixed(2)}EUR (${r.ouigoRealDelayMin}min) - Complement ${r.amount.toFixed(2)}EUR (RT 6373)`;
      }
      return`${carrier} - ${tl} - ${prixStr} - ${rateStr} -> ${r.amount.toFixed(2)}EUR`;
    };
    let text="";
    if(type==="retard"&&computed){
      const mode=isG30?"G30":"BD30";const parts=[`${mode} - ${delayLabel(computed.finalDelay)}`];
      computed.results.forEach(r=>{if(r.eligible)parts.push(segLine(r));});
      if(computed.exceptBonus>0)parts.push(`Bonus exception (${computed.excLvl?.label||""}) : +${computed.exceptBonus.toFixed(2)}EUR`);
      if(!isG30||computed.results.length>1)parts.push(`Total : ${computed.total.toFixed(2)}EUR`);
      else parts[0]+=` - ${computed.total.toFixed(2)}EUR`;
      text=parts.join(" | ");
    }else if(type==="frais"&&fraisComputed){
      const parts=fraisComputed.results.map(r=>{const p=r.def?.max!=null?` (plaf. ${r.plafond.toFixed(2)}EUR)`:"";return`${r.def?.label||r.type} - ${r.qty}x${r.montant.toFixed(2)}EUR${p} -> ${r.rembourse.toFixed(2)}EUR`;});
      parts.push(`Total frais : ${fraisComputed.total.toFixed(2)}EUR`);text=parts.join(" | ");
    }else if(type==="combined"){
      const parts=[];
      if(computed&&computed.eligible){
        const mode=isG30?"G30":"BD30";parts.push(`${mode} - ${delayLabel(computed.finalDelay)}`);
        computed.results.forEach(r=>{if(r.eligible)parts.push(segLine(r));});
        if(computed.exceptBonus>0)parts.push(`Bonus exception : +${computed.exceptBonus.toFixed(2)}EUR`);
        parts.push(`Total G30/BD30 : ${computed.total.toFixed(2)}EUR`);
      }
      if(fraisComputed&&fraisComputed.total>0){
        if(parts.length>0)parts.push("---");
        fraisComputed.results.forEach(r=>{const p=r.def?.max!=null?` (plaf. ${r.plafond.toFixed(2)}EUR)`:"";parts.push(`${r.def?.label||r.type} - ${r.qty}x${r.montant.toFixed(2)}EUR${p} -> ${r.rembourse.toFixed(2)}EUR`);});
        parts.push(`Total frais : ${fraisComputed.total.toFixed(2)}EUR`);
      }
      const grandT=((computed&&computed.eligible?computed.total:0)+(fraisComputed&&fraisComputed.total>0?fraisComputed.total:0));
      if(computed&&fraisComputed&&computed.eligible&&fraisComputed.total>0)parts.push(`Total general : ${grandT.toFixed(2)}EUR`);
      text=parts.join(" | ");
    }
    if(!text)return;
    if(computed||fraisComputed){
      const hasG30=computed&&computed.eligible,hasFrais=fraisComputed&&fraisComputed.total>0;
      if(hasG30||hasFrais){
        const entry={ts:Date.now()};
        if(hasG30){entry.mode=isG30?"G30":"BD30";entry.delay=computed.finalDelay;entry.total=computed.total;entry.segments=computed.results.map(r=>({carrier:r.carrier?r.carrier.label:"—",tarif:r.multiPassMode?"Multi-tarifs":getTarifLabel(r.tarif),price:parseFloat(r.price)||0,amount:r.amount,rate:r.rateInfo?.rate||null}));}
        else{entry.mode="FRAIS";entry.total=fraisComputed.total;entry.segments=[];}
        if(hasFrais&&(type==="combined"||type==="frais")){entry.frais={total:fraisComputed.total,items:fraisComputed.results.map(r=>({label:r.def?.label||r.type,qty:r.qty,montant:r.montant,rembourse:r.rembourse}))};}
        pushHistory(entry);
      }
    }
    navigator.clipboard.writeText(text).then(()=>{setCopied(type);setTimeout(()=>setCopied(null),2000);}).catch(()=>{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(type);setTimeout(()=>setCopied(null),2000);});
  };

  // ── Result bar data ───────────────────────────────────────────────
  const hasG30    = computed && computed.eligible;
  const hasFrais  = fraisComputed && fraisComputed.total > 0;
  const showBoth  = hasG30 && hasFrais;
  const grandTotal= useMemo(() => (hasG30?computed.total:0)+(hasFrais?fraisComputed.total:0), [hasG30,hasFrais,computed?.total,fraisComputed?.total]);
  const primary   = tab==="frais"&&hasFrais?"frais":"retard";

  // ══════════════════════════════════════════════════════════════════
  //  RENDER
  // ══════════════════════════════════════════════════════════════════
  return (
    <div style={{minHeight:"100vh",fontFamily:"var(--font)"}}>

      {/* ── HEADER ─────────────────────────────────────────────── */}
      <header className="app-header" role="banner">
        <div className="header-inner">
          <LogoApp size={32}/>
          <span className="header-logo-badge">BD30/G30</span>
          <div className="header-divider"/>
          <div>
            <div className="header-title">Calculateur BD30/G30</div>
            <div className="header-sub">PRR 2021 · En vigueur 02/03/2026</div>
          </div>
          <div className="header-right">
            {/* Mode G30/BD30 indicator */}
            <div className="mode-badge" style={{
              background:isG30?"var(--prune-lt)":"var(--blue-lt)",
              color:isG30?"var(--prune)":"var(--blue)",
              border:`1px solid ${isG30?"rgba(161,0,107,.2)":"rgba(0,136,206,.2)"}`,
            }}>
              <div className="mode-dot" style={{background:isG30?"var(--prune)":"var(--blue)"}}/>
              {isG30?"G30":"BD30"}
            </div>
            {/* History */}
            {history.length > 0 && (
              <button className="pill-btn" onClick={()=>setShowHistory(h=>!h)} aria-label="Historique des calculs">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
                {!isMobile && <span>Historique</span>}
                <span style={{background:"var(--prune-lt)",color:"var(--prune)",borderRadius:"var(--r-full)",padding:"0 5px",fontSize:10,fontWeight:800}}>{history.length}</span>
              </button>
            )}
            {/* Reset */}
            <button className="pill-btn" onClick={resetAll} title="Réinitialiser (double-clic)" style={resetConfirm?{borderColor:"var(--amber)",color:"var(--amber)",background:"var(--amber-lt)"}:{}}>
              {resetConfirm ? "⚠️ Confirmer ?" : "↺"}
            </button>
            {/* Dark mode */}
            <button className="icon-btn" onClick={toggleDark} title={darkMode?"Mode clair (Alt+D)":"Mode sombre (Alt+D)"} aria-label={darkMode?"Activer le mode clair":"Activer le mode sombre"}>
              {darkMode
                ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              }
            </button>
          </div>
        </div>
      </header>

      {/* ── HISTORY POPOVER ────────────────────────────────────── */}
      {showHistory && (
        <div style={{
          position:"fixed",top:0,right:0,bottom:0,zIndex:300,
          width:"min(400px,100vw)",
          background:"var(--surface)",
          borderLeft:"1.5px solid var(--border)",
          boxShadow:"-8px 0 32px rgba(0,0,0,.18)",
          display:"flex",flexDirection:"column",
          animation:"fadeSlideIn .22s cubic-bezier(.22,.68,0,1.2)",
        }} role="dialog" aria-label="Historique des calculs">

          {/* ── Header ── */}
          <div style={{padding:"14px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--surface)",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--prune)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
              <span style={{fontWeight:800,fontSize:14,color:"var(--tx)"}}>Historique des calculs</span>
              <span style={{background:"var(--prune-lt)",color:"var(--prune)",borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700}}>{history.length}/5</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {history.length>0&&(
                <button onClick={()=>{setHistory([]);try{localStorage.removeItem(LS_HIST);}catch{}}} style={{background:"none",border:"1px solid var(--border)",color:"var(--tx-muted)",borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                  Tout effacer
                </button>
              )}
              <button onClick={()=>setShowHistory(false)} style={{background:"var(--surface2)",border:"1px solid var(--border)",color:"var(--tx)",borderRadius:8,width:28,height:28,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}} aria-label="Fermer">×</button>
            </div>
          </div>

          {/* ── Liste ── */}
          <div style={{overflowY:"auto",flex:1,padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
            {history.length===0 ? (
              <div style={{textAlign:"center",color:"var(--tx-muted)",fontSize:13,marginTop:40}}>Aucun calcul éligible enregistré</div>
            ) : history.map((h,i)=>{
              const d=new Date(h.ts);
              const dateStr=d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
              const timeStr=d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
              const grandTotal=h.grandTotal??(h.total||0);
              return(
                <div key={h.ts} style={{
                  background:"var(--surface)",borderRadius:12,padding:"12px 14px",
                  border:"1px solid var(--border)",borderLeft:"3px solid var(--prune)",
                  animation:`fadeSlideUp .2s ${i*0.04}s both`,
                  position:"relative",
                }}>
                  {/* Ligne 1 : mode + date + total + bouton supprimer */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,gap:6}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <span style={{background:"var(--prune-lt)",color:"var(--prune)",borderRadius:6,padding:"1px 7px",fontSize:10,fontWeight:800}}>{h.mode}</span>
                      {h.frais&&<span style={{background:"var(--blue-lt)",color:"var(--blue)",borderRadius:6,padding:"1px 7px",fontSize:10,fontWeight:800}}>+FRAIS</span>}
                      <span style={{fontSize:11,color:"var(--tx-muted)"}}>{dateStr} · {timeStr}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                      <span style={{fontWeight:900,fontSize:17,color:"var(--green)",fontVariantNumeric:"tabular-nums lining-nums"}}>
                        {grandTotal.toFixed(2)} €
                      </span>
                      {/* Bouton supprimer cet entrée */}
                      <button
                        onClick={()=>{
                          const next=history.filter(x=>x.ts!==h.ts);
                          setHistory(next);
                          try{localStorage.setItem(LS_HIST,JSON.stringify(next));}catch{}
                        }}
                        title="Supprimer ce calcul"
                        style={{background:"none",border:"1px solid var(--border)",color:"var(--tx-muted)",borderRadius:6,width:22,height:22,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:0}}
                        aria-label="Supprimer ce calcul de l'historique"
                      >×</button>
                    </div>
                  </div>

                  {/* Délai */}
                  {h.delay!=null&&(
                    <div style={{fontSize:11,color:"var(--tx-mid)",marginBottom:6}}>⏱ {delayLabel(h.delay)}</div>
                  )}

                  {/* Segments G30/BD30 */}
                  {(h.segments||[]).map((s,j)=>(
                    <div key={j} style={{
                      fontSize:11,color:"var(--tx-muted)",
                      padding:"4px 0",
                      borderTop:j>0?"1px solid var(--border)":"none",
                      display:"flex",justifyContent:"space-between",alignItems:"center",
                    }}>
                      <span>{s.carrier} · {s.tarif}</span>
                      <span style={{fontWeight:700,color:"var(--tx)"}}>
                        {s.rate!=null?`${s.rate}%`:"—"} → {s.amount.toFixed(2)} €
                      </span>
                    </div>
                  ))}

                  {/* Frais annexes */}
                  {h.frais&&(<>
                    <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid var(--border)",fontSize:10,fontWeight:800,color:"var(--blue)",letterSpacing:.5,textTransform:"uppercase",marginBottom:3}}>
                      🧾 Frais annexes
                    </div>
                    {h.frais.items.map((f,j)=>(
                      <div key={j} style={{fontSize:11,color:"var(--tx-muted)",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"2px 0"}}>
                        <span>{f.label}{f.qty>1?` ×${f.qty}`:""}</span>
                        <span style={{fontWeight:700,color:"var(--tx)"}}>{f.rembourse.toFixed(2)} €</span>
                      </div>
                    ))}
                    {h.grandTotal&&(
                      <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:11,color:"var(--tx-mid)",fontWeight:700}}>Total général</span>
                        <span style={{fontSize:13,fontWeight:900,color:"var(--green)",fontVariantNumeric:"tabular-nums lining-nums"}}>{h.grandTotal.toFixed(2)} €</span>
                      </div>
                    )}
                  </>)}
                </div>
              );
            })}
          </div>

          {/* ── Footer ── */}
          <div style={{padding:"10px 14px",borderTop:"1px solid var(--border)",fontSize:10.5,color:"var(--tx-muted)",textAlign:"center",flexShrink:0}}>
            5 derniers résultats éligibles · stockés localement
          </div>
        </div>
      )}

      {/* Overlay fermeture */}
      {showHistory && (
        <div onClick={()=>setShowHistory(false)} style={{position:"fixed",inset:0,zIndex:299,background:"rgba(0,0,0,.35)",animation:"fadeSlideUp .15s ease"}}/>
      )}

      {/* ── TABS ───────────────────────────────────────────────── */}
      <nav className="tabs-nav" role="tablist" aria-label="Navigation principale">
        <div className="tabs-inner">
          {TABS.map((t,i) => {
            const active = tab === t.id;
            return (
              <React.Fragment key={t.id}>
                <button
                  className={`tab-btn${active?" active":""}`}
                  style={{"--tab-active-bg":t.activeBg,"--tab-active-color":t.activeColor}}
                  role="tab" aria-selected={active} aria-controls={`panel-${t.id}`}
                  onClick={()=>setTab(t.id)}
                  title={`${t.label} (Alt+${i+1})`}
                >
                  <span className="tab-icon-wrap">{TAB_ICONS[t.icon]}</span>
                  {t.label}
                </button>
                {i===0 && <div className="tab-sep"/>}
              </React.Fragment>
            );
          })}
        </div>
      </nav>

      {/* ── MAIN ───────────────────────────────────────────────── */}
      <main className="main">

        {/* ═══════ TAB : RETARD ═══════ */}
        {tab==="retard" && (
          <div id="panel-retard" role="tabpanel">
            {/* Mode banner v3.4 */}
            <div className="mode-banner" style={{
              background:isG30?"var(--prune-lt)":"var(--blue-lt)",
              borderColor:isG30?"rgba(161,0,107,.2)":"rgba(0,136,206,.18)",
            }}>
              <div className="mode-banner-icon" style={{background:isG30?"rgba(161,0,107,.12)":"rgba(0,136,206,.12)",color:isG30?"var(--prune)":"var(--blue)"}}>
                {isG30
                  ? <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
                  : <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                }
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div className="mode-banner-title" style={{color:isG30?"var(--prune)":"var(--blue)"}}>
                  {isG30?"Mode G30 — Trajet sec":"Mode BD30 — Billet Direct"}
                </div>
                <div className="mode-banner-desc" style={{color:isG30?"var(--prune)":"var(--blue)"}}>
                  {isG30
                    ? "1 seul segment · TGV INOUI, TGV international, Intercités (≥ 60 min) · Ajoutez un segment pour basculer en BD30"
                    : "Voyages multi-segments en une transaction · Abonnés Max et Forfaits suivent un barème en montants fixes"
                  }
                </div>
                {!isG30 && (
                  <div className="mode-banner-note" style={{borderTopColor:"rgba(0,136,206,.2)",color:"var(--blue)"}}>
                    ⚠️ <strong>Transporteur non éligible</strong> — seul le retard sur le(s) segment(s) éligible(s) est retenu
                  </div>
                )}
              </div>
            </div>

            {/* Segments card */}
            <div className="card">
              <SectionTitle
                color={isG30?"var(--prune)":"var(--blue)"}
                action={
                  <button className="btn btn-primary btn-sm" onClick={addSegment} aria-label="Ajouter un segment">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Segment
                  </button>
                }
              >
                Segments du voyage
                <span className="badge" style={{background:isG30?"var(--prune-lt)":"var(--blue-lt)",color:isG30?"var(--prune)":"var(--blue)"}}>{isG30?"G30 — Trajet sec":"BD30 — Billet Direct"}</span>
              </SectionTitle>

              {segments.map((seg,idx)=>{
                const c         = CARRIERS.find(c=>c.id===seg.carrier);
                const isTrsiActive = seg.carrier==="ter_zou" && !!trsiMode[seg.id];
                const isNE      = (c&&c.group==="non_eligible") || isTrsiActive;
                const isMax     = ["max_loisirs","prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(seg.tarif);
                const isGroupe  = seg.tarif==="groupe";
                const availTarifs = getTarifsForCarrier(seg.carrier);
                const tarifInfo   = availTarifs.find(t=>t.id===seg.tarif);
                const segColor    = isNE?"var(--amber)":(c?c.color:"var(--prune)");
                const passengers  = seg.passengers||[];
                const availableCarriers = isG30 ? G30_CARRIERS : CARRIERS;
                let segBg="var(--surface2)",segBorder="var(--border)";
                if(isNE){segBg="var(--amber-lt)";segBorder="rgba(224,82,6,.3)";}
                else if(seg.tarif==="prime_titulaire"){segBg="var(--blue-lt)";segBorder="rgba(0,136,206,.25)";}
                else if(seg.tarif==="prime_fid_tiers"||seg.tarif==="prime_gvt_tiers"){segBg="var(--purple-lt)";segBorder="rgba(110,30,120,.25)";}
                else if(isMax){segBg="var(--green-lt)";segBorder="rgba(130,190,0,.3)";}
                else if(isGroupe){segBg="var(--teal-lt)";segBorder="rgba(0,154,166,.3)";}

                return (
                  <div key={seg.id} className="seg-card" style={{background:segBg,borderColor:segBorder,animationDelay:`${idx*0.04}s`}}>
                    <div style={{display:"grid",gridTemplateColumns:"28px minmax(0,1fr) auto",gap:10,alignItems:"start"}}>
                      {/* Num */}
                      <div className="seg-num" style={{background:`${segColor}20`,color:segColor,border:`1.5px solid ${segColor}40`,marginTop:18}}>
                        {idx+1}
                      </div>
                      {/* Carrier select */}
                      <div>
                        <label className="label" htmlFor={`carrier-${seg.id}`}>Transporteur</label>
                        {isG30
                          ? <select id={`carrier-${seg.id}`} className="calc-input" value={seg.carrier} onChange={e=>changeCarrier(seg.id,e.target.value)}>
                              <option value="" disabled>— Sélectionner —</option>
                              {availableCarriers.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                            </select>
                          : <select id={`carrier-${seg.id}`} className="calc-input" value={seg.carrier} onChange={e=>changeCarrier(seg.id,e.target.value)} style={isNE?{borderColor:"rgba(224,82,6,.4)"}:{}}>
                              <option value="" disabled>— Sélectionner —</option>
                              <optgroup label="✅ Éligibles BD30">{CARRIERS_ELIGIBLE.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</optgroup>
                              <optgroup label="❌ Hors périmètre BD30">{CARRIERS_NON_ELIGIBLE.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</optgroup>
                            </select>
                        }
                        {isNE && (
                          <div style={{fontSize:11,color:"var(--amber)",marginTop:5,lineHeight:1.6}}>
                            {isTrsiActive
                              ? "⚠️ TER TRSI (Transdev Rail Sud Intm.) — Billet Combiné (2 contrats distincts). Hors périmètre BD30. G30 sur segment TGV/INT uniquement. Trains n° 17466–17499."
                              : `⚠️ Hors périmètre BD30 — aucune indemnisation sur ce segment.${seg.carrier==="coop_int"?" Bi-segment: G30 sur segment TGV/filiale seul.":""}${seg.carrier==="ter_autocar"?" Autres segments compensables via G30.":""}`
                            }
                          </div>
                        )}
                        {seg.carrier==="ter_zou" && (
                          <label style={{display:"flex",alignItems:"center",gap:7,marginTop:7,cursor:"pointer",userSelect:"none",padding:"6px 10px",borderRadius:8,background:isTrsiActive?"var(--amber-lt)":"var(--surface2)",border:`1px solid ${isTrsiActive?"rgba(224,82,6,.35)":"var(--border)"}`,transition:"all .18s"}}>
                            <input
                              type="checkbox"
                              checked={!!trsiMode[seg.id]}
                              onChange={e=>setTrsiMode(m=>({...m,[seg.id]:e.target.checked}))}
                              style={{accentColor:"var(--amber)",width:14,height:14,flexShrink:0,cursor:"pointer"}}
                            />
                            <span style={{fontSize:11.5,color:isTrsiActive?"var(--amber)":"var(--tx-mid)",lineHeight:1.5}}>
                              🚊 Train TRSI (Transdev Rail Sud Intm.) — n° 17466–17499 <strong style={{color:isTrsiActive?"var(--amber)":"var(--tx-mid)"}}>: hors périmètre BD30</strong>
                            </span>
                          </label>
                        )}
                      </div>
                      {/* Remove */}
                      {segments.length > 1
                        ? <button onClick={()=>removeSegment(seg.id)} className="btn btn-ghost btn-sm" style={{marginTop:18}} aria-label="Supprimer ce segment">✕</button>
                        : <div/>
                      }
                    </div>

                    {/* Tarif + passengers section */}
                    {!isNE && seg.carrier && (
                      <div style={{marginTop:12,paddingTop:12,borderTop:`1px dashed ${segBorder}`}}>
                        {/* OUIGO: tarif standard + bouton multi-prix */}
                        {seg.carrier==="ouigo" ? (
                          <div style={{marginBottom:8}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                              <div style={{display:"flex",alignItems:"center",gap:8}}>
                                <span className="label" style={{margin:0}}>Tarif</span>
                                <span className="badge" style={{color:"#E8005D",background:"rgba(232,0,93,.1)",border:"1.5px solid rgba(232,0,93,.25)"}}>
                                  Standard — automatique
                                </span>
                              </div>
                              <button onClick={()=>toggleMultiPass(seg.id)} className={`btn btn-sm${seg.multiPassMode?" btn-primary":" btn-outline"}`} style={{fontSize:11}}>
                                {seg.multiPassMode?"👥 Prix différents":"👤 Même prix"}
                              </button>
                            </div>
                            {seg.multiPassMode && (
                              <div style={{fontSize:11,color:"#E8005D",marginTop:5,lineHeight:1.5}}>
                                Chaque passager conserve le tarif <strong>Standard</strong> — saisissez le prix de chaque billet individuellement.
                              </div>
                            )}
                          </div>
                        ) : (
                          <div style={{marginBottom:8}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:6}}>
                              <div style={{display:"flex",alignItems:"center",gap:8}}>
                                <span className="label" style={{margin:0,color:!seg.tarif?"var(--prune)":"var(--tx-muted)"}}>Tarif du billet</span>
                                {!seg.tarif && <span className="badge badge-prune" style={{fontSize:9.5}}>⚠ Obligatoire</span>}
                              </div>
                              {!isNE && !isGroupe && seg.carrier && (
                                <button onClick={()=>toggleMultiPass(seg.id)} className={`btn btn-sm${seg.multiPassMode?" btn-primary":" btn-outline"}`} style={{fontSize:11}}>
                                  {seg.multiPassMode?"👥 Tarifs différents":"👤 Même tarif"}
                                </button>
                              )}
                            </div>
                            <div style={{display:"flex",gap:6,flexWrap:"wrap",padding:!seg.tarif?"8px 10px":"0",borderRadius:"var(--r-md)",border:!seg.tarif?"1.5px dashed rgba(161,0,107,.4)":"none",background:!seg.tarif?"var(--prune-lt)":"transparent"}}>
                              {availTarifs.map(t=>(
                                <label key={t.id} className={`tarif-pill${seg.tarif===t.id?" active":""}`}
                                  style={{borderColor:seg.tarif===t.id?t.color+"60":"var(--border)",background:seg.tarif===t.id?`${t.color}12`:"var(--surface)",color:seg.tarif===t.id?t.color:"var(--tx-mid)"}}>
                                  <input type="radio" name={`tarif-${seg.id}`} value={t.id}
                                    checked={seg.tarif===t.id} onChange={()=>{updateSegment(seg.id,"tarif",t.id);if(seg.multiPassMode)updateSegment(seg.id,"multiPassMode",false);}}
                                    style={{display:"none"}}/>
                                  {t.label}
                                </label>
                              ))}
                            </div>
                            {!seg.tarif && <div style={{fontSize:11,color:"var(--prune)",fontStyle:"italic",marginTop:4}}>Sélectionnez un tarif pour calculer l'indemnisation.</div>}
                          </div>
                        )}

                        {tarifInfo && seg.carrier!=="ouigo" && (
                          <div style={{fontSize:11.5,color:"var(--tx-muted)",lineHeight:1.55,marginBottom:10}}>{tarifInfo.desc}</div>
                        )}

                        {/* RT 6373 OUIGO */}
                        {!isG30 && seg.carrier==="ouigo" && seg.tarif && (()=>{
                          const val=ouigoRealDelays[seg.id]!==undefined?ouigoRealDelays[seg.id]:"";
                          const hasVal=val!==""&&parseInt(val)>0;
                          const ouigoDelay=parseInt(val)||0;
                          const riPro=hasVal?getRateInfo("ouigo","standard",ouigoDelay):null;
                          const passengers=seg.passengers||[];
                          const proAmt=riPro?(
                            seg.multiPassMode&&passengers.length>0
                              ? passengers.reduce((s,p)=>s+computeSegmentAmount(p.price||0,"standard",riPro),0)
                              : computeSegmentAmount(seg.price,"standard",riPro)*(seg.nbPass||1)
                          ):0;
                          return (
                            <div style={{marginBottom:12,padding:"11px 13px",borderRadius:"var(--r-md)",background:hasVal?"var(--purple-lt)":"rgba(110,30,120,.04)",border:`1.5px ${hasVal?"solid":"dashed"} ${hasVal?"rgba(110,30,120,.3)":"rgba(110,30,120,.15)"}`}}>
                              <div className="label" style={{color:hasVal?"var(--purple)":"var(--tx-muted)",marginBottom:7}}>RT 6373 — Retard réel OUIGO (trajet sec)</div>
                              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                                <div style={{display:"flex",alignItems:"center",gap:8}}>
                                  <input type="number" min="0" max="600" placeholder="ex: 60" value={val}
                                    onChange={e=>setOuigoRealDelays(prev=>({...prev,[seg.id]:e.target.value}))}
                                    style={{width:84,padding:"7px 10px",borderRadius:"var(--r-sm)",border:`1.5px solid ${hasVal?"var(--purple)":"var(--border)"}`,fontSize:16,fontWeight:700,textAlign:"center",background:"var(--surface)",color:"var(--tx)",fontFamily:"'Outfit',sans-serif",fontVariantNumeric:"tabular-nums lining-nums",outline:"none"}}/>
                                  <span style={{fontSize:13,color:"var(--tx-mid)",fontWeight:600}}>min</span>
                                  {hasVal && <button onClick={()=>setOuigoRealDelays(prev=>{const n={...prev};delete n[seg.id];return n;})} className="btn btn-ghost btn-xs">×</button>}
                                </div>
                                {hasVal ? (
                                  <div style={{fontSize:11.5,color:"var(--purple)",lineHeight:1.5}}>
                                    Proactif OUIGO ({ouigoDelay} min) : <strong>{proAmt.toFixed(2)} € déjà versé</strong>
                                    <span style={{display:"block",color:"var(--tx-muted)",fontSize:11}}>Le complément sera calculé dans les résultats.</span>
                                  </div>
                                ) : (
                                  <span style={{fontSize:11,color:"var(--tx-muted)",lineHeight:1.5,flex:1}}>Saisir si OUIGO a déjà indemnisé en proactif (trajet sec). Le calculateur déterminera le complément TGV Care.</span>
                                )}
                              </div>
                            </div>
                          );
                        })()}

                        {/* MÊME TARIF mode */}
                        {!seg.multiPassMode && (
                          <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
                            {/* Prix */}
                            <div style={{flex:"1 1 110px",minWidth:0}}>
                              <label className="label" htmlFor={`prix-${seg.id}`}>
                                {isGroupe?"Prix total du groupe (€)":isMax?"Prix":`Prix${(seg.nbPass||1)>1?" / passager":""} (€)`}
                              </label>
                              {isMax
                                ? <div className="calc-input" style={{display:"flex",alignItems:"center",gap:6,opacity:.7,pointerEvents:"none",background:"var(--surface2)"}}>
                                    <span className={`badge ${["prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(seg.tarif)?"badge-blue":"badge-green"}`}>0 €</span>
                                    <span style={{fontSize:11.5,color:"var(--tx-muted)"}}>
                                      {["prime_titulaire","prime_fid_tiers","prime_gvt_tiers"].includes(seg.tarif)?"Billet Prime (montant fixe)":"Billet 0€ (Max/Forfait)"}
                                    </span>
                                  </div>
                                : <input id={`prix-${seg.id}`} type="number" min="0" step="0.01" placeholder="0.00" value={seg.price} onChange={e=>updateSegment(seg.id,"price",e.target.value)}
                                    className="calc-input" style={{fontFamily:"'Outfit',sans-serif",fontVariantNumeric:"tabular-nums lining-nums",fontWeight:700,fontSize:16}}/>
                              }
                            </div>
                            {/* Nb passagers */}
                            {!isGroupe && (
