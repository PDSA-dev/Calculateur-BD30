                        </div>
                        <div style={{background:"rgba(255,100,100,.15)",borderRadius:10,padding:"10px 12px",border:"1px solid rgba(255,100,100,.3)"}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#FF9999",letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Blocage jusqu'au</div>
                          <div style={{fontSize:11.5,fontWeight:800,color:"#FFB8B8"}}>{fmtDate(resiliResult.finBlocage3mois)}</div>
                          <div style={{fontSize:11,color:"rgba(255,150,150,.7)",marginTop:2}}>{resiliResult.joursBlocageRestants} j restant{resiliResult.joursBlocageRestants>1?"s":""}</div>
                        </div>
                        <div style={{background:"rgba(255,215,0,.1)",borderRadius:10,padding:"10px 12px",border:"1px solid rgba(255,215,0,.25)"}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#FFD700",letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>1ère résiliation possible</div>
                          <div style={{fontSize:11.5,fontWeight:800,color:"#FFD700"}}>{fmtDate(resiliResult.effetDate)}</div>
                          <div style={{fontSize:11,color:"rgba(255,215,0,.6)",marginTop:2}}>Date d'effet estimée</div>
                        </div>
                      </div>
                      <div style={{marginTop:10,padding:"10px 12px",background:"rgba(255,215,0,.08)",borderRadius:8,border:"1px solid rgba(255,215,0,.15)"}}>
                        <div style={{fontSize:11,color:"rgba(255,255,255,.55)",lineHeight:1.6}}>
                          📬 La deadline pour une résiliation à effet <strong style={{color:"rgba(255,255,255,.8)"}}>{fmtDate(resiliResult.effetDate)}</strong> est le <strong style={{color:"#FFD700"}}>{fmtDate(resiliResult.deadline)}</strong> — calculée à partir de la fin de la période de blocage.
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Reconduction tacite notice */}
                {resiliResult.reconduction&&(
                  <div className="alert-info" style={{fontSize:11.5}}>
                    🔄 <strong>Reconduction tacite :</strong> Cet abonnement se renouvelle automatiquement pour 12 mois au-delà de la période initiale. La résiliation est <strong>gratuite</strong> après les 12 premiers mois (période initiale uniquement).
                  </div>
                )}

                {/* Timeline d'engagement */}
                <div style={{
                  background:resiliResult.enEngagement?"#FFF3D0":"#F0FFF6",
                  border:`1.5px solid ${resiliResult.enEngagement?C.amberMid:"#60C898"}`,
                  borderRadius:14,padding:"16px 18px",
                }}>
                  <div style={{fontWeight:700,fontSize:13,color:resiliResult.enEngagement?C.amber:C.green,marginBottom:12}}>
                    {resiliResult.enEngagement
                      ?`⚠️ En période d'engagement initial — ${resiliResult.joursRestants} jour${resiliResult.joursRestants>1?"s":""} restant${resiliResult.joursRestants>1?"s":""}`
                      :"✅ Hors période d'engagement initial — Résiliation libre et sans frais"
                    }
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:resiliResult.finBlocage3mois?"1fr 1fr 1fr":"1fr 1fr",gap:10}}>
                    <div style={{background:"white",borderRadius:10,padding:"11px 13px",border:`1px solid ${resiliResult.activationCorrigee?"#F5D080":C.border}`}}>
                      <div style={{fontSize:11,fontWeight:700,color:C.textMuted,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Activation</div>
                      <div style={{fontSize:12,fontWeight:700,color:C.text}}>{fmtDate(resiliResult.activation)}</div>
                      {resiliResult.activationCorrigee&&(
                        <div style={{fontSize:11,color:C.amber,fontWeight:600,marginTop:3}}>
                          📅 Recalée au 1er du mois<br/>
                          <span style={{fontWeight:400,color:C.textMuted}}>Saisie : {resiliResult.activationSaisie.toLocaleDateString("fr-FR")}</span>
                        </div>
                      )}
                      {resiliResult.glissant&&(
                        <div style={{fontSize:11,color:C.purple,fontWeight:600,marginTop:3}}>📆 Mois glissant</div>
                      )}
                    </div>
                    {resiliResult.finBlocage3mois&&(
                      <div style={{
                        background:resiliResult.enBlocage?"#FDE8EE":C.surface2,
                        borderRadius:10,padding:"11px 13px",
                        border:`1px solid ${resiliResult.enBlocage?"#F0A0B0":C.border}`,
                      }}>
                        <div style={{fontSize:11,fontWeight:700,color:resiliResult.enBlocage?C.red:C.textMuted,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>
                          {resiliResult.enBlocage?"🚫 Fin blocage 3 mois":"✅ Fin blocage 3 mois"}
                        </div>
                        <div style={{fontSize:12,fontWeight:700,color:resiliResult.enBlocage?C.red:C.textMid}}>{fmtDate(resiliResult.finBlocage3mois)}</div>
                      </div>
                    )}
                    <div style={{
                      background:resiliResult.enEngagement?"#FFF0D0":"#D4F0E4",
                      borderRadius:10,padding:"11px 13px",
                      border:`1px solid ${resiliResult.enEngagement?C.amberMid:"#60C898"}`,
                    }}>
                      <div style={{fontSize:11,fontWeight:700,color:resiliResult.enEngagement?C.amber:C.green,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Fin d'engagement initial</div>
                      <div style={{fontSize:12,fontWeight:700,color:resiliResult.enEngagement?C.amber:C.green}}>{fmtDate(resiliResult.finEngagementInitial)}</div>
                    </div>
                  </div>
                </div>

                {/* Frais */}
                {resiliResult.enEngagement&&(
                  <div style={{
                    background:"#FDE8EE",border:`1.5px solid #F0A0B0`,
                    borderRadius:14,padding:"14px 18px",
                    display:"flex",alignItems:"center",gap:14,
                  }}>
                    <div style={{fontSize:36}}>💳</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:C.red,marginBottom:3}}>Frais de résiliation anticipée</div>
                      <div style={{fontSize:11.5,color:"#7A0032",lineHeight:1.6}}>
                        {resiliResult.reconduction
                          ?"Résiliation avant la fin des 12 mois initiaux → prélèvement d'une mensualité supplémentaire"
                          :"Résiliation avant la fin des 12 mois d'engagement → frais de dossier forfaitaires CGV SNCF"
                        }
                      </div>
                      {resiliResult.type==="mensuel_variable"&&!mensualiteEffective&&(
                        <div style={{fontSize:11,color:C.orange,fontWeight:600,marginTop:4}}>
                          ⚠️ Renseignez votre mensualité O/D ci-dessus pour calculer le montant exact.
                        </div>
                      )}
                    </div>
                    <div style={{
                      background:C.red,borderRadius:12,padding:"10px 18px",
                      textAlign:"center",flexShrink:0,
                    }}>
                      <div style={{color:"rgba(255,255,255,.7)",fontSize:11,fontWeight:600,letterSpacing:.8}}>FRAIS</div>
                      <div style={{color:"white",fontSize:resiliResult.frais?24:14,fontWeight:900,lineHeight:1}}>
                        {resiliResult.frais?`${resiliResult.frais} €`:"Variable"}
                      </div>
                      {resiliResult.fraisLabel&&<div style={{color:"rgba(255,255,255,.6)",fontSize:11,marginTop:2}}>{resiliResult.fraisLabel}</div>}
                    </div>
                  </div>
                )}

                {/* Exonération des frais sur justificatif */}
                {resiliResult.enEngagement&&resiliResult.glissant&&(
                  <div style={{
                    background:"#F5EEFF",border:`1px solid #C8A0F0`,
                    borderRadius:12,padding:"12px 16px",
                  }}>
                    <div style={{fontWeight:700,fontSize:12,color:C.purple,marginBottom:6}}>
                      📎 Exonération des frais — Cas exceptionnels (CGV §10.1)
                    </div>
                    <div style={{fontSize:11.5,color:"#3D1A6A",lineHeight:1.7}}>
                      Les frais de 15 € <strong>ne sont pas dus</strong> avant les 12 premières mensualités, sur présentation de pièces justificatives, dans les cas suivants :
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:8}}>
                      {[
                        {icon:"⚫",label:"Décès",sub:"Abonné, Payeur ou conjoint"},
                        {icon:"🏥",label:"Maladie longue durée",sub:"≥ 3 mois · empêchant l'utilisation"},
                        {icon:"✈️",label:"Mutation / déménagement",sub:"À l'étranger — Abonné uniquement"},
                        {icon:"⚖️",label:"Emprisonnement",sub:"Abonné uniquement"},
                      ].map(({icon,label,sub})=>(
                        <div key={label} style={{
                          background:"white",borderRadius:8,padding:"7px 10px",
                          border:`1px solid #D8B4FF`,
                        }}>
                          <div style={{fontSize:11,fontWeight:700,color:C.purple}}>{icon} {label}</div>
                          <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{sub}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Date d'effet & deadline */}
                <div className="resil-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div style={{
                    background:resiliResult.enBlocage?"rgba(91,45,142,.12)":C.purpleLight,
                    borderRadius:12,padding:"14px 16px",
                    border:`1.5px solid ${resiliResult.enBlocage?"#7B3FA0":"#D8B4FF"}`,
                  }}>
                    <div style={{fontSize:11,fontWeight:700,color:C.purple,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>
                      📬 Deadline résiliation
                      {resiliResult.glissant
                        ?<span style={{fontWeight:400,fontSize:11,display:"block",color:"rgba(91,45,142,.7)",marginTop:1}}>
                          {resiliResult.enBlocage?"calculée après fin de blocage":`veille des 5 j avant le ${resiliResult.effetDate.getDate()} du mois`}
                        </span>
                        :<span style={{fontWeight:400,fontSize:11,display:"block",color:"rgba(91,45,142,.7)",marginTop:1}}>
                          {resiliResult.enBlocage?"calculée après fin de blocage":"veille des 5 j avant le 1er du mois suivant"}
                        </span>
                      }
                    </div>
                    <div style={{fontSize:13,fontWeight:700,color:C.purple}}>{fmtDate(resiliResult.deadline)}</div>
                    <div style={{fontSize:11.5,color:C.textMuted,marginTop:4}}>
                      {resiliResult.enBlocage
                        ?<span style={{color:"#7B3FA0",fontWeight:600}}>⚠️ Blocage en cours — deadline projetée</span>
                        :resiliResult.demande<=resiliResult.deadline
                          ?"✅ Demande dans les délais → effet M+1"
                          :"⚠️ Demande hors délai → effet M+2"
                      }
                    </div>
                  </div>
                  <div style={{
                    background:"#0D1B3E",borderRadius:12,padding:"14px 16px",
                    border:`1.5px solid ${resiliResult.enBlocage?"#7B3FA0":"#2A2A5E"}`,
                  }}>
                    <div style={{fontSize:11,fontWeight:700,color:"#A0C4FF",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>
                      📅 Date d'effet de la résiliation
                      {resiliResult.enBlocage&&<span style={{fontWeight:400,fontSize:11,display:"block",color:"rgba(160,196,255,.6)",marginTop:1}}>1ère date possible</span>}
                    </div>
                    <div style={{fontSize:13,fontWeight:800,color:"#FFD700"}}>{fmtDate(resiliResult.effetDate)}</div>
                    <div style={{fontSize:11.5,color:"rgba(255,255,255,.45)",marginTop:4}}>
                      {resiliResult.enBlocage
                        ?"1ère date possible après fin de blocage"
                        :resiliResult.glissant
                          ?`Date anniversaire mensuelle · Attestation PDF invalide à partir de cette date`
                          :"1er du mois · Attestation PDF invalide à partir de cette date"
                      }
                    </div>
                  </div>
                </div>

                {/* Note réservations */}
                <div className="alert-danger" style={{fontSize:11.5}}>
                  🚫 <strong>Rappel CGV :</strong> Les réservations effectuées par l'abonné au-delà de la date d'effet sont <strong>automatiquement annulées</strong>. L'attestation d'abonnement au format PDF n'est plus valable à compter de la date d'effet de la résiliation.
                </div>

                {/* Condition impayés */}
                <div className="alert-warn" style={{fontSize:11.5}}>
                  ⚠️ <strong>Compte débiteur :</strong> Si le compte client est débiteur, la résiliation ne sera <strong>effective qu'après régularisation des impayés</strong> (CGV §10.1).
                </div>

                {/* Annulation de la demande */}
                {resiliResult.glissant&&resiliResult.deadline&&(
                  <div className="alert-info" style={{fontSize:11.5}}>
                    🔙 <strong>Annulation de la demande possible :</strong> L'abonné peut annuler sa demande de résiliation <strong>jusqu'à la deadline de résiliation</strong> (soit avant le {fmtDate(resiliResult.deadline)}). Passé ce délai, la résiliation suit son cours.
                  </div>
                )}

              </div>
            )}
            {(!dateActivation||!dateDemande)&&(
              <div style={{textAlign:"center",padding:"24px",color:C.textMuted,fontSize:12.5,background:C.surface2,borderRadius:12}}>
                ↑ Renseignez la date d'activation et la date de demande pour calculer les délais de résiliation
              </div>
            )}
          </div>

          {/* Récapitulatif barème abonnements — affiché dans la section résiliation */}
          <div className="card">
            <h2 className="section-title" style={{fontSize:13}}><IconTitle icon={Icon.chart} label="Récapitulatif — Abonnements Max"/></h2>
            <div style={{overflowX:"auto"}}>
              <table className="bareme-table">
                <thead>
                  <tr style={{background:C.purple,color:"white"}}>
                    {["Abonnement","Mensualité","Engagement","Résiliation libre dès","Frais anticipés"].map(h=>(
                      <th key={h} style={{color:"white",textAlign:"center"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    {label:"Max Jeune (–26 ans)",  mensualite:"79 €/mois",   engagement:"12 mois",        free:"Mois 13",                frais:"15 €",         color:C.purple, note:"Mois glissant · Blocage 3 mois"},
                    {label:"Max Senior (+60 ans)", mensualite:"79 €/mois",   engagement:"12 mois",        free:"Mois 13",                frais:"15 €",         color:C.purple, note:"Mois glissant · Blocage 3 mois"},
                    {label:"Max Actif",             mensualite:"Variable O/D",engagement:"12 mois (tacite)",free:"Après période initiale",frais:"1 mensualité", color:C.blue,   note:"Débute le 1er du mois"},
                    {label:"Max Actif+",            mensualite:"Variable O/D",engagement:"12 mois (tacite)",free:"Après période initiale",frais:"1 mensualité", color:C.blue,   note:"Débute le 1er du mois"},
                  ].map((row,i)=>(
                    <tr key={i} style={{background:i%2===0?"white":C.surface2}}>
                      <td style={{fontWeight:600,color:row.color}}>
                        {row.label}
                        {row.note&&<div style={{fontSize:11,fontWeight:500,color:C.textMuted,marginTop:2}}>{row.note}</div>}
                      </td>
                      <td style={{textAlign:"center",fontWeight:600,color:C.text,fontSize:12}}>{row.mensualite}</td>
                      <td style={{textAlign:"center",color:C.textMid}}>{row.engagement}</td>
                      <td style={{textAlign:"center",color:C.green,fontWeight:600,fontSize:12}}>{row.free}</td>
                      <td style={{textAlign:"center",fontWeight:700,color:C.red,fontSize:12}}>{row.frais}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="alert-info" style={{marginTop:12,fontSize:11.5}}>
              ℹ️ Les tarifs Max Actif / Actif+ varient selon l'origine/destination. Se référer aux CGV SNCF et à l'espace abonné pour les montants exacts. · Résiliation par courrier, en agence ou via l'espace client.
            </div>
          </div>
          </React.Fragment>)} {/* fin datesSection==="resiliation" */}

        </div>)}

      </main>

      {/* ── BARRE RÉSULTAT FIXE ─────────────────────────────────── */}
      {tab==="retard"&&computed&&computed.eligible&&(
        <div role="status" aria-live="polite" aria-atomic="true" style={{
          position:"fixed",bottom:0,left:0,right:0,zIndex:200,
          background:`linear-gradient(135deg,#0A5530,#0F6B3C)`,
          padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",
          boxShadow:"0 -4px 20px rgba(0,0,0,.22)",
        }}>
          <div style={{color:"rgba(255,255,255,.7)",fontSize:12}}>
            ✓ Éligible · <strong style={{color:"white"}}>{delayLabel(computed.finalDelay)}</strong>
            {computed.exceptBonus>0&&<span style={{color:"#FFD700",marginLeft:8,fontSize:11}}>⭐ +{computed.exceptBonus.toFixed(2)} € exception</span>}
          </div>
          <div style={{color:"white",fontSize:26,fontWeight:900,fontVariantNumeric:"tabular-nums",fontFamily:"'Inter','DM Sans',sans-serif",letterSpacing:"-.5px"}}>
            {computed.total.toFixed(2)} €
          </div>
        </div>
      )}
      {tab==="frais"&&fraisComputed&&fraisComputed.total>0&&(
        <div role="status" aria-live="polite" aria-atomic="true" style={{
          position:"fixed",bottom:0,left:0,right:0,zIndex:200,
          background:`linear-gradient(135deg,#002B7A,${C.blue})`,
          padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",
          boxShadow:"0 -4px 20px rgba(0,0,0,.22)",
        }}>
          <div style={{color:"rgba(255,255,255,.7)",fontSize:12}}>
            🧾 <strong style={{color:"white"}}>{fraisComputed.results.length} poste{fraisComputed.results.length>1?"s":""}</strong> · Frais annexes remboursables
          </div>
          <div style={{color:"white",fontSize:26,fontWeight:900,fontVariantNumeric:"tabular-nums",fontFamily:"'Inter','DM Sans',sans-serif",letterSpacing:"-.5px"}}>
            {fraisComputed.total.toFixed(2)} €
          </div>
        </div>
      )}

      {/* ── FOOTER ─────────────────────────────────────────────── */}
      <footer style={{
        textAlign:"center",padding:"14px",fontSize:11.5,
        color:C.textMuted,borderTop:`1px solid ${C.border}`,
        background:"white",letterSpacing:.2,
      }}>
        Calculateur BD30 / G30 · <strong style={{color:C.red}}>version 2.2</strong> · by PDSA · Règlement PRR 2021 · En vigueur au 01/01/2025 · À titre indicatif uniquement
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
